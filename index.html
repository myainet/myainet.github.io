<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ainet & CCN | Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at 10% 20%, #0a2f44, #05161e); min-height: 100vh; padding: 20px; color: #1e2a3e; }
        .glass-card { background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(12px); border-radius: 2rem; box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3); padding: 1.5rem; }
        .btn { background: linear-gradient(105deg, #f97316, #ef4444); border: none; color: white; font-weight: 600; border-radius: 2rem; padding: 0.6rem 1.2rem; cursor: pointer; transition: 0.2s; font-size: 0.85rem; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn-outline { background: transparent; border: 2px solid #f97316; color: #f97316; }
        .btn-sm { padding: 0.3rem 1rem; font-size: 0.8rem; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .filter-bar { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; background: rgba(255,255,255,0.4); padding: 0.7rem 1rem; border-radius: 2.5rem; margin-bottom: 1.5rem; }
        .filter-group { display: flex; align-items: center; gap: 0.5rem; background: white; padding: 0.2rem 1rem; border-radius: 2rem; }
        .filter-group label { font-weight: 600; font-size: 0.85rem; }
        .filter-group input, .filter-group select { border: none; padding: 0.3rem; border-radius: 1.5rem; background: #f0f0f0; font-size: 0.85rem; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; margin: 1.5rem 0; }
        .stat-card { border-radius: 1.5rem; padding: 1.2rem; color: white; background: linear-gradient(115deg, #1e3c72, #2a5298); }
        .card-ainet { background: linear-gradient(115deg, #3b82f6, #1e3a8a); }
        .card-ccn { background: linear-gradient(115deg, #10b981, #064e3b); }
        .card-reseller-ainet { background: linear-gradient(115deg, #8b5cf6, #5b21b6); }
        .card-reseller-ccn { background: linear-gradient(115deg, #ec4899, #be185d); }
        .card-polash-ainet { background: linear-gradient(115deg, #f59e0b, #b45309); }
        .card-polash-ccn { background: linear-gradient(115deg, #f97316, #c2410c); }
        .card-stb { background: linear-gradient(115deg, #6b2e8a, #4a1d62); }
        .stat-card .amount { font-size: 1.8rem; font-weight: bold; }
        .transaction-list { max-height: 280px; overflow-y: auto; background: rgba(0,0,0,0.05); border-radius: 1.2rem; padding: 0.6rem; margin-top: 0.8rem; }
        .transaction-item { background: rgba(255,255,255,0.2); margin: 0.4rem 0; padding: 0.5rem 0.8rem; border-radius: 1.5rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; gap: 0.5rem; flex-wrap: wrap; }
        .edit-btn { background: #ffc107; border: none; padding: 0.2rem 0.8rem; border-radius: 2rem; cursor: pointer; font-size: 0.7rem; font-weight: 600; }
        .pagination { display: flex; justify-content: center; gap: 0.8rem; margin: 1rem 0; align-items: center; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo-img { width: 70px; height: 70px; object-fit: cover; border-radius: 50%; margin-bottom: 0.5rem; }
        .badge { background: #2c5a6e; border-radius: 2rem; padding: 0.2rem 0.8rem; font-size: 0.75rem; color: white; display: inline-block; margin: 0.2rem; }
        input, select, textarea { border: 1px solid #ddd; border-radius: 2rem; padding: 0.5rem 1rem; font-size: 0.85rem; width: 100%; margin: 0.3rem 0; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; max-width: 500px; width: 90%; border-radius: 2rem; padding: 1.5rem; }
        .tab-bar { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 0.5rem; }
        .tab { background: none; border: none; padding: 0.5rem 1.2rem; font-weight: 600; cursor: pointer; border-radius: 2rem; }
        .tab.active { background: #f97316; color: white; }
        .serial-grid { display: flex; gap: 1rem; flex-wrap: wrap; }
        .serial-col { flex: 1; border-right: 2px solid #ccc; padding-right: 1rem; }
        .serial-col:last-child { border-right: none; }
        @media (max-width: 680px) { body { padding: 1rem; } .filter-group { flex-wrap: wrap; } .serial-col { border-right: none; } }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // =======================  কনফিগার =======================
    const API_URL = 'YOUR_APPS_SCRIPT_URL_HERE';  // 👈 আপনার URL দিন
    const DEFAULT_USERS = [
        { username: "admin", password: "admin123", role: "admin", name: "Admin" },
        { username: "accounts", password: "acc123", role: "accounts", name: "Accounts" },
        { username: "incharge", password: "inch123", role: "dataincharge", name: "Incharge" },
        { username: "operator", password: "op123", role: "dataoperator", name: "Operator" },
        { username: "noyon", password: "123456", role: "employee", name: "Noyon" }
    ];
    
    let currentUser = null;
    let usersList = [];
    let cache = {};
    
    function getToday() { return new Date().toISOString().slice(0,10); }
    function isEditable(editableUntil) { return editableUntil ? new Date() < new Date(editableUntil) : true; }
    
    async function callApi(action, method = 'GET', payload = null, force = false) {
        const key = `${action}_${method}_${payload?JSON.stringify(payload):''}`;
        if (!force && cache[key] && (Date.now()-cache[key].ts < 60000)) return cache[key].data;
        try {
            let res;
            if (method === 'GET') {
                const url = `${API_URL}?action=${action}&t=${Date.now()}`;
                const response = await fetch(url);
                res = await response.json();
            } else {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                res = await response.json();
            }
            cache[key] = { data: res, ts: Date.now() };
            return res;
        } catch(err) { console.error(err); return { success: false, error: err.message }; }
    }
    
    async function loadUsers() {
        const res = await callApi('getUsers');
        usersList = (res.success && res.data) ? res.data : DEFAULT_USERS;
        return usersList;
    }
    
    async function login(username, password, remember) {
        await loadUsers();
        const user = usersList.find(u => u.username === username && u.password === password);
        if (user) {
            currentUser = { ...user, password };
            const data = { username: user.username, role: user.role, name: user.name, password };
            if (remember) localStorage.setItem('currentUser', JSON.stringify(data));
            sessionStorage.setItem('currentUser', JSON.stringify(data));
            return true;
        }
        return false;
    }
    
    function getStoredUser() {
        const sess = sessionStorage.getItem('currentUser');
        if (sess) return JSON.parse(sess);
        const loc = localStorage.getItem('currentUser');
        return loc ? JSON.parse(loc) : null;
    }
    
    function logout() {
        sessionStorage.clear();
        localStorage.removeItem('currentUser');
        renderLoginPage();
    }
    
    function showModal(content) {
        let m = document.querySelector('.modal');
        if(m) m.remove();
        m = document.createElement('div');
        m.className = 'modal';
        m.innerHTML = `<div class="modal-content"><span style="float:right; font-size:26px; cursor:pointer;" onclick="this.parentElement.parentElement.remove()">&times;</span>${content}</div>`;
        document.body.appendChild(m);
    }
    
    // ========== পাসওয়ার্ড পরিবর্তন (সবার জন্য) ==========
    window.showChangePasswordModal = function() {
        showModal(`
            <h3>🔐 Change Password</h3>
            <input type="password" id="oldPass" placeholder="Current Password"><br>
            <input type="password" id="newPass1" placeholder="New Password (min 4 chars)"><br>
            <input type="password" id="newPass2" placeholder="Retype new password"><br>
            <button class="btn" onclick="changePassword()">Update</button>
        `);
    };
    window.changePassword = async function() {
        const old = document.getElementById('oldPass').value;
        const new1 = document.getElementById('newPass1').value;
        const new2 = document.getElementById('newPass2').value;
        if (new1 !== new2) { alert("Passwords don't match"); return; }
        if (new1.length < 4) { alert("Minimum 4 characters"); return; }
        const user = getStoredUser();
        if (user.password !== old) { alert("Current password wrong"); return; }
        const res = await callApi('updatePassword', 'POST', { username: user.username, newPassword: new1 }, true);
        if (res.success) { alert("Password changed. Please login again."); logout(); }
        else alert("Failed: " + (res.error || "Unknown"));
    };
    
    // ========== এডমিন: ইউজার যোগ ==========
    window.showAddUserModal = function() {
        showModal(`
            <h3>➕ Add Employee</h3>
            <input type="text" id="newUsername" placeholder="Username"><br>
            <input type="text" id="newName" placeholder="Full Name"><br>
            <input type="password" id="newPassword" placeholder="Password"><br>
            <button class="btn" onclick="addNewUser()">Add</button>
        `);
    };
    window.addNewUser = async function() {
        const username = document.getElementById('newUsername').value.trim();
        const name = document.getElementById('newName').value.trim();
        const pwd = document.getElementById('newPassword').value.trim();
        if (!username || !name || !pwd) { alert("All fields required"); return; }
        if (pwd.length < 4) { alert("Password min 4 chars"); return; }
        const res = await callApi('addUser', 'POST', { username, password: pwd, role: 'employee', name }, true);
        if (res.success) { alert("User added!"); closeModal(); await loadUsers(); renderDashboard(); }
        else alert("Failed: " + (res.message || "Username exists"));
    };
    
    // =======================  এডমিন ড্যাশবোর্ড =======================
    async function renderAdminDashboard() {
        let incomes = (await callApi('getIncomes')).data || [];
        let expenses = (await callApi('getExpenses')).data || [];
        let stb = (await callApi('getSTBIncomes')).data || [];
        let attendance = (await callApi('getAttendance')).data || [];
        const today = getToday();
        incomes = incomes.filter(i => i.date === today);
        expenses = expenses.filter(e => e.date === today);
        stb = stb.filter(s => s.date === today);
        const categories = [
            { key: 'Ainet', label: 'Ainet', cardClass: 'card-ainet' },
            { key: 'CCN', label: 'CCN', cardClass: 'card-ccn' },
            { key: 'পলাশবাড়ী CCN', label: 'Polash CCN', cardClass: 'card-polash-ccn' },
            { key: 'রিসেলার Ainet', label: 'Reseller Ainet', cardClass: 'card-reseller-ainet' },
            { key: 'রিসেলার CCN', label: 'Reseller CCN', cardClass: 'card-reseller-ccn' },
            { key: 'পলাশবাড়ী Ainet', label: 'Polash Ainet', cardClass: 'card-polash-ainet' },
            { key: 'STB', label: 'STB Income', cardClass: 'card-stb' }
        ];
        let catStats = {};
        for (let c of categories) {
            if (c.key === 'STB') {
                catStats[c.key] = { balance: stb.reduce((s,i)=>s+i.amount,0) };
            } else {
                let inc = incomes.filter(i=>i.category===c.key).reduce((s,i)=>s+i.amount,0);
                let exp = expenses.filter(e=>e.mainCategory===c.key).reduce((s,e)=>s+e.amount,0);
                catStats[c.key] = { balance: inc - exp };
            }
        }
        let catDetails = {};
        for (let c of categories) {
            if (c.key === 'STB') {
                catDetails[c.key] = stb.map(t => `${t.date} → STB: ৳${t.amount} (${t.note||''})`);
            } else {
                let incTexts = incomes.filter(i=>i.category===c.key).map(i=>`${i.date} → Income: ৳${i.amount} (${i.note||''})`);
                let expTexts = expenses.filter(e=>e.mainCategory===c.key).map(e=>`${e.date} → Expense (${e.subCategory}): ৳${e.amount} (${e.note||''})`);
                catDetails[c.key] = [...incTexts, ...expTexts];
            }
        }
        return `
            <div class="glass-card">
                <div class="flex-between"><h2><i class="fas fa-user-shield"></i> Admin Dashboard</h2><div><button class="btn-outline btn-sm" onclick="showAddUserModal()">➕ New User</button> <button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Change Password</button> <button class="btn-outline btn-sm" onclick="logout()">Logout</button></div></div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-bottom: 1rem;">
                    <div style="background: #2c5a6e; border-radius: 2rem; padding: 0.5rem 1rem;"><i class="fas fa-calendar-check"></i> Present: ${attendance.filter(a=>a.date===today).length}<br><small>${attendance.filter(a=>a.date===today).map(a=>usersList.find(u=>u.username===a.username)?.name||a.username).join(', ')}</small></div>
                    <div style="background: #2c5a6e; border-radius: 2rem; padding: 0.5rem 1rem;"><i class="fas fa-exclamation-triangle"></i> Complaints: 0</div>
                </div>
                <div class="cards-grid">
                    ${categories.map(c => `
                        <div class="stat-card ${c.cardClass}">
                            <h4>${c.label}</h4>
                            <div class="amount">৳ ${catStats[c.key].balance.toLocaleString()}</div>
                            <div class="transaction-list">${catDetails[c.key].slice(0,3).map(t=>`<div class="transaction-item">${t}</div>`).join('')}</div>
                        </div>
                    `).join('')}
                </div>
                <button class="btn" onclick="window.print()">Print</button>
            </div>
        `;
    }
    
    // =======================  একাউন্টস ড্যাশবোর্ড (মাল্টি কার্ড + ফুল ফিচার) =======================
    async function renderAccountsDashboard() {
        let filterDate = localStorage.getItem('accDate') || getToday();
        let filterCategory = localStorage.getItem('accCategory') || 'all';
        let filterType = localStorage.getItem('accType') || 'both';
        let filterSubcat = localStorage.getItem('accSubcat') || 'all';
        
        let incomes = (await callApi('getIncomes')).data || [];
        let expenses = (await callApi('getExpenses')).data || [];
        incomes = incomes.filter(i => i.date === filterDate);
        expenses = expenses.filter(e => e.date === filterDate);
        
        const categories = [
            { key: 'Ainet', label: 'Ainet', incKey: 'Ainet', expKey: 'Ainet', cardClass: 'card-ainet' },
            { key: 'CCN', label: 'CCN', incKey: 'CCN', expKey: 'CCN', cardClass: 'card-ccn' },
            { key: 'পলাশবাড়ী Ainet', label: 'Polash Ainet', incKey: 'পলাশবাড়ী Ainet', expKey: 'পলাশবাড়ী Ainet', cardClass: 'card-polash-ainet' },
            { key: 'পলাশবাড়ী CCN', label: 'Polash CCN', incKey: 'পলাশবাড়ী CCN', expKey: 'পলাশবাড়ী CCN', cardClass: 'card-polash-ccn' },
            { key: 'রিসেলার Ainet', label: 'Reseller Ainet', incKey: 'রিসেলার Ainet', expKey: 'রিসেলার Ainet', cardClass: 'card-reseller-ainet' },
            { key: 'রিসেলার CCN', label: 'Reseller CCN', incKey: 'রিসেলার CCN', expKey: 'রিসেলার CCN', cardClass: 'card-reseller-ccn' }
        ];
        
        let visibleCategories = categories;
        if (filterCategory !== 'all') visibleCategories = categories.filter(c => c.key === filterCategory);
        
        function getTransactions(cat, type) {
            if (type === 'income') {
                let trans = incomes.filter(i => i.category === cat.incKey);
                return trans;
            } else if (type === 'expense') {
                let trans = expenses.filter(e => e.mainCategory === cat.expKey);
                if (filterSubcat !== 'all') trans = trans.filter(e => e.subCategory === filterSubcat);
                return trans;
            } else {
                let inc = incomes.filter(i => i.category === cat.incKey);
                let exp = expenses.filter(e => e.mainCategory === cat.expKey);
                if (filterSubcat !== 'all') exp = exp.filter(e => e.subCategory === filterSubcat);
                return [...inc, ...exp];
            }
        }
        
        function getTotal(cat, type) {
            let trans = getTransactions(cat, type);
            return trans.reduce((s,t)=>s + t.amount, 0);
        }
        
        let pages = JSON.parse(localStorage.getItem('accPages') || '{}');
        const perPage = 8;
        
        function renderTransactionList(cat, type) {
            let transactions = getTransactions(cat, type);
            let pageKey = `${cat.key}_${type}`;
            let currentPage = pages[pageKey] || 1;
            let start = (currentPage-1)*perPage;
            let paginated = transactions.slice(start, start+perPage);
            if (paginated.length === 0) return '<div class="transaction-item">No transactions</div>';
            return paginated.map((t, idx) => {
                const editable = isEditable(t.editableUntil);
                let display = '';
                if (type === 'income') display = `${t.date} → Income: ৳${t.amount} (${t.note||''})`;
                else if (type === 'expense') display = `${t.date} → ${t.subCategory}: ৳${t.amount} (${t.note||''})`;
                else display = `${t.date} → ${t.category ? 'Income' : t.subCategory}: ৳${t.amount} (${t.note||''})`;
                return `<div class="transaction-item"><span>${display}</span>${editable ? `<button class="edit-btn" onclick="editAccountTrans('${type}','${cat.key}',${transactions.indexOf(t)})">Edit</button>` : '<span class="disabled-edit">Expired</span>'}</div>`;
            }).join('');
        }
        
        window.editAccountTrans = (type, catKey, idx) => { alert(`Edit ${type} for ${catKey} at index ${idx} (API would be called)`); };
        window.changePage = (catKey, type, delta) => {
            let pages = JSON.parse(localStorage.getItem('accPages') || '{}');
            let pageKey = `${catKey}_${type}`;
            let current = pages[pageKey] || 1;
            let newPage = current + delta;
            if (newPage < 1) newPage = 1;
            let totalItems = getTransactions(categories.find(c=>c.key===catKey), type).length;
            let totalPages = Math.ceil(totalItems / perPage);
            if (newPage > totalPages) newPage = totalPages;
            pages[pageKey] = newPage;
            localStorage.setItem('accPages', JSON.stringify(pages));
            renderDashboard();
        };
        
        window.applyAccFilters = () => {
            localStorage.setItem('accDate', document.getElementById('accDate').value);
            localStorage.setItem('accCategory', document.getElementById('accCategory').value);
            localStorage.setItem('accType', document.getElementById('accType').value);
            localStorage.setItem('accSubcat', document.getElementById('accSubcat').value);
            localStorage.setItem('accPages', '{}');
            renderDashboard();
        };
        window.resetAccFilters = () => {
            localStorage.removeItem('accDate'); localStorage.removeItem('accCategory'); localStorage.removeItem('accType'); localStorage.removeItem('accSubcat');
            localStorage.setItem('accPages', '{}');
            renderDashboard();
        };
        
        let attendance = (await callApi('getAttendance')).data || [];
        let todayAtt = attendance.filter(a=>a.date===getToday());
        
        const subcatOptions = ['all', 'ডিপিএস','বিদ্যুৎ বিল','অফিস খরচ','বেতন বাবদ','টিজি/প্যাচকট','ফাইবার ক্রয়','যন্ত্রাংশ ক্রয়','স্প্লিটার','বিবিধ','মেইন্টেন্স বাবদ','দানবাবদ','যাতায়াত','মোবাইল বিল','ইন্টারনেট বিল','আপ্যায়ন','কুরিয়ার খরচ','ব্যাংক জমা','তার ক্রয়','স্যার নিজ খরচ','ম্যাডাম খরচ'];
        
        let cardsHtml = '';
        for (let cat of visibleCategories) {
            let incTotal = getTotal(cat, 'income');
            let expTotal = getTotal(cat, 'expense');
            let netBalance = incTotal - expTotal;
            let showIncome = (filterType === 'income' || filterType === 'both');
            let showExpense = (filterType === 'expense' || filterType === 'both');
            cardsHtml += `
                <div class="cards-grid">
                    ${showIncome ? `
                    <div class="stat-card ${cat.cardClass}">
                        <div style="cursor:pointer" onclick="alert('Add income for ${cat.label}')">
                            <h3>💵 Income - ${cat.label}</h3>
                            <div class="amount">৳ ${incTotal.toLocaleString()}</div>
                            <div>Net Balance: ৳ ${netBalance.toLocaleString()}</div>
                        </div>
                        <div class="transaction-list">${renderTransactionList(cat, 'income')}</div>
                        <div class="pagination">
                            <button class="btn-sm" onclick="changePage('${cat.key}','income',-1)">◀</button>
                            <span>${pages[`${cat.key}_income`] || 1}</span>
                            <button class="btn-sm" onclick="changePage('${cat.key}','income',1)">▶</button>
                        </div>
                    </div>
                    ` : ''}
                    ${showExpense ? `
                    <div class="stat-card" style="background: linear-gradient(115deg,#b91c1c,#7f1d1d);">
                        <div style="cursor:pointer" onclick="alert('Add expense for ${cat.label}')">
                            <h3>💸 Expense - ${cat.label}</h3>
                            <div class="amount">৳ ${expTotal.toLocaleString()}</div>
                            <div>Net Balance: ৳ ${netBalance.toLocaleString()}</div>
                        </div>
                        <div class="transaction-list">${renderTransactionList(cat, 'expense')}</div>
                        <div class="pagination">
                            <button class="btn-sm" onclick="changePage('${cat.key}','expense',-1)">◀</button>
                            <span>${pages[`${cat.key}_expense`] || 1}</span>
                            <button class="btn-sm" onclick="changePage('${cat.key}','expense',1)">▶</button>
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;
        }
        
        return `
            <div class="glass-card">
                <div class="flex-between"><h2><i class="fas fa-chart-line"></i> Accounts Dashboard</h2><div><button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Change Password</button> <button class="btn-outline btn-sm" onclick="logout()">Logout</button></div></div>
                <div class="filter-bar">
                    <div class="filter-group"><label>Date:</label><input type="date" id="accDate" value="${filterDate}"></div>
                    <div class="filter-group"><label>Category:</label><select id="accCategory"><option value="all" ${filterCategory==='all'?'selected':''}>All</option>${categories.map(c=>`<option value="${c.key}" ${filterCategory===c.key?'selected':''}>${c.label}</option>`).join('')}</select></div>
                    <div class="filter-group"><label>Type:</label><select id="accType"><option value="both" ${filterType==='both'?'selected':''}>Both</option><option value="income" ${filterType==='income'?'selected':''}>Income</option><option value="expense" ${filterType==='expense'?'selected':''}>Expense</option></select></div>
                    <div class="filter-group"><label>Subcat:</label><select id="accSubcat">${subcatOptions.map(opt=>`<option value="${opt}" ${filterSubcat===opt?'selected':''}>${opt}</option>`).join('')}</select></div>
                    <button class="btn" onclick="applyAccFilters()">Apply</button><button class="btn-outline" onclick="resetAccFilters()">Reset</button>
                </div>
                ${cardsHtml}
                <div style="margin-top: 2rem;"><h3>📋 Today's Attendance</h3><div class="transaction-list">${todayAtt.map(a=>`<div class="transaction-item">${usersList.find(u=>u.username===a.username)?.name||a.username} → ${a.status} (${a.note||''})</div>`).join('')||'No records'}</div></div>
            </div>
        `;
    }
    
    // =======================  ডাটা ইনচার্জ ড্যাশবোর্ড =======================
    async function renderInchargeDashboard() {
        let filterStart = localStorage.getItem('inchargeStart') || '';
        let filterEnd = localStorage.getItem('inchargeEnd') || '';
        let filterCategory = localStorage.getItem('inchargeCategory') || 'recharge';
        let filterSubcat = localStorage.getItem('inchargeSubcat') || 'all';
        let page = parseInt(localStorage.getItem('inchargePage')||'1');
        const rowsPerPage = 50;
        
        let recharges = (await callApi('getRecharges')).data || [];
        if (filterStart && filterEnd) recharges = recharges.filter(r => r.date >= filterStart && r.date <= filterEnd);
        let content = '';
        if (filterCategory === 'recharge') {
            let cashList = recharges.filter(r=>r.method==='cash');
            let bikashList = recharges.filter(r=>r.method==='bikash');
            if (filterSubcat === 'cash') bikashList = [];
            if (filterSubcat === 'bikash') cashList = [];
            const totalCash = cashList.reduce((s,r)=>s+r.amount,0);
            const totalBikash = bikashList.reduce((s,r)=>s+r.amount,0);
            const start = (page-1)*rowsPerPage;
            const pagCash = cashList.slice(start, start+rowsPerPage);
            const pagBikash = bikashList.slice(start, start+rowsPerPage);
            const totalPages = Math.ceil(Math.max(cashList.length, bikashList.length)/rowsPerPage);
            let cashRows='', bikashRows='';
            for(let i=0;i<rowsPerPage;i++){
                const c = pagCash[i]||null, b = pagBikash[i]||null;
                cashRows += `<div style="display:flex; gap:6px; margin-bottom:6px;"><input type="text" id="cash_id_${i}" placeholder="ID" value="${c?.userId||''}" style="flex:2"><input type="text" id="cash_name_${i}" placeholder="Name" value="${c?.userName||''}" style="flex:2"><input type="number" id="cash_amount_${i}" placeholder="Amount" value="${c?.amount||''}" style="flex:1"><button class="btn-sm" onclick="saveSingleCash(${i})">Save</button></div>`;
                bikashRows += `<div style="display:flex; gap:6px; margin-bottom:6px;"><input type="text" id="bikash_id_${i}" placeholder="ID" value="${b?.userId||''}" style="flex:2"><input type="text" id="bikash_name_${i}" placeholder="Name" value="${b?.userName||''}" style="flex:2"><input type="number" id="bikash_amount_${i}" placeholder="Amount" value="${b?.amount||''}" style="flex:1"><button class="btn-sm" onclick="saveSingleBikash(${i})">Save</button></div>`;
            }
            window.saveSingleCash = async (i) => {
                let uid = document.getElementById(`cash_id_${i}`).value;
                let uname = document.getElementById(`cash_name_${i}`).value;
                let amt = parseFloat(document.getElementById(`cash_amount_${i}`).value);
                if(!amt) return;
                await callApi('addRecharge','POST',{ type:'internet', method:'cash', userId:uid, userName:uname, amount:amt, date:getToday(), note:'', editableUntil:new Date(Date.now()+16*3600000).toISOString() }, true);
                alert("Saved"); renderDashboard();
            };
            window.saveSingleBikash = async (i) => {
                let uid = document.getElementById(`bikash_id_${i}`).value;
                let uname = document.getElementById(`bikash_name_${i}`).value;
                let amt = parseFloat(document.getElementById(`bikash_amount_${i}`).value);
                if(!amt) return;
                await callApi('addRecharge','POST',{ type:'internet', method:'bikash', userId:uid, userName:uname, amount:amt, date:getToday(), note:'', editableUntil:new Date(Date.now()+16*3600000).toISOString() }, true);
                alert("Saved"); renderDashboard();
            };
            window.saveAllCash = async () => { for(let i=0;i<rowsPerPage;i++) await saveSingleCash(i); alert("All cash saved"); };
            window.saveAllBikash = async () => { for(let i=0;i<rowsPerPage;i++) await saveSingleBikash(i); alert("All bikash saved"); };
            window.saveAllBoth = async () => { await saveAllCash(); await saveAllBikash(); alert("Both sides saved"); };
            window.prevRechargePage = () => { let p=parseInt(localStorage.getItem('inchargePage')||'1'); if(p>1){ localStorage.setItem('inchargePage',p-1); renderDashboard(); } };
            window.nextRechargePage = () => { let p=parseInt(localStorage.getItem('inchargePage')||'1'); if(p<totalPages){ localStorage.setItem('inchargePage',p+1); renderDashboard(); } };
            content = `
                <div style="display:flex; gap:1rem; background:#f0f0f0; border-radius:2rem; padding:0.8rem; margin-bottom:1rem;"><div>💵 Cash: ৳${totalCash.toLocaleString()} (${cashList.length})</div><div>📱 Bikash: ৳${totalBikash.toLocaleString()} (${bikashList.length})</div><div>🔄 Total: ${cashList.length+bikashList.length}</div></div>
                <div class="serial-grid"><div class="serial-col"><h3>💵 Cash Recharge</h3>${cashRows}<button class="btn btn-sm" onclick="saveAllCash()">Save All Cash</button></div><div class="serial-col"><h3>📱 Bikash Recharge</h3>${bikashRows}<button class="btn btn-sm" onclick="saveAllBikash()">Save All Bikash</button></div></div>
                <div class="pagination"><button class="btn" onclick="prevRechargePage()">◀</button> ${page} / ${totalPages} <button class="btn" onclick="nextRechargePage()">▶</button></div>
                <button class="btn" style="width:100%; margin-top:1rem;" onclick="saveAllBoth()">💾 Save All (Both sides)</button>
            `;
        } else if (filterCategory === 'attendance') {
            let employees = usersList.filter(u=>u.role==='employee');
            let attendance = (await callApi('getAttendance')).data || [];
            let today = getToday();
            let empRows = employees.map(emp => {
                let att = attendance.find(a=>a.username===emp.username && a.date===today);
                let status = att ? att.status : 'present';
                let note = att ? att.note||'' : '';
                return `<div style="display:flex; gap:0.5rem; align-items:center; margin-bottom:0.5rem;"><span style="width:120px;">${emp.name}</span>
                        <select id="status_${emp.username}"><option value="present" ${status==='present'?'selected':''}>Present</option><option value="absent" ${status==='absent'?'selected':''}>Absent</option><option value="late" ${status==='late'?'selected':''}>Late</option></select>
                        <input type="text" id="note_${emp.username}" placeholder="Note" value="${note}" style="flex:1;">
                        <button class="btn-sm" onclick="saveSingleAttendance('${emp.username}')">Save</button></div>`;
            }).join('');
            window.saveSingleAttendance = async (uname) => {
                let status = document.getElementById(`status_${uname}`).value;
                let note = document.getElementById(`note_${uname}`).value;
                await callApi('addAttendance','POST',{ username:uname, status, date:getToday(), note, lateTime:'' }, true);
                alert("Saved"); renderDashboard();
            };
            window.saveAllAttendance = async () => {
                for(let emp of employees) await saveSingleAttendance(emp.username);
                alert("All saved"); renderDashboard();
            };
            content = `
                <h3>📋 Mark Attendance (${getToday()})</h3>
                ${empRows}
                <button class="btn" onclick="saveAllAttendance()">Save All</button>
            `;
        } else if (filterCategory === 'complaint') {
            let complaints = JSON.parse(localStorage.getItem('userComplaints')||'[]');
            let todayComplaints = complaints.filter(c=>c.date===getToday());
            let empOptions = `<option value="">-- None --</option>` + usersList.filter(u=>u.role==='employee').map(e=>`<option value="${e.username}">${e.name}</option>`).join('');
            window.submitComplaint = () => {
                let text = document.getElementById('compText').value;
                if(!text) return alert("Write complaint");
                let emp = document.getElementById('compEmployee').value || null;
                let status = document.getElementById('compStatus').value;
                let comps = JSON.parse(localStorage.getItem('userComplaints')||'[]');
                comps.push({ date: getToday(), complaint: text, status, assignedTo: emp });
                localStorage.setItem('userComplaints', JSON.stringify(comps));
                alert("Complaint added"); renderDashboard();
            };
            content = `
                <h3>📢 New Complaint Entry</h3>
                <textarea id="compText" rows="3" placeholder="Write complaint..." style="width:100%"></textarea>
                <div class="filter-group"><label>Employee (optional):</label><select id="compEmployee">${empOptions}</select></div>
                <div class="filter-group"><label>Status:</label><select id="compStatus"><option value="pending">pending</option><option value="processing">processing</option><option value="resolved">resolved</option></select></div>
                <button class="btn" onclick="submitComplaint()">Submit</button>
                <h3>Today's Complaints</h3>
                <div class="transaction-list">${todayComplaints.map(c=>`<div class="transaction-item">⚠️ ${c.complaint} (${c.status}) ${c.assignedTo?`→ ${usersList.find(u=>u.username===c.assignedTo)?.name}`:''}</div>`).join('')||'No complaints'}</div>
            `;
        }
        window.applyInchargeFilters = () => {
            localStorage.setItem('inchargeStart', document.getElementById('startDate').value);
            localStorage.setItem('inchargeEnd', document.getElementById('endDate').value);
            localStorage.setItem('inchargeCategory', document.getElementById('inchargeCategory').value);
            localStorage.setItem('inchargeSubcat', document.getElementById('inchargeSubcat').value);
            localStorage.setItem('inchargePage', '1');
            renderDashboard();
        };
        window.resetInchargeFilters = () => {
            localStorage.removeItem('inchargeStart'); localStorage.removeItem('inchargeEnd'); localStorage.removeItem('inchargeCategory'); localStorage.removeItem('inchargeSubcat'); localStorage.removeItem('inchargePage');
            renderDashboard();
        };
        return `
            <div class="glass-card">
                <div class="flex-between"><h2><i class="fas fa-tower-broadcast"></i> Data Incharge</h2><div><button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Change Password</button> <button class="btn-outline btn-sm" onclick="logout()">Logout</button></div></div>
                <div class="filter-bar">
                    <div class="filter-group"><label>From:</label><input type="date" id="startDate" value="${filterStart}"></div>
                    <div class="filter-group"><label>To:</label><input type="date" id="endDate" value="${filterEnd}"></div>
                    <div class="filter-group"><label>Category:</label><select id="inchargeCategory"><option value="recharge" ${filterCategory==='recharge'?'selected':''}>Recharge</option><option value="attendance" ${filterCategory==='attendance'?'selected':''}>Attendance</option><option value="complaint" ${filterCategory==='complaint'?'selected':''}>Complaint Entry</option></select></div>
                    <div class="filter-group"><label>Subcat:</label><select id="inchargeSubcat"><option value="all" ${filterSubcat==='all'?'selected':''}>All</option><option value="cash" ${filterSubcat==='cash'?'selected':''}>Cash</option><option value="bikash" ${filterSubcat==='bikash'?'selected':''}>Bikash</option></select></div>
                    <button class="btn" onclick="applyInchargeFilters()">Apply</button><button class="btn-outline" onclick="resetInchargeFilters()">Reset</button>
                </div>
                ${content}
            </div>
        `;
    }
    
    // =======================  ডাটা অপারেটর ড্যাশবোর্ড =======================
    async function renderOperatorDashboard() {
        let stbIncome = (await callApi('getSTBIncomes')).data || [];
        let stbExpense = JSON.parse(localStorage.getItem('stbExpense')||'[]');
        let accessories = (await callApi('getAccessories')).data || [];
        let links = JSON.parse(localStorage.getItem('linksPasswords')||'[]');
        let incTotal = stbIncome.reduce((s,i)=>s+i.amount,0);
        let expTotal = stbExpense.reduce((s,e)=>s+e.amount,0);
        let incPage = parseInt(localStorage.getItem('stbIncPage')||'1');
        let expPage = parseInt(localStorage.getItem('stbExpPage')||'1');
        const perPage = 10;
        let incStart = (incPage-1)*perPage, incPaginated = stbIncome.slice(incStart, incStart+perPage);
        let expStart = (expPage-1)*perPage, expPaginated = stbExpense.slice(expStart, expStart+perPage);
        function renderStbList(items, type) {
            if(!items.length) return '<div class="transaction-item">No records</div>';
            return items.map((t,idx) => `<div class="transaction-item"><span>${t.date} → ৳${t.amount} (${t.note||''})</span><button class="edit-btn" onclick="editStb('${type}',${idx})">Edit</button></div>`).join('');
        }
        window.editStb = (type, idx) => { alert(`Edit STB ${type} at index ${idx} (API would be called)`); };
        window.addStbIncome = () => {
            let date = prompt("Date (YYYY-MM-DD)", getToday());
            let amount = prompt("Amount");
            if(amount) { /* call API */ alert("Added"); renderDashboard(); }
        };
        window.addStbExpense = () => {
            let date = prompt("Date", getToday());
            let amount = prompt("Amount");
            if(amount) { let exp = JSON.parse(localStorage.getItem('stbExpense')||'[]'); exp.push({date, amount, note:''}); localStorage.setItem('stbExpense',JSON.stringify(exp)); renderDashboard(); }
        };
        window.prevIncPage = () => { let p=parseInt(localStorage.getItem('stbIncPage')||'1'); if(p>1){ localStorage.setItem('stbIncPage',p-1); renderDashboard(); } };
        window.nextIncPage = () => { let p=parseInt(localStorage.getItem('stbIncPage')||'1'); if(p*perPage < stbIncome.length){ localStorage.setItem('stbIncPage',p+1); renderDashboard(); } };
        window.prevExpPage = () => { let p=parseInt(localStorage.getItem('stbExpPage')||'1'); if(p>1){ localStorage.setItem('stbExpPage',p-1); renderDashboard(); } };
        window.nextExpPage = () => { let p=parseInt(localStorage.getItem('stbExpPage')||'1'); if(p*perPage < stbExpense.length){ localStorage.setItem('stbExpPage',p+1); renderDashboard(); } };
        window.addLink = () => {
            let title = document.getElementById('linkTitle').value;
            let url = document.getElementById('linkUrl').value;
            let pass = document.getElementById('linkPass').value;
            if(!title) return;
            let links = JSON.parse(localStorage.getItem('linksPasswords')||'[]');
            links.push({title, url, password: pass, date: getToday()});
            localStorage.setItem('linksPasswords', JSON.stringify(links));
            renderOperatorDashboard();
        };
        window.deleteLink = (idx) => {
            let links = JSON.parse(localStorage.getItem('linksPasswords')||'[]');
            links.splice(idx,1);
            localStorage.setItem('linksPasswords', JSON.stringify(links));
            renderOperatorDashboard();
        };
        window.showAccessoryModal = async () => {
            let acc = accessories;
            let html = `<h3>Accessories Management</h3><input type="text" id="newItem" placeholder="Item name"><br><select id="assignTo"><option value="">Unassigned</option>${usersList.filter(u=>u.role==='employee').map(e=>`<option value="${e.username}">${e.name}</option>`).join('')}</select><br><textarea id="accNote" placeholder="Note"></textarea><br><button class="btn" onclick="addAccessory()">Add/Assign</button><hr>`;
            acc.forEach(a=>{ html += `<div>🔧 ${a.itemName} → ${usersList.find(u=>u.username===a.assignedTo)?.name||'Unassigned'} (${a.note||''})</div>`; });
            showModal(html);
        };
        window.addAccessory = async () => {
            let item = document.getElementById('newItem').value;
            if(!item) return;
            await callApi('addAccessory','POST',{ itemName:item, assignedTo:document.getElementById('assignTo').value, note:document.getElementById('accNote').value }, true);
            alert("Added"); closeModal(); renderDashboard();
        };
        return `
            <div class="glass-card">
                <div class="flex-between"><h2><i class="fas fa-microchip"></i> Data Operator</h2><div><button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Change Password</button> <button class="btn-outline btn-sm" onclick="logout()">Logout</button></div></div>
                <div class="cards-grid">
                    <div class="stat-card card-stb"><h3>📺 STB Income</h3><div class="amount">৳ ${incTotal.toLocaleString()}</div><button class="btn btn-sm" onclick="addStbIncome()">+ Add</button><div class="transaction-list">${renderStbList(incPaginated,'income')}</div><div class="pagination"><button class="btn-sm" onclick="prevIncPage()">◀</button> ${incPage} <button class="btn-sm" onclick="nextIncPage()">▶</button></div></div>
                    <div class="stat-card" style="background: linear-gradient(115deg,#b91c1c,#7f1d1d);"><h3>💸 STB Expense</h3><div class="amount">৳ ${expTotal.toLocaleString()}</div><button class="btn btn-sm" onclick="addStbExpense()">+ Add</button><div class="transaction-list">${renderStbList(expPaginated,'expense')}</div><div class="pagination"><button class="btn-sm" onclick="prevExpPage()">◀</button> ${expPage} <button class="btn-sm" onclick="nextExpPage()">▶</button></div></div>
                </div>
                <div class="cards-grid">
                    <div class="stat-card card-link"><h3>🛠️ Accessories</h3><div>Total: ${accessories.length} items</div><button class="btn" onclick="showAccessoryModal()">Manage</button></div>
                    <div class="stat-card"><h3>🔐 Important Links & Passwords</h3><input id="linkTitle" placeholder="Title"><input id="linkUrl" placeholder="URL"><input id="linkPass" placeholder="Password"><button class="btn" onclick="addLink()">Add</button><div class="transaction-list">${links.map((l,idx)=>`<div class="transaction-item"><span><strong>${l.title}</strong><br>${l.url} (${l.password})</span><button class="edit-btn" onclick="deleteLink(${idx})">🗑️</button></div>`).join('')}</div></div>
                </div>
            </div>
        `;
    }
    
    // =======================  এমপ্লয়ি ড্যাশবোর্ড =======================
    async function renderEmployeeDashboard(user) {
        let expenses = (await callApi('getExpenses')).data || [];
        let salaries = expenses.filter(e => e.subCategory === 'বেতন বাবদ' && e.employeeName === user.username);
        let accessories = (await callApi('getAccessories')).data || [];
        let myAcc = accessories.filter(a => a.assignedTo === user.username);
        let complaints = JSON.parse(localStorage.getItem('userComplaints')||'[]');
        let myComplaints = complaints.filter(c => c.assignedTo === user.username);
        return `
            <div class="glass-card">
                <div class="flex-between"><h2>👋 Welcome ${user.name}</h2><div><button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Change Password</button> <button class="btn-outline btn-sm" onclick="logout()">Logout</button></div></div>
                <div class="cards-grid">
                    <div class="stat-card"><h3>💰 Salary</h3>${salaries.map(s=>`${s.date}: ৳${s.amount}`).join('<br>')||'No records'}</div>
                    <div class="stat-card"><h3>🛠️ My Accessories</h3>${myAcc.map(a=>a.itemName).join(', ')||'None'}</div>
                </div>
                <div class="stat-card"><h3>📢 Complaints assigned to me</h3>${myComplaints.map(c=>`<div>⚠️ ${c.complaint} (${c.status})</div>`).join('')||'No complaints'}</div>
            </div>
        `;
    }
    
    // =======================  লগইন পৃষ্ঠা =======================
    async function renderLoginPage() {
        let attendance = (await callApi('getAttendance')).data || [];
        let todayAtt = attendance.filter(a=>a.date===getToday());
        let complaints = JSON.parse(localStorage.getItem('userComplaints')||'[]').filter(c=>c.date===getToday());
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="glass-card" style="max-width: 500px; margin: 3rem auto;">
                <div style="text-align:center"><img src="https://drive.google.com/uc?export=view&id=1aymrx1b0ZCSAw0jORyvf3iCdueU4ltwZ" class="logo-img"><h1 style="font-size:2rem;">Ainet & CCN</h1><p>Finance & Management</p></div>
                <form id="loginForm"><input type="text" id="username" placeholder="Username"><input type="password" id="password" placeholder="Password"><label><input type="checkbox" id="remember"> Remember me (7 days)</label><button type="submit" class="btn" style="width:100%">Login</button></form>
                <hr><div><strong>✅ Present today:</strong> ${todayAtt.map(a=>`<span class="badge">${usersList.find(u=>u.username===a.username)?.name||a.username}</span>`).join(' ')||'None'}</div>
                <div><strong>📢 Complaints:</strong> ${complaints.map(c=>`<div>⚠️ ${c.complaint}</div>`).join('')||'No complaints'}</div>
                <div style="text-align:center; font-size:12px; margin-top:20px;">Developed by Mehrab Jahid</div>
            </div>
        `;
        document.getElementById('loginForm').addEventListener('submit', async(e)=>{
            e.preventDefault();
            const uname = document.getElementById('username').value, pwd = document.getElementById('password').value, rem = document.getElementById('remember').checked;
            if(await login(uname,pwd,rem)) renderDashboard();
            else alert("Invalid username/password");
        });
    }
    
    async function renderDashboard() {
        const user = getStoredUser();
        if(!user) { renderLoginPage(); return; }
        currentUser = user;
        const app = document.getElementById('app');
        if(user.role === 'admin') app.innerHTML = await renderAdminDashboard();
        else if(user.role === 'accounts') app.innerHTML = await renderAccountsDashboard();
        else if(user.role === 'dataincharge') app.innerHTML = await renderInchargeDashboard();
        else if(user.role === 'dataoperator') app.innerHTML = await renderOperatorDashboard();
        else app.innerHTML = await renderEmployeeDashboard(user);
    }
    
    (async () => {
        await loadUsers();
        const u = getStoredUser();
        if(u) renderDashboard();
        else renderLoginPage();
    })();
</script>

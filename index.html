<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ainet & CCN | Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a2f44, #05161e);
            min-height: 100vh;
            padding: 20px;
            color: #1e2a3e;
        }
        .glass-card {
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
            padding: 1.5rem;
        }
        .btn {
            background: linear-gradient(105deg, #f97316, #ef4444);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #f97316;
            color: #f97316;
        }
        .btn-sm { padding: 0.3rem 1rem; font-size: 0.8rem; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .filter-bar {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.4);
            padding: 0.7rem 1rem;
            border-radius: 2.5rem;
            margin-bottom: 1.5rem;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: white;
            padding: 0.2rem 1rem;
            border-radius: 2rem;
        }
        .filter-group label { font-weight: 600; font-size: 0.85rem; }
        .filter-group input, .filter-group select {
            border: none;
            padding: 0.3rem;
            border-radius: 1.5rem;
            background: #f0f0f0;
            font-size: 0.85rem;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin: 1.5rem 0;
        }
        .stat-card {
            border-radius: 1.5rem;
            padding: 1.2rem;
            color: white;
            background: linear-gradient(115deg, #1e3c72, #2a5298);
        }
        .card-ainet { background: linear-gradient(115deg, #3b82f6, #1e3a8a); }
        .card-ccn { background: linear-gradient(115deg, #10b981, #064e3b); }
        .card-reseller-ainet { background: linear-gradient(115deg, #8b5cf6, #5b21b6); }
        .card-reseller-ccn { background: linear-gradient(115deg, #ec4899, #be185d); }
        .card-polash-ainet { background: linear-gradient(115deg, #f59e0b, #b45309); }
        .card-polash-ccn { background: linear-gradient(115deg, #f97316, #c2410c); }
        .card-stb { background: linear-gradient(115deg, #6b2e8a, #4a1d62); }
        .stat-card .amount { font-size: 1.8rem; font-weight: bold; }
        .transaction-list {
            max-height: 260px;
            overflow-y: auto;
            background: rgba(0,0,0,0.05);
            border-radius: 1.2rem;
            padding: 0.6rem;
            margin-top: 0.8rem;
        }
        .transaction-item {
            background: rgba(255,255,255,0.2);
            margin: 0.4rem 0;
            padding: 0.5rem 0.8rem;
            border-radius: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .edit-btn {
            background: #ffc107;
            border: none;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 1rem 0;
            align-items: center;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 0.5rem;
        }
        .badge {
            background: #2c5a6e;
            border-radius: 2rem;
            padding: 0.2rem 0.8rem;
            font-size: 0.75rem;
            color: white;
            display: inline-block;
            margin: 0.2rem;
        }
        input, select, textarea {
            border: 1px solid #ddd;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            width: 100%;
            margin: 0.3rem 0;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 2rem;
            padding: 1.5rem;
        }
        .serial-grid {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .serial-col {
            flex: 1;
            border-right: 2px solid #ccc;
            padding-right: 1rem;
        }
        .serial-col:last-child { border-right: none; }
        @media (max-width: 680px) {
            body { padding: 1rem; }
            .filter-group { flex-wrap: wrap; }
            .serial-col { border-right: none; }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // =======================  কনফিগার =======================
    // আপনার গুগল অ্যাপস স্ক্রিপ্ট URL এখানে বসান (যা আগে ছিল)
    const API_URL = 'https://script.google.com/macros/s/AKfycbzWiBng40BJfqfahqbWu5t2R46xmFmzfZ_-ynzO-GUP2mJDjZ9G8rgIzbHkFNySDeJu8A/exec';
    
    // ডিফল্ট ইউজার (API কাজ না করলে ব্যাকআপ)
    const DEFAULT_USERS = [
        { username: "admin", password: "admin123", role: "admin", name: "Admin" },
        { username: "accounts", password: "acc123", role: "accounts", name: "Accounts" },
        { username: "incharge", password: "inch123", role: "dataincharge", name: "Incharge" },
        { username: "operator", password: "op123", role: "dataoperator", name: "Operator" },
        { username: "noyon", password: "123456", role: "employee", name: "Noyon" }
    ];
    
    let currentUser = null;
    let usersList = [];
    let cache = {};
    
    function getToday() { return new Date().toISOString().slice(0,10); }
    function isEditable(editableUntil) { return editableUntil ? new Date() < new Date(editableUntil) : true; }
    
    // লোকাল স্টোরেজ ব্যাকআপ
    let localIncome = JSON.parse(localStorage.getItem('localIncome') || '[]');
    let localExpense = JSON.parse(localStorage.getItem('localExpense') || '[]');
    let localRecharge = JSON.parse(localStorage.getItem('localRecharge') || '[]');
    let localAttendance = JSON.parse(localStorage.getItem('localAttendance') || '[]');
    let localSTB = JSON.parse(localStorage.getItem('localSTB') || '[]');
    let localAccessories = JSON.parse(localStorage.getItem('localAccessories') || '[]');
    
    async function callApi(action, method = 'GET', payload = null, force = false) {
        const key = `${action}_${method}_${payload ? JSON.stringify(payload) : ''}`;
        if (!force && cache[key] && (Date.now() - cache[key].ts < 60000)) return cache[key].data;
        try {
            let res;
            if (method === 'GET') {
                const url = `${API_URL}?action=${action}&t=${Date.now()}`;
                const response = await fetch(url);
                res = await response.json();
                console.log(`API GET ${action}:`, res);
            } else {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                res = await response.json();
                console.log(`API POST ${action}:`, res);
            }
            cache[key] = { data: res, ts: Date.now() };
            return res;
        } catch (err) {
            console.error("API call failed:", err);
            // লোকাল ব্যাকআপ
            if (method === 'POST') {
                if (action === 'addIncome') {
                    localIncome.push(payload);
                    localStorage.setItem('localIncome', JSON.stringify(localIncome));
                    return { success: true, local: true };
                }
                if (action === 'addExpense') {
                    localExpense.push(payload);
                    localStorage.setItem('localExpense', JSON.stringify(localExpense));
                    return { success: true, local: true };
                }
                if (action === 'addRecharge') {
                    localRecharge.push(payload);
                    localStorage.setItem('localRecharge', JSON.stringify(localRecharge));
                    return { success: true, local: true };
                }
                if (action === 'addAttendance') {
                    localAttendance.push(payload);
                    localStorage.setItem('localAttendance', JSON.stringify(localAttendance));
                    return { success: true, local: true };
                }
            }
            return { success: false, error: err.message };
        }
    }
    
    async function loadUsers() {
        const res = await callApi('getUsers');
        usersList = (res.success && res.data && res.data.length) ? res.data : DEFAULT_USERS;
        return usersList;
    }
    
    async function login(username, password, remember) {
        await loadUsers();
        const user = usersList.find(u => u.username === username && u.password === password);
        if (user) {
            currentUser = { ...user, password };
            const data = { username: user.username, role: user.role, name: user.name, password };
            if (remember) localStorage.setItem('currentUser', JSON.stringify(data));
            sessionStorage.setItem('currentUser', JSON.stringify(data));
            return true;
        }
        return false;
    }
    
    function getStoredUser() {
        const sess = sessionStorage.getItem('currentUser');
        if (sess) return JSON.parse(sess);
        const loc = localStorage.getItem('currentUser');
        return loc ? JSON.parse(loc) : null;
    }
    
    function logout() {
        sessionStorage.clear();
        localStorage.removeItem('currentUser');
        renderLoginPage();
    }
    
    function showModal(content) {
        let m = document.querySelector('.modal');
        if (m) m.remove();
        m = document.createElement('div');
        m.className = 'modal';
        m.innerHTML = `<div class="modal-content"><span style="float:right; font-size:26px; cursor:pointer;" onclick="this.parentElement.parentElement.remove()">&times;</span>${content}</div>`;
        document.body.appendChild(m);
    }
    
    // ========== পাসওয়ার্ড পরিবর্তন ==========
    window.showChangePasswordModal = function() {
        showModal(`
            <h3>🔐 Change Password</h3>
            <input type="password" id="oldPass" placeholder="Current Password"><br>
            <input type="password" id="newPass1" placeholder="New Password (min 4 chars)"><br>
            <input type="password" id="newPass2" placeholder="Retype new password"><br>
            <button class="btn" onclick="changePassword()">Update</button>
        `);
    };
    window.changePassword = async function() {
        const old = document.getElementById('oldPass').value;
        const new1 = document.getElementById('newPass1').value;
        const new2 = document.getElementById('newPass2').value;
        if (new1 !== new2) { alert("Passwords don't match"); return; }
        if (new1.length < 4) { alert("Minimum 4 characters"); return; }
        const user = getStoredUser();
        if (user.password !== old) { alert("Current password wrong"); return; }
        const res = await callApi('updatePassword', 'POST', { username: user.username, newPassword: new1 }, true);
        if (res.success) { alert("Password changed. Please login again."); logout(); }
        else alert("Failed: " + (res.error || "Unknown"));
    };
    
    // ========== এডমিন: ইউজার যোগ ==========
    window.showAddUserModal = function() {
        showModal(`
            <h3>➕ Add Employee</h3>
            <input type="text" id="newUsername" placeholder="Username"><br>
            <input type="text" id="newName" placeholder="Full Name"><br>
            <input type="password" id="newPassword" placeholder="Password"><br>
            <button class="btn" onclick="addNewUser()">Add</button>
        `);
    };
    window.addNewUser = async function() {
        const username = document.getElementById('newUsername').value.trim();
        const name = document.getElementById('newName').value.trim();
        const pwd = document.getElementById('newPassword').value.trim();
        if (!username || !name || !pwd) { alert("All fields required"); return; }
        if (pwd.length < 4) { alert("Password min 4 chars"); return; }
        const res = await callApi('addUser', 'POST', { username, password: pwd, role: 'employee', name }, true);
        if (res.success) { alert("User added!"); closeModal(); await loadUsers(); renderDashboard(); }
        else alert("Failed: " + (res.message || "Username exists"));
    };
    
    // =======================  আয় ও ব্যয় ফাংশন (Accounts) =======================
    window.showIncomeForm = function(cat) {
        showModal(`
            <h3>➕ Add Income (${cat})</h3>
            <input type="number" id="cash" placeholder="Cash"><br>
            <input type="number" id="office" placeholder="Office Collection"><br>
            <input type="number" id="online" placeholder="Online/Bikash"><br>
            <input type="number" id="deposit" placeholder="Deposit"><br>
            <textarea id="note" placeholder="Note"></textarea><br>
            <button class="btn" onclick="saveIncome('${cat}')">Save</button>
        `);
    };
    window.saveIncome = async function(cat) {
        const total = (+document.getElementById('cash').value||0) + (+document.getElementById('office').value||0) + (+document.getElementById('online').value||0) + (+document.getElementById('deposit').value||0);
        if (!total) { alert("Amount required"); return; }
        const payload = {
            category: cat,
            amount: total,
            date: getToday(),
            note: document.getElementById('note').value,
            branch: 'main',
            editableUntil: new Date(Date.now() + 16*60*60*1000).toISOString()
        };
        const res = await callApi('addIncome', 'POST', payload, true);
        if (res.success) {
            alert("Income added successfully!");
            closeModal();
            renderDashboard();
        } else {
            alert("Failed to add income. Check console.\nError: " + (res.error || "Unknown"));
        }
    };
    
    window.showExpenseForm = function(cat) {
        const subcats = ['ডিপিএস','বিদ্যুৎ বিল','অফিস খরচ','বেতন বাবদ','টিজি/প্যাচকট','ফাইবার ক্রয়','যন্ত্রাংশ ক্রয়','স্প্লিটার','বিবিধ','মেইন্টেন্স বাবদ','দানবাবদ','যাতায়াত','মোবাইল বিল','ইন্টারনেট বিল','আপ্যায়ন','কুরিয়ার খরচ','ব্যাংক জমা','তার ক্রয়','স্যার নিজ খরচ','ম্যাডাম খরচ'];
        let empHtml = `<div id="empDiv" style="display:none;"><select id="employee">${usersList.filter(e=>e.role==='employee').map(e=>`<option value="${e.username}">${e.name}</option>`).join('')}</select></div>`;
        showModal(`
            <h3>➕ Add Expense (${cat})</h3>
            <select id="subCat">${subcats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
            ${empHtml}
            <input type="number" id="amount" placeholder="Amount"><br>
            <textarea id="note" placeholder="Note"></textarea><br>
            <button class="btn" onclick="saveExpense('${cat}')">Save</button>
        `);
        const sub = document.getElementById('subCat');
        const empDiv = document.getElementById('empDiv');
        sub.addEventListener('change', () => { empDiv.style.display = sub.value === 'বেতন বাবদ' ? 'block' : 'none'; });
        empDiv.style.display = sub.value === 'বেতন বাবদ' ? 'block' : 'none';
    };
    window.saveExpense = async function(cat) {
        const subCat = document.getElementById('subCat').value;
        const amount = +document.getElementById('amount').value;
        if (!amount) { alert("Amount required"); return; }
        const employee = (subCat === 'বেতন বাবদ') ? document.getElementById('employee')?.value : null;
        const payload = {
            mainCategory: cat,
            subCategory: subCat,
            amount: amount,
            date: getToday(),
            note: document.getElementById('note').value,
            employeeName: employee,
            editableUntil: new Date(Date.now() + 16*60*60*1000).toISOString()
        };
        const res = await callApi('addExpense', 'POST', payload, true);
        if (res.success) {
            alert("Expense added successfully!");
            closeModal();
            renderDashboard();
        } else {
            alert("Failed to add expense. Check console.");
        }
    };
    
    // =======================  এডমিন ড্যাশবোর্ড (সংক্ষিপ্ত) =======================
    async function renderAdminDashboard() {
        let incomes = (await callApi('getIncomes')).data || [];
        let expenses = (await callApi('getExpenses')).data || [];
        let stb = (await callApi('getSTBIncomes')).data || [];
        let attendance = (await callApi('getAttendance')).data || [];
        const today = getToday();
        incomes = incomes.filter(i => i.date === today);
        expenses = expenses.filter(e => e.date === today);
        stb = stb.filter(s => s.date === today);
        const categories = [
            { key: 'Ainet', label: 'Ainet', cardClass: 'card-ainet' },
            { key: 'CCN', label: 'CCN', cardClass: 'card-ccn' },
            { key: 'পলাশবাড়ী CCN', label: 'Polash CCN', cardClass: 'card-polash-ccn' },
            { key: 'রিসেলার Ainet', label: 'Reseller Ainet', cardClass: 'card-reseller-ainet' },
            { key: 'রিসেলার CCN', label: 'Reseller CCN', cardClass: 'card-reseller-ccn' },
            { key: 'পলাশবাড়ী Ainet', label: 'Polash Ainet', cardClass: 'card-polash-ainet' },
            { key: 'STB', label: 'STB Income', cardClass: 'card-stb' }
        ];
        let catStats = {};
        for (let c of categories) {
            if (c.key === 'STB') {
                catStats[c.key] = { balance: stb.reduce((s,i)=>s+i.amount,0) };
            } else {
                let inc = incomes.filter(i=>i.category===c.key).reduce((s,i)=>s+i.amount,0);
                let exp = expenses.filter(e=>e.mainCategory===c.key).reduce((s,e)=>s+e.amount,0);
                catStats[c.key] = { balance: inc - exp };
            }
        }
        let catDetails = {};
        for (let c of categories) {
            if (c.key === 'STB') {
                catDetails[c.key] = stb.map(t => `${t.date} → STB: ৳${t.amount} (${t.note||''})`);
            } else {
                let incTexts = incomes.filter(i=>i.category===c.key).map(i=>`${i.date} → Income: ৳${i.amount} (${i.note||''})`);
                let expTexts = expenses.filter(e=>e.mainCategory===c.key).map(e=>`${e.date} → Expense (${e.subCategory}): ৳${e.amount} (${e.note||''})`);
                catDetails[c.key] = [...incTexts, ...expTexts];
            }
        }
        return `
            <div class="glass-card">
                <div class="flex-between"><h2><i class="fas fa-user-shield"></i> Admin Dashboard</h2><div><button class="btn-outline btn-sm" onclick="showAddUserModal()">➕ New User</button> <button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Change Password</button> <button class="btn-outline btn-sm" onclick="logout()">Logout</button></div></div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-bottom: 1rem;">
                    <div style="background: #2c5a6e; border-radius: 2rem; padding: 0.5rem 1rem;"><i class="fas fa-calendar-check"></i> Present: ${attendance.filter(a=>a.date===today).length}<br><small>${attendance.filter(a=>a.date===today).map(a=>usersList.find(u=>u.username===a.username)?.name||a.username).join(', ')}</small></div>
                    <div style="background: #2c5a6e; border-radius: 2rem; padding: 0.5rem 1rem;"><i class="fas fa-exclamation-triangle"></i> Complaints: 0</div>
                </div>
                <div class="cards-grid">
                    ${categories.map(c => `
                        <div class="stat-card ${c.cardClass}">
                            <h4>${c.label}</h4>
                            <div class="amount">৳ ${catStats[c.key].balance.toLocaleString()}</div>
                            <div class="transaction-list">${catDetails[c.key].slice(0,3).map(t=>`<div class="transaction-item">${t}</div>`).join('')}</div>
                        </div>
                    `).join('')}
                </div>
                <button class="btn" onclick="window.print()">Print</button>
            </div>
        `;
    }
    
    // =======================  একাউন্টস ড্যাশবোর্ড =======================
    async function renderAccountsDashboard() {
        let filterDate = localStorage.getItem('accDate') || getToday();
        let filterCategory = localStorage.getItem('accCategory') || 'Ainet';
        let filterType = localStorage.getItem('accType') || 'income';
        
        let incomes = (await callApi('getIncomes')).data || [];
        let expenses = (await callApi('getExpenses')).data || [];
        incomes = incomes.filter(i => i.date === filterDate && i.category === filterCategory);
        expenses = expenses.filter(e => e.date === filterDate && e.mainCategory === filterCategory);
        
        let total = filterType === 'income' ? incomes.reduce((s,i)=>s+i.amount,0) : expenses.reduce((s,e)=>s+e.amount,0);
        let netBalance = incomes.reduce((s,i)=>s+i.amount,0) - expenses.reduce((s,e)=>s+e.amount,0);
        let list = filterType === 'income' ? incomes : expenses;
        
        window.applyAccFilters = () => {
            localStorage.setItem('accDate', document.getElementById('accDate').value);
            localStorage.setItem('accCategory', document.getElementById('accCategory').value);
            localStorage.setItem('accType', document.getElementById('accType').value);
            renderDashboard();
        };
        window.resetAccFilters = () => {
            localStorage.removeItem('accDate'); localStorage.removeItem('accCategory'); localStorage.removeItem('accType');
            renderDashboard();
        };
        
        let attendance = (await callApi('getAttendance')).data || [];
        let todayAtt = attendance.filter(a=>a.date===getToday());
        
        return `
            <div class="glass-card">
                <div class="flex-between"><h2><i class="fas fa-chart-line"></i> Accounts Dashboard</h2><div><button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Change Password</button> <button class="btn-outline btn-sm" onclick="logout()">Logout</button></div></div>
                <div class="filter-bar">
                    <div class="filter-group"><label>Date:</label><input type="date" id="accDate" value="${filterDate}"></div>
                    <div class="filter-group"><label>Category:</label><select id="accCategory"><option value="Ainet" ${filterCategory==='Ainet'?'selected':''}>Ainet</option><option value="CCN" ${filterCategory==='CCN'?'selected':''}>CCN</option><option value="পলাশবাড়ী Ainet" ${filterCategory==='পলাশবাড়ী Ainet'?'selected':''}>Polash Ainet</option><option value="পলাশবাড়ী CCN" ${filterCategory==='পলাশবাড়ী CCN'?'selected':''}>Polash CCN</option><option value="রিসেলার Ainet" ${filterCategory==='রিসেলার Ainet'?'selected':''}>Reseller Ainet</option><option value="রিসেলার CCN" ${filterCategory==='রিসেলার CCN'?'selected':''}>Reseller CCN</option></select></div>
                    <div class="filter-group"><label>Type:</label><select id="accType"><option value="income" ${filterType==='income'?'selected':''}>Income</option><option value="expense" ${filterType==='expense'?'selected':''}>Expense</option></select></div>
                    <button class="btn" onclick="applyAccFilters()">Apply</button><button class="btn-outline" onclick="resetAccFilters()">Reset</button>
                </div>
                <div class="stat-card">
                    <h3>${filterCategory} - ${filterType}</h3>
                    <div class="amount">৳ ${total.toLocaleString()}</div>
                    <div>Net Balance: ৳ ${netBalance.toLocaleString()}</div>
                    <div class="flex-gap" style="margin-top:1rem;">
                        <button class="btn" onclick="showIncomeForm('${filterCategory}')">➕ Add Income</button>
                        <button class="btn" onclick="showExpenseForm('${filterCategory}')">➕ Add Expense</button>
                    </div>
                </div>
                <div class="transaction-list">
                    ${list.map(t => `<div class="transaction-item">${t.date} → ৳${t.amount} (${t.note||''})</div>`).join('') || 'No transactions'}
                </div>
                <div style="margin-top: 1rem;"><h3>📋 Today's Attendance</h3><div class="transaction-list">${todayAtt.map(a=>`<div class="transaction-item">${usersList.find(u=>u.username===a.username)?.name||a.username} → ${a.status} (${a.note||''})</div>`).join('')||'No records'}</div></div>
            </div>
        `;
    }
    
    // =======================  ডাটা ইনচার্জ ড্যাশবোর্ড =======================
    async function renderInchargeDashboard() {
        let filterDate = localStorage.getItem('inchargeDate') || '';
        let page = parseInt(localStorage.getItem('inchargePage')||'1');
        const rowsPerPage = 20;
        let recharges = (await callApi('getRecharges')).data || [];
        if (filterDate) recharges = recharges.filter(r => r.date === filterDate);
        let cashList = recharges.filter(r=>r.method==='cash');
        let bikashList = recharges.filter(r=>r.method==='bikash');
        const start = (page-1)*rowsPerPage;
        const pagCash = cashList.slice(start, start+rowsPerPage);
        const pagBikash = bikashList.slice(start, start+rowsPerPage);
        let cashRows='', bikashRows='';
        for(let i=0; i<rowsPerPage; i++){
            const c = pagCash[i]||null, b = pagBikash[i]||null;
            cashRows += `<div style="display:flex; gap:6px; margin-bottom:6px;"><input type="text" id="cash_id_${i}" placeholder="ID" value="${c?.userId||''}" style="flex:2"><input type="text" id="cash_name_${i}" placeholder="Name" value="${c?.userName||''}" style="flex:2"><input type="number" id="cash_amount_${i}" placeholder="Amount" value="${c?.amount||''}" style="flex:1"><button class="btn-sm" onclick="saveCashRow(${i})">Save</button></div>`;
            bikashRows += `<div style="display:flex; gap:6px; margin-bottom:6px;"><input type="text" id="bikash_id_${i}" placeholder="ID" value="${b?.userId||''}" style="flex:2"><input type="text" id="bikash_name_${i}" placeholder="Name" value="${b?.userName||''}" style="flex:2"><input type="number" id="bikash_amount_${i}" placeholder="Amount" value="${b?.amount||''}" style="flex:1"><button class="btn-sm" onclick="saveBikashRow(${i})">Save</button></div>`;
        }
        window.saveCashRow = async (i) => {
            let uid = document.getElementById(`cash_id_${i}`).value;
            let uname = document.getElementById(`cash_name_${i}`).value;
            let amt = parseFloat(document.getElementById(`cash_amount_${i}`).value);
            if(amt) await callApi('addRecharge','POST',{ type:'internet', method:'cash', userId:uid, userName:uname, amount:amt, date:getToday(), note:'', editableUntil:new Date(Date.now()+16*3600000).toISOString() }, true);
            alert("Saved"); renderDashboard();
        };
        window.saveBikashRow = async (i) => {
            let uid = document.getElementById(`bikash_id_${i}`).value;
            let uname = document.getElementById(`bikash_name_${i}`).value;
            let amt = parseFloat(document.getElementById(`bikash_amount_${i}`).value);
            if(amt) await callApi('addRecharge','POST',{ type:'internet', method:'bikash', userId:uid, userName:uname, amount:amt, date:getToday(), note:'', editableUntil:new Date(Date.now()+16*3600000).toISOString() }, true);
            alert("Saved"); renderDashboard();
        };
        window.filterIncharge = () => {
            localStorage.setItem('inchargeDate', document.getElementById('inchargeDate').value);
            localStorage.setItem('inchargePage', '1');
            renderDashboard();
        };
        window.clearInchargeFilter = () => {
            localStorage.removeItem('inchargeDate');
            localStorage.setItem('inchargePage', '1');
            renderDashboard();
        };
        window.prevInchargePage = () => { let p=parseInt(localStorage.getItem('inchargePage')||'1'); if(p>1){ localStorage.setItem('inchargePage',p-1); renderDashboard(); } };
        window.nextInchargePage = () => { let p=parseInt(localStorage.getItem('inchargePage')||'1'); if(p*rowsPerPage < Math.max(cashList.length, bikashList.length)){ localStorage.setItem('inchargePage',p+1); renderDashboard(); } };
        
        return `
            <div class="glass-card">
                <div class="flex-between"><h2><i class="fas fa-tower-broadcast"></i> Data Incharge</h2><div><button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Change Password</button> <button class="btn-outline btn-sm" onclick="logout()">Logout</button></div></div>
                <div class="filter-bar">
                    <div class="filter-group"><label>Date:</label><input type="date" id="inchargeDate" value="${filterDate}"></div>
                    <button class="btn" onclick="filterIncharge()">Filter</button>
                    <button class="btn-outline" onclick="clearInchargeFilter()">Clear</button>
                </div>
                <div class="serial-grid">
                    <div class="serial-col"><h3>💵 Cash Recharge</h3>${cashRows}</div>
                    <div class="serial-col"><h3>📱 Bikash Recharge</h3>${bikashRows}</div>
                </div>
                <div class="pagination"><button class="btn" onclick="prevInchargePage()">◀</button> Page ${page} <button class="btn" onclick="nextInchargePage()">▶</button></div>
                <button class="btn" style="margin-top:1rem;" onclick="showAttendanceForm()">📋 Mark Attendance</button>
                <button class="btn" onclick="showComplaintEntry()">📢 Complaint Entry</button>
            </div>
        `;
    }
    
    window.showAttendanceForm = function() {
        let empOptions = usersList.filter(u=>u.role==='employee').map(u=>`<option value="${u.username}">${u.name}</option>`).join('');
        showModal(`
            <h3>Mark Attendance</h3>
            <select id="attEmp">${empOptions}</select>
            <select id="attStatus"><option value="present">Present</option><option value="absent">Absent</option><option value="late">Late</option></select>
            <textarea id="attNote" placeholder="Note"></textarea>
            <button class="btn" onclick="saveAttendance()">Save</button>
        `);
    };
    window.saveAttendance = async function() {
        await callApi('addAttendance','POST',{ username:document.getElementById('attEmp').value, status:document.getElementById('attStatus').value, date:getToday(), note:document.getElementById('attNote').value, lateTime:'' }, true);
        alert("Attendance saved"); closeModal(); renderDashboard();
    };
    window.showComplaintEntry = function() {
        let empOptions = `<option value="">-- None --</option>` + usersList.filter(u=>u.role==='employee').map(e=>`<option value="${e.username}">${e.name}</option>`).join('');
        showModal(`
            <h3>New Complaint</h3>
            <textarea id="compText" rows="3" placeholder="Write complaint..."></textarea>
            <select id="compEmployee">${empOptions}</select>
            <select id="compStatus"><option value="pending">pending</option><option value="processing">processing</option></select>
            <button class="btn" onclick="submitComplaint()">Submit</button>
        `);
    };
    window.submitComplaint = function() {
        let text = document.getElementById('compText').value;
        if(!text) { alert("Write complaint"); return; }
        let emp = document.getElementById('compEmployee').value || null;
        let status = document.getElementById('compStatus').value;
        let comps = JSON.parse(localStorage.getItem('userComplaints')||'[]');
        comps.push({ date: getToday(), complaint: text, status, assignedTo: emp });
        localStorage.setItem('userComplaints', JSON.stringify(comps));
        alert("Complaint added"); closeModal(); renderDashboard();
    };
    
    // =======================  ডাটা অপারেটর ও এমপ্লয়ি =======================
    async function renderOperatorDashboard() {
        let stbIncome = (await callApi('getSTBIncomes')).data || [];
        let totalSTB = stbIncome.reduce((s,i)=>s+i.amount,0);
        let accessories = (await callApi('getAccessories')).data || [];
        let links = JSON.parse(localStorage.getItem('linksPasswords')||'[]');
        window.addLink = function() {
            let title = document.getElementById('linkTitle').value;
            let url = document.getElementById('linkUrl').value;
            let pass = document.getElementById('linkPass').value;
            if(!title) return;
            links.push({title, url, password: pass, date: getToday()});
            localStorage.setItem('linksPasswords', JSON.stringify(links));
            renderOperatorDashboard();
        };
        window.deleteLink = function(idx) {
            links.splice(idx,1);
            localStorage.setItem('linksPasswords', JSON.stringify(links));
            renderOperatorDashboard();
        };
        return `
            <div class="glass-card">
                <div class="flex-between"><h2><i class="fas fa-microchip"></i> Data Operator</h2><div><button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Change Password</button> <button class="btn-outline btn-sm" onclick="logout()">Logout</button></div></div>
                <div class="cards-grid">
                    <div class="stat-card card-stb"><h3>📺 STB Income</h3><div class="amount">৳ ${totalSTB.toLocaleString()}</div><button class="btn" onclick="alert('Add STB income')">+ Add</button></div>
                    <div class="stat-card card-link"><h3>🛠️ Accessories</h3><div>Total: ${accessories.length} items</div><button class="btn" onclick="alert('Manage accessories')">Manage</button></div>
                </div>
                <div class="stat-card"><h3>🔐 Important Links</h3><input id="linkTitle" placeholder="Title"><input id="linkUrl" placeholder="URL"><input id="linkPass" placeholder="Password"><button class="btn" onclick="addLink()">Add</button><div class="transaction-list">${links.map((l,idx)=>`<div class="transaction-item">${l.title} → ${l.url} (${l.password}) <button class="edit-btn" onclick="deleteLink(${idx})">Del</button></div>`).join('')}</div></div>
            </div>
        `;
    }
    
    async function renderEmployeeDashboard(user) {
        let expenses = (await callApi('getExpenses')).data || [];
        let salaries = expenses.filter(e => e.subCategory === 'বেতন বাবদ' && e.employeeName === user.username);
        let accessories = (await callApi('getAccessories')).data || [];
        let myAcc = accessories.filter(a => a.assignedTo === user.username);
        let complaints = JSON.parse(localStorage.getItem('userComplaints')||'[]');
        let myComplaints = complaints.filter(c => c.assignedTo === user.username);
        return `
            <div class="glass-card">
                <div class="flex-between"><h2>👋 Welcome ${user.name}</h2><div><button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Change Password</button> <button class="btn-outline btn-sm" onclick="logout()">Logout</button></div></div>
                <div class="cards-grid">
                    <div class="stat-card"><h3>💰 Salary</h3>${salaries.map(s=>`${s.date}: ৳${s.amount}`).join('<br>')||'No records'}</div>
                    <div class="stat-card"><h3>🛠️ My Accessories</h3>${myAcc.map(a=>a.itemName).join(', ')||'None'}</div>
                </div>
                <div class="stat-card"><h3>📢 Complaints assigned to me</h3>${myComplaints.map(c=>`<div>⚠️ ${c.complaint} (${c.status})</div>`).join('')||'No complaints'}</div>
            </div>
        `;
    }
    
    // =======================  লগইন পৃষ্ঠা =======================
    async function renderLoginPage() {
        let attendance = (await callApi('getAttendance')).data || [];
        let todayAtt = attendance.filter(a=>a.date===getToday());
        let complaints = JSON.parse(localStorage.getItem('userComplaints')||'[]').filter(c=>c.date===getToday());
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="glass-card" style="max-width: 500px; margin: 3rem auto;">
                <div style="text-align:center">
                    <img src="https://drive.google.com/uc?export=view&id=1aymrx1b0ZCSAw0jORyvf3iCdueU4ltwZ" class="logo-img">
                    <h1 style="font-size:2rem;">Ainet & CCN</h1>
                    <p>Finance & Management</p>
                </div>
                <form id="loginForm">
                    <input type="text" id="username" placeholder="Username">
                    <input type="password" id="password" placeholder="Password">
                    <label><input type="checkbox" id="remember"> Remember me (7 days)</label>
                    <button type="submit" class="btn" style="width:100%">Login</button>
                </form>
                <hr>
                <div><strong>✅ Present today:</strong> ${todayAtt.map(a=>`<span class="badge">${usersList.find(u=>u.username===a.username)?.name||a.username}</span>`).join(' ') || 'None'}</div>
                <div><strong>📢 Complaints:</strong> ${complaints.map(c=>`<div>⚠️ ${c.complaint}</div>`).join('') || 'No complaints'}</div>
                <div style="text-align:center; font-size:12px; margin-top:20px;">Developed by Mehrab Jahid</div>
            </div>
        `;
        document.getElementById('loginForm').addEventListener('submit', async(e)=>{
            e.preventDefault();
            const uname = document.getElementById('username').value, pwd = document.getElementById('password').value, rem = document.getElementById('remember').checked;
            if (await login(uname, pwd, rem)) renderDashboard();
            else alert("Invalid username/password");
        });
    }
    
    async function renderDashboard() {
        const user = getStoredUser();
        if (!user) { renderLoginPage(); return; }
        currentUser = user;
        const app = document.getElementById('app');
        if (user.role === 'admin') app.innerHTML = await renderAdminDashboard();
        else if (user.role === 'accounts') app.innerHTML = await renderAccountsDashboard();
        else if (user.role === 'dataincharge') app.innerHTML = await renderInchargeDashboard();
        else if (user.role === 'dataoperator') app.innerHTML = await renderOperatorDashboard();
        else app.innerHTML = await renderEmployeeDashboard(user);
    }
    
    (async () => {
        await loadUsers();
        const u = getStoredUser();
        if (u) renderDashboard();
        else renderLoginPage();
    })();
</script>

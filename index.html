    .nav-pills .nav-link { color: var(--dark); border-radius: 8px; padding: 8px 16px; margin: 0 4px; }
    .nav-pills .nav-link.active { background: var(--primary); color: #fff; }
    .nav-tabs .nav-link { border-radius: 8px 8px 0 0; }
    .nav-tabs .nav-link.active { font-weight: 600; }
    .present-badge { background: #d4edda; color: #155724; padding: 6px 12px; border-radius: 20px; font-weight: 500; }
    .absent-badge { background: #f8d7da; color: #721c24; padding: 6px 12px; border-radius: 20px; font-weight: 500; }
    .late-badge { background: #fff3cd; color: #856404; padding: 6px 12px; border-radius: 20px; font-weight: 500; }

    .recharge-row input, .recharge-row select { font-size: 0.75rem; padding: 4px 6px; }

    .attendance-row .form-select { width: 130px; font-size: 0.8rem; }
    .color-bar { height: 4px; border-radius: 2px; margin-top: 4px; }

<div id="loginPage" class="container py-4">
  <div class="text-center mb-3">
    <div class="logo-text">𝑨𝒊𝒏𝒆𝒕 & 𝑪𝑪𝑵</div>

  </div>
  <div class="card card-custom mx-auto" style="max-width: 400px;">
    <div class="card-body">
      <h5 class="card-title text-center mb-3">লগ ইন</h5>
      <div class="mb-2"><input type="text" id="loginUsername" class="form-control" placeholder="ইউজারনেম"></div>

</div>

<div id="mainApp" class="hidden">
  <nav class="navbar navbar-dark bg-dark">
    <span class="navbar-brand ms-2" id="roleTitle">ড্যাশবোর্ড</span>
    <div>
      <button class="btn btn-outline-warning btn-sm me-1" onclick="changePassword()"><i class="bi bi-key"></i> পাসওয়ার্ড</button>
      <button class="btn btn-outline-light btn-sm me-1" onclick="window.print()"><i class="bi bi-printer"></i></button>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzBUPjUdLcHkVwSqDLHyKqzuu_3UkRWZi37xp_JlcY5E1UBrNfJlgVeJt4mMDGh31KeHw/exec';
let token = localStorage.getItem('token') || sessionStorage.getItem('token');
let role = localStorage.getItem('role') || sessionStorage.getItem('role');

$(function(){ if(token && role) checkSessionAndStart(); else showLogin(); });
function showLogin(){ $('#loginPage').removeClass('hidden'); $('#mainApp').addClass('hidden'); }
function showApp(){ $('#loginPage').addClass('hidden'); $('#mainApp').removeClass('hidden'); $('#roleTitle').text(role + ' প্যানেল'); loadDashboard(role); }

async function apiCall(action, params={}){
  params.action = action; if(!params.token && token) params.token = token;
  try {
    const resp = await fetch(SCRIPT_URL, { method:'POST', body: new URLSearchParams(params), headers:{'Content-Type':'application/x-www-form-urlencoded'} });
    return await resp.json();
  } catch(e){ alert('নেটওয়ার্ক ত্রুটি'); return null; }
}

async function handleLogin(){
  const u = $('#loginUsername').val().trim(), p = $('#loginPassword').val().trim();
  if(!u || !p){ $('#loginError').text('ইউজারনেম ও পাসওয়ার্ড দিন'); return; }
  const res = await apiCall('login', { username:u, password:p });
  if(res && res.success){
    if($('#rememberMe').is(':checked')){ localStorage.setItem('token',res.token); localStorage.setItem('role',res.role); }
    else { sessionStorage.setItem('token',res.token); sessionStorage.setItem('role',res.role); }
    token=res.token; role=res.role; checkSessionAndStart();
  } else { $('#loginError').text(res?res.message:'লগইন ব্যর্থ'); }
}

async function checkSessionAndStart(){
  const res = await apiCall('getUserInfo');
  if(res && res.role) showApp(); else { localStorage.clear(); sessionStorage.clear(); token=null; role=null; showLogin(); }
}

async function logout(){ await apiCall('logout'); localStorage.clear(); sessionStorage.clear(); token=null; role=null; showLogin(); }

async function changePassword(){
  const oldPass = prompt('বর্তমান পাসওয়ার্ড:'); if(!oldPass) return;
  const newPass = prompt('নতুন পাসওয়ার্ড (৪+ ক্যারেক্টার):'); if(!newPass || newPass.length<4) return;
  const confirm = prompt('নতুন পাসওয়ার্ড আবার:'); if(newPass !== confirm) { alert('মিলছে না'); return; }
  const res = await apiCall('changePassword', { oldPassword:oldPass, newPassword:newPass });
  if(res && res.success) alert('পাসওয়ার্ড পরিবর্তন সফল!'); else alert(res?res.message:'ব্যর্থ');
}

async function loadDashboard(r){
  const cont = $('#dynamicContent').empty();
  cont.html('<div class="text-center mt-5"><div class="spinner-border"></div><p>লোড হচ্ছে...</p></div>');
  switch(r.trim().toLowerCase()){
    case 'admin': await renderAdmin(cont); break;
    case 'accounts': await renderAccounts(cont); break;
    case 'data incharge': await renderIncharge(cont); break;
    case 'data operator': await renderOperator(cont); break;
    case 'employee': await renderEmployee(cont); break;
    default: cont.html('<div class="alert alert-danger">অননুমোদিত রোল</div>');
  }
}

// ==================== ADMIN ====================

  </ul>
  <div class="tab-content">
    <div class="tab-pane fade show active" id="tabOverview">
      <div class="row g-2 mb-3">
        <div class="col-6 col-md-3"><div class="summary-card"><small>মোট আয়</small><h3>${s.accounts.totalIncome} টাকা</h3><small class="text-success">আজ: ${s.accounts.todayIncome}</small></div></div>
        <div class="col-6 col-md-3"><div class="summary-card"><small>মোট ব্যয়</small><h3>${s.accounts.totalExpense} টাকা</h3><small class="text-danger">আজ: ${s.accounts.todayExpense}</small></div></div>
        <div class="col-6 col-md-3"><div class="summary-card"><small>আজ রিচার্জ</small><h3>${s.recharge.todayTotal} টাকা</h3><small>ক্যাশ: ${s.recharge.todayCash} | বিকাশ: ${s.recharge.todayBkash}</small></div></div>
        <div class="col-6 col-md-3"><div class="summary-card"><small>উপস্থিতি</small><h3>${s.attendance.present} জন</h3><small>অনুপস্থিত: ${s.attendance.absent} | লেট: ${s.attendance.late}</small></div></div>
      </div>
      <div class="row g-2 mb-3">
        <div class="col-6 col-md-3"><div class="summary-card"><small>এসটিবি (আজ)</small><h3>${s.stb.todayTotal} টাকা</h3></div></div>
        <div class="col-6 col-md-3"><div class="summary-card"><small>এসটিবি (মাস)</small><h3>${s.stb.monthTotal} টাকা</h3></div></div>
        <div class="col-6 col-md-3"><div class="summary-card"><small>রিচার্জ (মাস)</small><h3>${s.rechargeTotal.monthTotal} টাকা</h3></div></div>
        <div class="col-6 col-md-3"><div class="summary-card"><small>চলমান অভিযোগ</small><h3>${s.complaints.length} টি</h3></div></div>
      </div>
      <h6>কোম্পানি ভিত্তিক আয়-ব্যয়</h6>
      <div class="row g-2 mb-3" id="companySummary"></div>
      <div class="row">
        <div class="col-md-6"><div class="chart-container"><canvas id="chartIncomeExpense"></canvas></div></div>
        <div class="col-md-6"><div class="chart-container"><canvas id="chartRecharge"></canvas></div></div>
      </div>
      <div class="filter-box mt-3">
        <h6><i class="bi bi-funnel"></i> ফিল্টার</h6>
        <div class="row g-2">
          <div class="col-6 col-md-2"><label class="form-label small">তারিখ</label><input type="date" id="afDate" class="form-control form-control-sm"></div>
          <div class="col-6 col-md-2"><label class="form-label small">শেষ তারিখ</label><input type="date" id="afDateEnd" class="form-control form-control-sm"></div>
          <div class="col-6 col-md-2"><label class="form-label small">ইউজার</label><select id="afUser" class="form-select form-select-sm"><option value="">সব</option></select></div>
          <div class="col-6 col-md-2"><label class="form-label small">আয়/ব্যয়</label><select id="afType" class="form-select form-select-sm"><option value="">সব</option><option>Income</option><option>Expense</option></select></div>
          <div class="col-6 col-md-2"><label class="form-label small">কোম্পানি</label><select id="afCompany" class="form-select form-select-sm"><option value="">সব</option><option>Ainet</option><option>CCN</option><option>Ainet Reseller</option><option>CCN Reseller</option><option>Ainet পলাশবাড়ী</option><option>CCN পলাশবাড়ী</option></select></div>
          <div class="col-6 col-md-2"><label class="form-label small">সাবক্যাটাগরি</label><select id="afSub" class="form-select form-select-sm"><option value="">সব</option></select></div>
        </div>
        <button class="btn btn-info btn-sm mt-2" onclick="adminFilterAccounts()"><i class="bi bi-search"></i> প্রয়োগ</button>
        <button class="btn btn-secondary btn-sm mt-2" onclick="adminMonthlyReport()"><i class="bi bi-calendar-check"></i> মাসিক রিপোর্ট</button>
      </div>
      <div id="adminAccountsResult" class="mt-2"></div>
      <div class="card card-custom p-2 mb-3 mt-3"><h6>চলমান অভিযোগ</h6><div id="complaintList"></div></div>
    </div>
    <div class="tab-pane fade" id="tabAccounts"><h6>একাউন্টস বিস্তারিত (আজ)</h6><div class="row g-3" id="adminAccountDetail"></div></div>
    <div class="tab-pane fade" id="tabIncharge">
      <h6>ইনচার্জ সারসংক্ষেপ</h6>
      <div class="row g-2 mb-3">
        <div class="col-6 col-md-4"><div class="summary-card"><small>আজ ক্যাশ</small><h3>${s.recharge.todayCash} টাকা</h3></div></div>
        <div class="col-6 col-md-4"><div class="summary-card"><small>আজ বিকাশ</small><h3>${s.recharge.todayBkash} টাকা</h3></div></div>
        <div class="col-6 col-md-4"><div class="summary-card"><small>আজ উপস্থিত</small><h3>${s.attendance.present} জন</h3></div></div>
      </div>
      <h6>আজকের হাজিরা</h6><div id="adminAttendanceList"></div>
    </div>
    <div class="tab-pane fade" id="tabOperator">
      <h6>অপারেটর সারসংক্ষেপ</h6>
      <div class="row g-2 mb-3">
        <div class="col-6 col-md-4"><div class="summary-card"><small>আজ এসটিবি</small><h3>${s.stb.todayTotal} টাকা</h3></div></div>
        <div class="col-6 col-md-4"><div class="summary-card"><small>মাসিক এসটিবি</small><h3>${s.stb.monthTotal} টাকা</h3></div></div>
      </div>
      <h6>এক্সেসরিজ তালিকা</h6><div id="adminAccessoriesList"></div>
    </div>
    <div class="tab-pane fade" id="tabUsers">
      <h6>নতুন ইউজার তৈরি</h6>
      <div class="row g-2 mb-3">
        <div class="col-6 col-md-2"><input id="newUser" class="form-control form-control-sm" placeholder="ইউজারনেম"></div>
        <div class="col-6 col-md-2"><input id="newPass" class="form-control form-control-sm" placeholder="পাসওয়ার্ড"></div>
        <div class="col-6 col-md-2"><select id="newRole" class="form-select form-select-sm"><option>Employee</option><option>Accounts</option><option>Data Incharge</option><option>Data Operator</option></select></div>
        <div class="col-6 col-md-2"><input id="newFull" class="form-control form-control-sm" placeholder="পূর্ণ নাম"></div>
        <div class="col-6 col-md-2"><button class="btn btn-success btn-sm w-100" onclick="createUser()">তৈরি</button></div>
      </div>
      <h6>সকল ইউজার</h6><div id="allUsersList"></div>
    </div>
  </div>`;
  cont.html(html);

  let compHtml = '';
  if(s.accounts.byCompany) for(let k in s.accounts.byCompany){
    const parts = k.split('_');
    compHtml += `<div class="col-6 col-md-2"><div class="summary-card"><small>${parts[0]} ${parts[1]==='Income'?'আয়':'ব্যয়'}</small><h5>${s.accounts.byCompany[k]} টাকা</h5></div></div>`;
  }
  $('#companySummary').html(compHtml);
  let clist = '';
  if(s.complaints && s.complaints.length) s.complaints.forEach(c => clist += `<span class="badge bg-danger me-1">${c.description}</span>`);
  else clist = '<span class="text-muted">কোনো অভিযোগ নেই</span>';
  $('#complaintList').html(clist);
  setTimeout(() => { drawIncomeExpenseChart(s.accounts.totalIncome, s.accounts.totalExpense); drawRechargeChart(s.recharge.todayCash, s.recharge.todayBkash); }, 500);
  loadAdminAccountDetail();
  loadAdminAttendance();
  loadAdminAccessories();
  loadAllUsers();
  const allSubCats = ['ডিপিএস','বিদ্যুৎ বিল','অফিস খরচ','বেতন বাবদ','টিজি/প্যাচকট','ফাইবার ক্রয়','যন্ত্রাংশ ক্রয়','স্প্লিটার','বিবিধ','মেইন্টেন্স বাবদ','ভ্যাট','ট্যাক্স ফি','সফটওয়্যার বিল','দানবাবদ','যাতায়াত','মোবাইল বিল','আপ্যায়ন','কুরিয়ার খরচ','ব্যাংক জমা','স্যার নিজ খরচ','ম্যাডাম খরচ'];

  if(users) users.forEach(u => { $('#afUser').append(`<option value="${u.username}">${u.username}</option>`); });

function drawIncomeExpenseChart(income, expense){
  const ctx = document.getElementById('chartIncomeExpense'); if(!ctx) return;
  new Chart(ctx, { type:'doughnut', data:{labels:['আয়','ব্যয়'],datasets:[{data:[income,expense],backgroundColor:['#198754','#dc3545']}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:true,text:'মোট আয় বনাম ব্যয়'}}} });
}
function drawRechargeChart(cash, bkash){
  const ctx = document.getElementById('chartRecharge'); if(!ctx) return;
  new Chart(ctx, { type:'bar', data:{labels:['ক্যাশ','বিকাশ'],datasets:[{data:[cash,bkash],backgroundColor:['#0dcaf0','#ffc107']}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:true,text:'আজকের রিচার্জ'}}} });
}

async function loadAdminAccountDetail(){
  const today = new Date().toISOString().split('T')[0];
  const res = await apiCall('getDailyTransactions', { date: today });
  let incomeHtml='', expenseHtml='', totalIncome=0, totalExpense=0;
  if(res && res.length){
    res.forEach(r => {
      const editBtn = r.timestamp ? `<button class="btn btn-sm btn-warning" onclick="editAcc('${r.timestamp}','${r.amount}','${r.note||''}')">✏️</button>` : '';
      if(r.type==='Income'){ incomeHtml+=`<tr><td>${r.company}</td><td>${r.category}</td><td>${r.subcategory||''}</td><td class="text-success fw-bold">+${r.amount}</td><td>${editBtn}</td></tr>`; totalIncome+=Number(r.amount); }
      else { expenseHtml+=`<tr><td>${r.company}</td><td>${r.category}</td><td>${r.subcategory||''}</td><td class="text-danger fw-bold">-${r.amount}</td><td>${editBtn}</td></tr>`; totalExpense+=Number(r.amount); }
    });
  }
  $('#adminAccountDetail').html(`

async function saveAccEntry(){
  const type = $('#acType').val();
  const category = type === 'Income' ? $('#acIncomeCat').val() : $('#acSub').val().trim();
  if(!category){ alert('ক্যাটাগরি সিলেক্ট করুন'); return; }
  if(category === 'বেতন বাবদ'){
    const empName = $('#acSub').val().trim();
    if(!empName || empName === 'বেতন বাবদ'){ alert('⚠️ বেতন বাবদ সিলেক্ট করলে অবশ্যই এমপ্লয়ীর নাম দিতে হবে!'); return; }
  }
  const res = await apiCall('saveAccountsEntry', { date: $('#acDate').val(), type, company: $('#acCompany').val(), category, subCategory: $('#acSub').val(), amount: $('#acAmount').val(), note: $('#acNote').val() });
  if(res && res.success){ alert('✅ সফলভাবে সংরক্ষিত'); $('#accModal').modal('hide'); loadAccountsHistory(); } else alert(res ? res.message : 'ব্যর্থ');

function showAccountsTable(data){
  let html='<table class="table table-bordered table-sm"><tr><th>#</th><th>তারিখ</th><th>টাইপ</th><th>কোম্পানি</th><th>ক্যাট</th><th>সাব</th><th>টাকা</th><th>নোট</th><th>এডিট</th></tr>';
  let total=0;
  if(data && data.length && !data.error){
    data.forEach((r,i) => {
      const isIncome = r.type === 'Income';
      const sign = isIncome ? '+' : '-';
      const cls = isIncome ? 'text-success' : 'text-danger';
      const editBtn = r.timestamp ? `<button class="btn btn-sm btn-warning" onclick="editAcc('${r.timestamp}','${r.amount}','${r.note||''}')">✏️</button>` : '';
      html += `<tr><td>${i+1}</td><td>${r.date}</td><td>${r.type}</td><td>${r.company}</td><td>${r.category}</td><td>${r.subcategory||''}</td><td class="${cls} fw-bold">${sign}${r.amount}</td><td>${r.note||''}</td><td>${editBtn}</td></tr>`;
      total += Number(r.amount);
    });
    html += `<tr class="total-row"><td colspan="6">মোট</td><td>${total} টাকা</td><td colspan="2"></td></tr>`;
  } else {
    html += '<tr><td colspan="9" class="text-center">কোনো এন্ট্রি নেই</td></tr>';
  }
  html += '</table>';
  $('#accountsList').html(html);
}

    </div>
  </div>`;
  cont.html(html);
  buildRechargeInputs();
  buildAttendanceSheet(employees);
  loadRechargeTotals();
  loadMonthlyRecharge();
}

function buildRechargeInputs(){
  let cashHtml='', bkashHtml='';
  for(let i=0;i<50;i++){
    cashHtml+=`<div class="recharge-row"><input class="form-control form-control-sm cash-id" placeholder="আইডি"><input class="form-control form-control-sm cash-name" placeholder="নাম"><input type="number" class="form-control form-control-sm cash-amount" placeholder="টাকা"><input class="form-control form-control-sm cash-note" placeholder="নোট"></div>`;
    bkashHtml+=`<div class="recharge-row"><input class="form-control form-control-sm bkash-id" placeholder="আইডি"><input class="form-control form-control-sm bkash-name" placeholder="নাম"><input type="number" class="form-control form-control-sm bkash-amount" placeholder="টাকা"><input class="form-control form-control-sm bkash-note" placeholder="নোট"></div>`;
  }
  $('#cashRechargeList').html(cashHtml);
  $('#bkashRechargeList').html(bkashHtml);
}

async function saveAllRecharge(type){
  const date = $('#rDate').val();
  const company = $('#rCompany').val();
  const prefix = type === 'Cash' ? 'cash' : 'bkash';
  let count = 0;
  const promises = [];
  $(`.${prefix}-id`).each(function(i){
    const id = $(this).val().trim();
    const name = $(`.${prefix}-name`).eq(i).val().trim();
    const amount = $(`.${prefix}-amount`).eq(i).val();
    const note = $(`.${prefix}-note`).eq(i).val().trim();
    if(!id && !amount) return;
    if(!amount || Number(amount) <= 0) return;
    promises.push(apiCall('saveRecharge', { date, company, type, customerId: id || '-', customerName: name || '-', amount: Number(amount), note: note || '' }));
    count++;
  });
  if(count === 0){ alert('কোনো ডাটা নেই!'); return; }
  await Promise.all(promises);
  alert(`✅ ${count} টি ${type} রিচার্জ সফলভাবে সংরক্ষিত!`);
  loadRechargeTotals();
  loadMonthlyRecharge();
  $(`.${prefix}-id, .${prefix}-name, .${prefix}-amount, .${prefix}-note`).val('');
}

function buildAttendanceSheet(employees){
  if(!employees || !employees.length){ $('#attendanceSheet').html('<p>কোনো এমপ্লয়ী নেই</p>'); return; }
  let html = '';
  employees.forEach((emp,i) => {
    html += `<div class="attendance-row" id="attRow${i}" data-emp="${emp}">
      <span style="width:120px;font-weight:500;">${i+1}. ${emp}</span>
      <select class="form-select form-select-sm att-status" data-emp="${emp}" style="width:130px;">
        <option value="">--</option><option value="Present">Present</option><option value="Absent">Absent</option><option value="Late">Late</option><option value="Holiday">Holiday</option><option value="Leave">Leave</option>
      </select>
      <input class="form-control form-control-sm att-note" placeholder="নোট" style="flex:1;">
      <span class="att-badge"></span>
    </div>`;
  });
  $('#attendanceSheet').html(html);
  $('.att-status').on('change', function(){
    const row = $(this).closest('.attendance-row'), badge = row.find('.att-badge'), val = $(this).val();
    badge.removeClass('present-badge absent-badge late-badge').text('');
    row.css('background','');
    if(val==='Present'){ badge.addClass('present-badge').text('✓ উপস্থিত'); row.css('background','#f0fff0'); }
    else if(val==='Absent'){ badge.addClass('absent-badge').text('✗ অনুপস্থিত'); row.css('background','#fff0f0'); }
    else if(val==='Late'){ badge.addClass('late-badge').text('⏰ লেট'); row.css('background','#fffdf0'); }
  });
}

async function saveAllAttendance(){
  const date = $('#attDate').val(); let count=0;
  const promises = [];
  $('.att-status').each(function(){
    const emp = $(this).data('emp'), status = $(this).val();
    if(!status) return;
    const note = $(this).closest('.attendance-row').find('.att-note').val();
    promises.push(apiCall('saveAttendance',{date,username:emp,status,note}));
    count++;
  });
  await Promise.all(promises);
  alert(count+' জনের হাজিরা সংরক্ষিত');
  loadTodayAttendanceReport(date);
}

async function loadTodayAttendanceReport(date){
  const res = await apiCall('getTodayAttendance');
  let html = '<div class="card card-custom p-3 mt-3"><h6>📋 আজকের সংরক্ষিত হাজিরা ('+date+')</h6><table class="table table-sm"><tr><th>#</th><th>নাম</th><th>স্ট্যাটাস</th><th>নোট</th></tr>';
  let present=0, absent=0, late=0;
  if(res && res.length){
    res.forEach((r,i) => {
      let badge = '';
      if(r.status==='Present'){ badge='<span class="badge bg-success">Present</span>'; present++; }
      else if(r.status==='Absent'){ badge='<span class="badge bg-danger">Absent</span>'; absent++; }
      else if(r.status==='Late'){ badge='<span class="badge bg-warning text-dark">Late</span>'; late++; }
      else badge=`<span class="badge bg-secondary">${r.status}</span>`;
      html += `<tr><td>${i+1}</td><td>${r.username}</td><td>${badge}</td><td>${r.note||''}</td></tr>`;
    });
    html += `<tr class="total-row"><td colspan="2">সারসংক্ষেপ</td><td colspan="2">✅ Present: ${present} | ❌ Absent: ${absent} | ⏰ Late: ${late}</td></tr>`;
  } else { html += '<tr><td colspan="4" class="text-center">আজ কোনো হাজিরা সংরক্ষিত হয়নি</td></tr>'; }
  html += '</table></div>';
  $('#attendanceReport').html(html);
}

async function filterAttendance(){
  const searchName = $('#attSearch').val().trim().toLowerCase();
  const filterDate = $('#attFilterDate').val();

  if(filterDate){
    const res = await apiCall('getTodayAttendance');
    let filtered = res || [];
    if(searchName) filtered = filtered.filter(r => r.username.toLowerCase().includes(searchName));
    let html = `<div class="card card-custom p-3 mt-3"><h6>📋 ${filterDate} এর হাজিরা</h6><table class="table table-sm"><tr><th>#</th><th>নাম</th><th>স্ট্যাটাস</th><th>নোট</th></tr>`;
    if(filtered.length){
      filtered.forEach((r,i) => {
        let badge = r.status==='Present'?'<span class="badge bg-success">Present</span>':r.status==='Absent'?'<span class="badge bg-danger">Absent</span>':r.status==='Late'?'<span class="badge bg-warning text-dark">Late</span>':`<span class="badge bg-secondary">${r.status}</span>`;
        html += `<tr><td>${i+1}</td><td>${r.username}</td><td>${badge}</td><td>${r.note||''}</td></tr>`;
      });
    } else { html += '<tr><td colspan="4">কোনো ডাটা নেই</td></tr>'; }
    html += '</table></div>';
    $('#attendanceReport').html(html);
  } else if(searchName){
    const now = new Date();
    const res = await apiCall('getAttendanceReport', { username: searchName, month: now.getMonth()+1, year: now.getFullYear() });
    let html = `<div class="card card-custom p-3 mt-3"><h6>📊 ${searchName} এর মাসিক হাজিরা রিপোর্ট (চলতি মাস)</h6><table class="table table-sm"><tr><th>স্ট্যাটাস</th><th>দিন</th></tr>`;
    if(res) for(let k in res) html += `<tr><td>${k}</td><td>${res[k]}</td></tr>`;
    else html += '<tr><td colspan="2">কোনো ডাটা নেই</td></tr>';
    html += '</table></div>';
    $('#attendanceReport').html(html);
  }
}

async function loadRechargeTotals(){
  const res = await apiCall('getRechargeHistory',{company:$('#rCompany').val(),date:$('#rDate').val()});
  let cash=0,bkash=0,cc=0,bc=0;
  if(res) res.forEach(r=>{ if(r.type==='Cash'){cash+=Number(r.amount);cc++;} else {bkash+=Number(r.amount);bc++;} });
  $('#totalCash').text(cash+' টাকা'); $('#totalBkash').text(bkash+' টাকা');
  $('#countCash').text(cc); $('#countBkash').text(bc);
}

async function loadMonthlyRecharge(){
  const now = new Date();
  const res = await apiCall('getRechargeDateRange', { company: $('#rCompany').val(), startDate: `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`, endDate: new Date().toISOString().split('T')[0] });
  let cash=0, bkash=0;
  if(res) res.forEach(r => { if(r.type==='Cash') cash+=Number(r.amount); else bkash+=Number(r.amount); });
  $('#monthlyRecharge').text((cash+bkash)+' টাকা');
  $('#monthlyDetail').text(`ক্যাশ: ${cash} টাকা | বিকাশ: ${bkash} টাকা`);
}

async function filterRecharge(){
  const sd=$('#rFilterStart').val(),ed=$('#rFilterEnd').val(),type=$('#rFilterType').val();

async function saveSTB(){
  const res=await apiCall('saveSTBIncome',{date:$('#stbDate').val(),totalAmount:$('#stbAmount').val(),details:$('#stbDetails').val(),note:$('#stbNote').val()});
  if(res&&res.success){alert('✅ সফল');loadSTBHistory();loadSTBSummary();}else alert(res?res.message:'ব্যর্থ');
}

async function loadSTBHistory(){
  const res=await apiCall('getSTBHistory');
  let html='<table class="table table-sm"><tr><th>তারিখ</th><th>টাকা</th><th>বিস্তারিত</th></tr>';
  let total=0;
  if(res){ res.forEach(r=>{html+=`<tr><td>${r.date}</td><td>${r.total}</td><td>${r.details}</td></tr>`; total+=Number(r.total);}); html+=`<tr class="total-row"><td>মোট</td><td>${total} টাকা</td><td></td></tr>`; }
  else html+='<tr><td colspan="3">কোনো এন্ট্রি নেই</td></tr>';
  $('#stbHistory').html(html+'</table>');
}

async function loadSTBSummary(){
  const today = new Date().toISOString().split('T')[0];
  const now = new Date();
  const res = await apiCall('getSTBHistory');
  let todayTotal=0, monthTotal=0;
  if(res) res.forEach(r => {
    if(r.date === today) todayTotal += Number(r.total);
    const d = new Date(r.date);
    if(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthTotal += Number(r.total);
  });
  $('#stbToday').text(todayTotal+' টাকা');
  $('#stbMonth').text(monthTotal+' টাকা');
}

async function filterSTB(){
  const sd=$('#stbDate').val(),ed=$('#stbFilterEnd').val();
  let res;
  if(sd&&ed) res=await apiCall('getSTBDateRange',{startDate:sd,endDate:ed});
  else res=await apiCall('getSTBHistory');
  let html='<table class="table table-sm"><tr><th>তারিখ</th><th>টাকা</th><th>বিস্তারিত</th></tr>';
  let total=0;
  if(res){ res.forEach(r=>{html+=`<tr><td>${r.date}</td><td>${r.total}</td><td>${r.details}</td></tr>`; total+=Number(r.total);}); html+=`<tr class="total-row"><td>মোট</td><td>${total} টাকা</td><td></td></tr>`; }
  $('#stbHistory').html(html+'</table>');
}

async function loadAccessories(){

async function updateAccessory(){
  const itemName=$('#accItemName').val(); if(!itemName){alert('আইটেম নাম দিন');return;}
  const res=await apiCall('updateAccessoryAssign',{itemId:itemName,assignedTo:$('#accAssignTo').val(),note:$('#accNote').val()});

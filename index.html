<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ainet & CCN | Finance Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a2f44, #05161e);
            min-height: 100vh;
            padding: 24px;
            color: #1e2a3e;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }
        .glass-card:hover { transform: translateY(-2px); }
        .btn {
            background: linear-gradient(105deg, #f97316, #ef4444);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 2rem;
            padding: 0.6rem 1.5rem;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #f97316;
            color: #f97316;
            box-shadow: none;
        }
        .btn-sm { padding: 0.4rem 1rem; font-size: 0.8rem; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0;
        }
        .stat-card {
            border-radius: 1.8rem;
            padding: 1.5rem;
            transition: 0.1s;
            min-height: 160px;
        }
        .card-income { background: linear-gradient(115deg, #1e3c72, #2a5298); color: white; }
        .card-expense { background: linear-gradient(115deg, #b91c1c, #7f1d1d); color: white; }
        .card-cash { background: linear-gradient(115deg, #0f5c6b, #0a3b44); color: white; }
        .card-bikash { background: linear-gradient(115deg, #2b6e4f, #1b4d3a); color: white; }
        .card-stb { background: linear-gradient(115deg, #6b2e8a, #4a1d62); color: white; }
        .card-link { background: linear-gradient(115deg, #c56e0f, #a1550b); color: white; }
        .transaction-list {
            max-height: 280px;
            overflow-y: auto;
            background: rgba(0,0,0,0.05);
            border-radius: 1.5rem;
            padding: 0.75rem;
            margin-top: 1rem;
        }
        .transaction-item {
            background: rgba(255,255,255,0.2);
            margin: 0.6rem 0;
            padding: 0.7rem 1rem;
            border-radius: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .edit-btn {
            background: #ffc107;
            border: none;
            padding: 0.25rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            color: #1e2a3e;
        }
        .filter-bar {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.4);
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            margin-bottom: 1.8rem;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white;
            max-width: 480px;
            width: 90%;
            border-radius: 2rem;
            padding: 1.8rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 2rem;
            border: 1px solid #ddd;
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .flex-gap {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .logo-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 8px 18px rgba(0,0,0,0.2);
            margin-bottom: 0.8rem;
        }
        .badge {
            background: #2c5a6e;
            border-radius: 2rem;
            padding: 0.2rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-block;
            margin: 0.2rem;
        }
        @media (max-width: 680px) {
            body { padding: 1rem; }
            .grid-cards { gap: 1rem; }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // =======================  OBFUSCATED API URL (BASE64) =======================
    const encodedUrl = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J6V2lCbmc0MEJKZnFmYWhxYld1NXQyUjQ2eG1GbXpmWl8teW56Ty1HVVAybUpEalo5RzhyZ0l6YmtIRmtOU3lEZUp1OEEvZXhlYw==";
    const API_URL = atob(encodedUrl);
    const COMPLAINT_SHEET_ID = '1uc5GyUrPgqwzyzyHBox1xE7qACx2qPCqQ9pd5E8oa-4';
    
    const DEFAULT_USERS = [
        { username: "admin", password: "admin123", role: "admin", name: "Admin" },
        { username: "accounts", password: "acc123", role: "accounts", name: "Accounts" },
        { username: "incharge", password: "inch123", role: "dataincharge", name: "Incharge" },
        { username: "operator", password: "op123", role: "dataoperator", name: "Operator" },
        { username: "noyon", password: "123456", role: "employee", name: "Noyon" }
    ];

    let currentUser = null;
    let usersList = [];
    let cache = {};

    function getToday() { return new Date().toISOString().slice(0,10); }
    function isEditable(editableUntil) { return editableUntil ? new Date() < new Date(editableUntil) : false; }

    async function callApi(action, method = 'GET', payload = null, force = false) {
        const key = `${action}_${method}_${payload ? JSON.stringify(payload) : ''}`;
        if (!force && cache[key] && (Date.now() - cache[key].ts < 60000)) return cache[key].data;
        try {
            let res;
            if (method === 'GET') {
                const url = `${API_URL}?action=${action}&t=${Date.now()}`;
                const response = await fetch(url);
                res = await response.json();
            } else {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                res = await response.json();
            }
            cache[key] = { data: res, ts: Date.now() };
            return res;
        } catch (err) {
            console.error("API error:", err);
            return { success: false, error: err.message };
        }
    }

    async function loadUsers() {
        try {
            const apiRes = await callApi('getUsers');
            if (apiRes.success && Array.isArray(apiRes.data) && apiRes.data.length) usersList = apiRes.data;
            else usersList = DEFAULT_USERS;
        } catch(e) { usersList = DEFAULT_USERS; }
        return usersList;
    }

    async function login(username, password, remember) {
        await loadUsers();
        const user = usersList.find(u => u.username === username && u.password === password);
        if (user) {
            currentUser = { ...user, password };
            const dataToStore = { username: user.username, role: user.role, name: user.name, password };
            if (remember) localStorage.setItem('currentUser', JSON.stringify(dataToStore));
            sessionStorage.setItem('currentUser', JSON.stringify(dataToStore));
            return true;
        }
        return false;
    }

    function getStoredUser() {
        const sess = sessionStorage.getItem('currentUser');
        if (sess) return JSON.parse(sess);
        const loc = localStorage.getItem('currentUser');
        if (loc) return JSON.parse(loc);
        return null;
    }

    function logout() {
        currentUser = null;
        sessionStorage.clear();
        localStorage.removeItem('currentUser');
        renderLoginPage();
    }

    async function fetchComplaints() {
        try {
            const url = `https://docs.google.com/spreadsheets/d/${COMPLAINT_SHEET_ID}/gviz/tq?tqx=out:json`;
            const resp = await fetch(url);
            const text = await resp.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            const rows = json.table.rows;
            const today = getToday();
            const complaints = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.c && row.c[0] && row.c[0].v === today) {
                    complaints.push({ complaint: row.c[1]?.v || '', status: row.c[2]?.v || '' });
                }
            }
            return complaints;
        } catch(e) { return []; }
    }

    function showModal(content) {
        let m = document.querySelector('.modal');
        if(m) m.remove();
        m = document.createElement('div');
        m.className = 'modal';
        m.innerHTML = `<div class="modal-content"><span style="float:right; font-size:26px; cursor:pointer;" onclick="closeModal()">&times;</span>${content}</div>`;
        document.body.appendChild(m);
    }
    window.closeModal = function() { document.querySelector('.modal')?.remove(); };

    // ======================= পাসওয়ার্ড পরিবর্তন ও ইউজার এড =======================
    window.showChangePasswordModal = function() {
        showModal(`
            <h3>🔐 Change Password</h3>
            <input type="password" id="oldPass" placeholder="Current Password">
            <input type="password" id="newPass1" placeholder="New Password (min 4 chars)">
            <input type="password" id="newPass2" placeholder="Retype new password">
            <button class="btn" onclick="changePassword()">Update</button>
        `);
    };
    window.changePassword = async function() {
        const old = document.getElementById('oldPass').value;
        const new1 = document.getElementById('newPass1').value;
        const new2 = document.getElementById('newPass2').value;
        if (new1 !== new2) { alert("Passwords don't match"); return; }
        if (new1.length < 4) { alert("Minimum 4 characters"); return; }
        const user = getStoredUser();
        if (user.password !== old) { alert("Current password wrong"); return; }
        const res = await callApi('updatePassword', 'POST', { username: user.username, newPassword: new1 }, true);
        if (res.success) { alert("Password changed. Please login again."); logout(); }
        else alert("Failed: " + (res.error || "Unknown"));
    };

    window.showAddUserModal = function() {
        showModal(`
            <h3>➕ Add Employee</h3>
            <input type="text" id="newUsername" placeholder="Username">
            <input type="text" id="newName" placeholder="Full Name">
            <input type="password" id="newPassword" placeholder="Password">
            <button class="btn" onclick="addNewUser()">Add</button>
        `);
    };
    window.addNewUser = async function() {
        const username = document.getElementById('newUsername').value.trim();
        const name = document.getElementById('newName').value.trim();
        const pwd = document.getElementById('newPassword').value.trim();
        if (!username || !name || !pwd) { alert("All fields required"); return; }
        if (pwd.length < 4) { alert("Password min 4 chars"); return; }
        const res = await callApi('addUser', 'POST', { username, password: pwd, role: 'employee', name }, true);
        if (res.success) { alert("User added!"); closeModal(); await loadUsers(); renderDashboard(); }
        else alert("Failed: " + (res.message || "Username exists"));
    };

    // ======================= আয়/ব্যয় ফর্ম (শেয়ার্ড) =======================
    window.showIncomeFormSection = function(cat) {
        showModal(`
            <h3>➕ Add Income (${cat})</h3>
            <input type="number" id="cash" placeholder="Cash">
            <input type="number" id="office" placeholder="Office Collection">
            <input type="number" id="online" placeholder="Online/Bikash">
            <input type="number" id="deposit" placeholder="Cash Deposit">
            <textarea id="note" placeholder="Note"></textarea>
            <button class="btn" onclick="saveIncome('${cat}')">Save</button>
        `);
    };
    window.saveIncome = async function(cat) {
        const total = (+document.getElementById('cash').value||0)+(+document.getElementById('office').value||0)+(+document.getElementById('online').value||0)+(+document.getElementById('deposit').value||0);
        if(!total){ alert("Amount required"); return; }
        await callApi('addIncome','POST',{ category:cat, amount:total, date:getToday(), note:document.getElementById('note').value, branch:'main', editableUntil:new Date(Date.now()+16*3600000).toISOString() }, true);
        alert("Income saved"); closeModal(); renderDashboard();
    };
    window.showExpenseFormSection = function(cat) {
        showModal(`
            <h3>➕ Add Expense (${cat})</h3>
            <select id="subCat">${['ডিপিএস','বিদ্যুৎ বিল','অফিস খরচ','বেতন বাবদ','টিজি/প্যাচকট','ফাইবার ক্রয়','যন্ত্রাংশ ক্রয়','স্প্লিটার','বিবিধ','মেইন্টেন্স বাবদ','দানবাবদ','যাতায়াত','মোবাইল বিল','ইন্টারনেট বিল','আপ্যায়ন','কুরিয়ার খরচ','ব্যাংক জমা','তার ক্রয়','স্যার নিজ খরচ','ম্যাডাম খরচ'].map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
            <div id="empDiv" style="display:none;"><select id="employee">${usersList.filter(e=>e.role==='employee').map(e=>`<option value="${e.username}">${e.name}</option>`).join('')}</select></div>
            <input type="number" id="amount" placeholder="Amount">
            <textarea id="noteExp" placeholder="Note"></textarea>
            <button class="btn" onclick="saveExpense('${cat}')">Save</button>
        `);
        const sub = document.getElementById('subCat');
        const empDiv = document.getElementById('empDiv');
        sub.addEventListener('change',function(){ empDiv.style.display = this.value === 'বেতন বাবদ' ? 'block' : 'none'; });
        empDiv.style.display = sub.value === 'বেতন বাবদ' ? 'block' : 'none';
    };
    window.saveExpense = async function(cat) {
        const subCat = document.getElementById('subCat').value;
        const amount = +document.getElementById('amount').value;
        if(!amount){ alert("Amount required"); return; }
        const employee = (subCat === 'বেতন বাবদ') ? document.getElementById('employee')?.value : null;
        await callApi('addExpense','POST',{ mainCategory:cat, subCategory:subCat, amount, date:getToday(), note:document.getElementById('noteExp').value, employeeName:employee, editableUntil:new Date(Date.now()+16*3600000).toISOString() }, true);
        alert("Expense saved"); closeModal(); renderDashboard();
    };

    // ======================= 1. এডমিন ড্যাশবোর্ড (বিস্তারিত + ফিল্টার) =======================
    async function renderAdminDashboard() {
        let filterDate = localStorage.getItem('adminFilterDate') || '';
        // সব ডাটা আনা
        let incomes = (await callApi('getIncomes')).data || [];
        let expenses = (await callApi('getExpenses')).data || [];
        let recharges = (await callApi('getRecharges')).data || [];
        let stbIncomes = (await callApi('getSTBIncomes')).data || [];
        let accessories = (await callApi('getAccessories')).data || [];
        
        if (filterDate) {
            incomes = incomes.filter(i => i.date === filterDate);
            expenses = expenses.filter(e => e.date === filterDate);
            recharges = recharges.filter(r => r.date === filterDate);
            stbIncomes = stbIncomes.filter(s => s.date === filterDate);
        }
        
        // ক্যাটাগরি ভিত্তিক আয়-ব্যয়
        const categories = ['Ainet', 'CCN', 'পলাশবাড়ী CCN', 'রিসেলার Ainet', 'রিসেলার CCN'];
        const catIncome = {}, catExpense = {};
        categories.forEach(cat => {
            catIncome[cat] = incomes.filter(i=>i.category===cat).reduce((s,i)=>s+i.amount,0);
            catExpense[cat] = expenses.filter(e=>e.mainCategory===cat).reduce((s,e)=>s+e.amount,0);
        });
        
        const totalIncome = incomes.reduce((s,i)=>s+i.amount,0);
        const totalExpense = expenses.reduce((s,e)=>s+e.amount,0);
        const cashTotal = recharges.filter(r=>r.method==='cash').reduce((s,r)=>s+r.amount,0);
        const bikashTotal = recharges.filter(r=>r.method==='bikash').reduce((s,r)=>s+r.amount,0);
        const stbTotal = stbIncomes.reduce((s,i)=>s+i.amount,0);
        
        // রেন্ডার লিস্ট হেল্পার
        function renderList(items, type) {
            if (!items.length) return '<div class="transaction-item">📭 No transactions</div>';
            return items.map(t => `<div class="transaction-item"><span>${t.date} → ${type==='income'?`${t.category} ৳${t.amount}`:type==='expense'?`${t.subCategory} ৳${t.amount}`:type==='recharge'?`${t.method} - ${t.userId||t.userName} ৳${t.amount}`:`STB ৳${t.amount}`} ${t.note?`(${t.note})`:''}</span></div>`).join('');
        }
        
        window.filterAdminByDate = function() {
            localStorage.setItem('adminFilterDate', document.getElementById('adminDateFilter').value);
            renderDashboard();
        };
        window.clearAdminFilter = function() {
            localStorage.removeItem('adminFilterDate');
            renderDashboard();
        };
        
        return `
            <div class="glass-card" style="padding:1.8rem;">
                <div class="flex-between">
                    <h2><i class="fas fa-user-shield"></i> Admin Panel (Full Details)</h2>
                    <div>
                        <button class="btn-outline btn-sm" onclick="showAddUserModal()">➕ New User</button>
                        <button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Change Password</button>
                        <button class="btn-outline btn-sm" onclick="logout()">Logout</button>
                    </div>
                </div>
                <div class="filter-bar">
                    <input type="date" id="adminDateFilter" value="${filterDate}">
                    <button class="btn" onclick="filterAdminByDate()">Filter by Date</button>
                    <button class="btn-outline" onclick="clearAdminFilter()">Show All</button>
                </div>
                <!-- সামারি কার্ড -->
                <div class="grid-cards">
                    <div class="stat-card card-income">📊 Total Income: ৳ ${totalIncome.toLocaleString()}</div>
                    <div class="stat-card card-expense">💰 Total Expense: ৳ ${totalExpense.toLocaleString()}</div>
                    <div class="stat-card card-cash">💵 Cash Recharge: ৳ ${cashTotal.toLocaleString()}</div>
                    <div class="stat-card card-bikash">📱 Bikash Recharge: ৳ ${bikashTotal.toLocaleString()}</div>
                    <div class="stat-card card-stb">📺 STB Income: ৳ ${stbTotal.toLocaleString()}</div>
                </div>
                <!-- ক্যাটাগরি ভিত্তিক আয়-ব্যয় সামারি -->
                <h3>📌 Category-wise Income/Expense</h3>
                <div class="grid-cards">
                    ${categories.map(cat => `<div class="stat-card" style="background:linear-gradient(115deg,#2c5a6e,#1a4a5f);"><h4>${cat}</h4><p>Income: ৳ ${catIncome[cat].toLocaleString()}</p><p>Expense: ৳ ${catExpense[cat].toLocaleString()}</p><p>Balance: ৳ ${(catIncome[cat]-catExpense[cat]).toLocaleString()}</p></div>`).join('')}
                </div>
                <!-- বিস্তারিত লিস্ট -->
                <h3>📋 Income Details</h3>
                <div class="transaction-list">${renderList(incomes, 'income')}</div>
                
                <h3>📋 Expense Details</h3>
                <div class="transaction-list">${renderList(expenses, 'expense')}</div>
                
                <h3>📡 Recharge Details</h3>
                <div class="transaction-list">${renderList(recharges, 'recharge')}</div>
                
                <h3>📺 STB Income Details</h3>
                <div class="transaction-list">${renderList(stbIncomes, 'stb')}</div>
                
                <h3>🛠️ Accessories List</h3>
                <div class="transaction-list">${accessories.map(a=>`<div class="transaction-item">🔧 ${a.itemName} → ${usersList.find(u=>u.username===a.assignedTo)?.name||'Unassigned'} (${a.note||''})</div>`).join('')||'<div class="transaction-item">No accessories</div>'}</div>
                
                <button class="btn" onclick="window.print()">🖨️ Print Report</button>
            </div>
        `;
    }
    
    // ======================= 2. একাউন্টস ড্যাশবোর্ড (পূর্বের মতো, ৬ ক্যাটাগরি) =======================
    async function renderAccountsDashboard() {
        const categories = ['Ainet', 'CCN', 'পলাশবাড়ী Ainet', 'পলাশবাড়ী CCN', 'রিসেলার Ainet', 'রিসেলার CCN'];
        let active = localStorage.getItem('accActive') || 'Ainet';
        let filterDate = localStorage.getItem('accDate_'+active) || '';
        let page = parseInt(localStorage.getItem('accPage_'+active)||'1');
        const perPage=10;
        
        let incomes = (await callApi('getIncomes')).data||[];
        let expenses = (await callApi('getExpenses')).data||[];
        if(filterDate){
            incomes = incomes.filter(i=>i.date===filterDate);
            expenses = expenses.filter(e=>e.date===filterDate);
        }
        const incTotal = incomes.filter(i=>i.category===active).reduce((s,i)=>s+i.amount,0);
        const expTotal = expenses.filter(e=>e.mainCategory===active).reduce((s,e)=>s+e.amount,0);
        let incList = incomes.filter(i=>i.category===active);
        let expList = expenses.filter(e=>e.mainCategory===active);
        const incPages = Math.ceil(incList.length/perPage);
        const expPages = Math.ceil(expList.length/perPage);
        const start = (page-1)*perPage;
        const pagInc = incList.slice(start,start+perPage);
        const pagExp = expList.slice(start,start+perPage);
        
        const renderList = (arr,type)=> arr.map((t,idx)=>`<div class="transaction-item"><span>${t.date} → ${type==='inc'?`৳${t.amount}`:`${t.subCategory} ৳${t.amount}`} ${t.note||''}</span>${isEditable(t.editableUntil)?`<button class="edit-btn" onclick="editTrans('${type}',${idx},'${active}','${filterDate}')">Edit</button>`:'<span class="disabled-edit">Expired</span>'}</div>`).join('');
        
        window.editTrans = async (type,idx,cat,dt)=>{
            if(type==='inc'){
                let all = (await callApi('getIncomes')).data||[];
                if(dt) all=all.filter(i=>i.date===dt);
                const t=all[idx];
                if(!isEditable(t.editableUntil)) return alert("Edit window closed");
                showModal(`<h3>Edit Income</h3><input type="date" id="edDate" value="${t.date}"><input type="number" id="edAmt" value="${t.amount}"><textarea id="edNote">${t.note||''}</textarea><button class="btn" onclick="updateInc(${idx},'${cat}','${dt}')">Update</button>`);
            } else {
                let all = (await callApi('getExpenses')).data||[];
                if(dt) all=all.filter(e=>e.date===dt);
                const t=all[idx];
                if(!isEditable(t.editableUntil)) return alert("Edit window closed");
                showModal(`<h3>Edit Expense</h3><input type="date" id="edDate" value="${t.date}"><input type="text" id="edSub" value="${t.subCategory}"><input type="number" id="edAmt" value="${t.amount}"><textarea id="edNote">${t.note||''}</textarea><button class="btn" onclick="updateExp(${idx},'${cat}','${dt}')">Update</button>`);
            }
        };
        window.updateInc=async(idx,cat,dt)=>{ await callApi('updateIncome','POST',{rowIndex:idx,category:cat,amount:+document.getElementById('edAmt').value,date:document.getElementById('edDate').value,note:document.getElementById('edNote').value},true); alert("Updated"); closeModal(); renderDashboard(); };
        window.updateExp=async(idx,cat,dt)=>{ await callApi('updateExpense','POST',{rowIndex:idx,mainCategory:cat,subCategory:document.getElementById('edSub').value,amount:+document.getElementById('edAmt').value,date:document.getElementById('edDate').value,note:document.getElementById('edNote').value,employeeName:null},true); alert("Updated"); closeModal(); renderDashboard(); };
        
        window.switchAcc=(sec)=>{ localStorage.setItem('accActive',sec); localStorage.setItem('accPage_'+sec,'1'); renderDashboard(); };
        window.filterAccDate=()=>{ localStorage.setItem('accDate_'+active, document.getElementById('accDateFilter').value); localStorage.setItem('accPage_'+active,'1'); renderDashboard(); };
        window.clearAccFilter=()=>{ localStorage.removeItem('accDate_'+active); localStorage.setItem('accPage_'+active,'1'); renderDashboard(); };
        window.prevAccPage=()=>{ let p=parseInt(localStorage.getItem('accPage_'+active)||'1'); if(p>1){ localStorage.setItem('accPage_'+active,(p-1).toString()); renderDashboard(); } };
        window.nextAccPage=()=>{ let p=parseInt(localStorage.getItem('accPage_'+active)||'1'); let max=Math.max(incPages,expPages); if(p<max){ localStorage.setItem('accPage_'+active,(p+1).toString()); renderDashboard(); } };
        
        const incomeBy = (cat) => incomes.filter(i=>i.category===cat).reduce((s,i)=>s+i.amount,0);
        const expenseBy = (cat) => expenses.filter(e=>e.mainCategory===cat).reduce((s,e)=>s+e.amount,0);
        const internetCash = incomeBy('Ainet') - expenseBy('Ainet');
        const dishCash = incomeBy('CCN') - expenseBy('CCN');
        const polashTotal = (incomeBy('পলাশবাড়ী Ainet') - expenseBy('পলাশবাড়ী Ainet')) + (incomeBy('পলাশবাড়ী CCN') - expenseBy('পলাশবাড়ী CCN'));
        
        return `
            <div class="glass-card" style="padding:1.8rem;">
                <div class="flex-between"><h2><i class="fas fa-chart-line"></i> Accounts Dashboard</h2><div><button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Change Password</button> <button class="btn-outline btn-sm" onclick="logout()">Logout</button></div></div>
                <div class="filter-bar">
                    <input type="date" id="accDateFilter" value="${filterDate}">
                    <button class="btn" onclick="filterAccDate()">Filter</button>
                    <button class="btn-outline" onclick="clearAccFilter()">Clear</button>
                </div>
                <div class="grid-cards">
                    <div class="stat-card card-cash"><i class="fas fa-globe"></i> Internet Cash<br><span style="font-size:2rem;">৳ ${internetCash.toLocaleString()}</span></div>
                    <div class="stat-card card-cash"><i class="fas fa-satellite-dish"></i> Dish Cash<br><span style="font-size:2rem;">৳ ${dishCash.toLocaleString()}</span></div>
                    <div class="stat-card card-cash"><i class="fas fa-map-marker-alt"></i> Polashbari Net<br><span style="font-size:2rem;">৳ ${polashTotal.toLocaleString()}</span></div>
                </div>
                <div class="flex-gap" style="margin:1rem 0;">${categories.map(s=>`<button class="btn" style="background:${active===s?'#f97316':'#2c5a6e'}" onclick="switchAcc('${s}')">${s}</button>`).join('')}</div>
                <div class="grid-cards">
                    <div class="stat-card card-income"><div style="cursor:pointer" onclick="showIncomeFormSection('${active}')"><h3>💵 Income - ${active}</h3><div style="font-size:2rem;">৳ ${incTotal.toLocaleString()}</div></div><div class="transaction-list">${pagInc.length?renderList(pagInc,'inc'):'<div class="transaction-item">No transactions</div>'}</div></div>
                    <div class="stat-card card-expense"><div style="cursor:pointer" onclick="showExpenseFormSection('${active}')"><h3>💸 Expense - ${active}</h3><div style="font-size:2rem;">৳ ${expTotal.toLocaleString()}</div></div><div class="transaction-list">${pagExp.length?renderList(pagExp,'exp'):'<div class="transaction-item">No transactions</div>'}</div></div>
                </div>
                <div class="flex-gap" style="justify-content:center"><button class="btn" onclick="prevAccPage()">◀ Prev</button><span>Page ${page}</span><button class="btn" onclick="nextAccPage()">Next ▶</button></div>
                <div class="stat-card" style="background:#2c5a6e; text-align:center;">📌 Balance: ৳ ${(incTotal-expTotal).toLocaleString()}</div>
                <div class="flex-gap"><button class="btn" onclick="showDailyReport()">📆 Daily Report</button><button class="btn" onclick="showMonthlyReport()">📅 Monthly Report</button></div>
            </div>
        `;
    }
    
    // ======================= 3. ডাটা ইনচার্জ (পূর্বের মতো) =======================
    async function renderInchargeDashboard() {
        let filterDate = localStorage.getItem('inchargeFilterDate') || '';
        let page = parseInt(localStorage.getItem('inchargePage')||'1');
        const rows=10;
        let recharges = (await callApi('getRecharges')).data || [];
        if(filterDate) recharges = recharges.filter(r=>r.date===filterDate);
        const cashList = recharges.filter(r=>r.method==='cash'), bikashList = recharges.filter(r=>r.method==='bikash');
        const totalCash = cashList.reduce((s,r)=>s+r.amount,0), totalBikash = bikashList.reduce((s,r)=>s+r.amount,0);
        const start=(page-1)*rows;
        const pagCash = cashList.slice(start,start+rows), pagBikash = bikashList.slice(start,start+rows);
        const totalPages = Math.ceil(Math.max(cashList.length,bikashList.length)/rows);
        let cashRows='', bikashRows='';
        for(let i=0;i<rows;i++){
            const c=pagCash[i]||null, b=pagBikash[i]||null;
            cashRows+=`<div style="display:flex; gap:6px; margin-bottom:6px;"><input type="text" id="cash_id_${i}" placeholder="ID" value="${c?.userId||''}" style="flex:2"><input type="text" id="cash_name_${i}" placeholder="Name" value="${c?.userName||''}" style="flex:2"><input type="number" id="cash_amount_${i}" placeholder="Amount" value="${c?.amount||''}" style="flex:1"></div>`;
            bikashRows+=`<div style="display:flex; gap:6px; margin-bottom:6px;"><input type="text" id="bikash_id_${i}" placeholder="ID" value="${b?.userId||''}" style="flex:2"><input type="text" id="bikash_name_${i}" placeholder="Name" value="${b?.userName||''}" style="flex:2"><input type="number" id="bikash_amount_${i}" placeholder="Amount" value="${b?.amount||''}" style="flex:1"></div>`;
        }
        window.saveCashRecharges=async()=>{ for(let i=0;i<rows;i++){ let amt=+document.getElementById(`cash_amount_${i}`).value; if(amt) await callApi('addRecharge','POST',{type:'internet',method:'cash',userId:document.getElementById(`cash_id_${i}`).value,userName:document.getElementById(`cash_name_${i}`).value,amount:amt,date:getToday(),note:'',editableUntil:new Date(Date.now()+16*3600000).toISOString()},true);} alert("Cash saved"); renderDashboard(); };
        window.saveBikashRecharges=async()=>{ for(let i=0;i<rows;i++){ let amt=+document.getElementById(`bikash_amount_${i}`).value; if(amt) await callApi('addRecharge','POST',{type:'internet',method:'bikash',userId:document.getElementById(`bikash_id_${i}`).value,userName:document.getElementById(`bikash_name_${i}`).value,amount:amt,date:getToday(),note:'',editableUntil:new Date(Date.now()+16*3600000).toISOString()},true);} alert("Bikash saved"); renderDashboard(); };
        window.saveAllRecharges=async()=>{ await saveCashRecharges(); await saveBikashRecharges(); };
        window.filterInchargeByDate=()=>{ localStorage.setItem('inchargeFilterDate', document.getElementById('inchargeDateFilter').value); localStorage.setItem('inchargePage','1'); renderDashboard(); };
        window.clearInchargeFilter=()=>{ localStorage.removeItem('inchargeFilterDate'); localStorage.setItem('inchargePage','1'); renderDashboard(); };
        window.prevIncharge=()=>{ let p=parseInt(localStorage.getItem('inchargePage')||'1'); if(p>1){ localStorage.setItem('inchargePage',(p-1).toString()); renderDashboard(); } };
        window.nextIncharge=()=>{ let p=parseInt(localStorage.getItem('inchargePage')||'1'); if(p<totalPages){ localStorage.setItem('inchargePage',(p+1).toString()); renderDashboard(); } };
        return `<div class="glass-card" style="padding:1.8rem;"><div class="flex-between"><h2><i class="fas fa-tower-broadcast"></i> Data Incharge</h2><div><button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Change Password</button> <button class="btn-outline btn-sm" onclick="logout()">Logout</button></div></div><div class="filter-bar"><input type="date" id="inchargeDateFilter" value="${filterDate}"><button class="btn" onclick="filterInchargeByDate()">Filter</button><button class="btn-outline" onclick="clearInchargeFilter()">Clear</button></div><div style="display:flex; gap:1rem; background:#f0f0f0; border-radius:2rem; padding:1rem; margin:1rem 0"><div><i class="fas fa-money-bill-wave"></i> Cash: ৳${totalCash.toLocaleString()} (${cashList.length})</div><div><i class="fas fa-mobile-alt"></i> Bikash: ৳${totalBikash.toLocaleString()} (${bikashList.length})</div><div>🔄 Total: ${cashList.length+bikashList.length}</div></div><div class="grid-cards" style="grid-template-columns:1fr 1fr;"><div class="stat-card card-cash"><h3>💵 Cash Recharge</h3>${cashRows}<button class="btn btn-sm" onclick="saveCashRecharges()">Save Cash</button></div><div class="stat-card card-bikash"><h3>📱 Bikash Recharge</h3>${bikashRows}<button class="btn btn-sm" onclick="saveBikashRecharges()">Save Bikash</button></div></div><div class="flex-gap" style="justify-content:center; margin:1rem 0"><button class="btn" onclick="prevIncharge()">◀ Prev</button><span>Page ${page} of ${totalPages}</span><button class="btn" onclick="nextIncharge()">Next ▶</button></div><button class="btn" style="width:100%" onclick="saveAllRecharges()">💾 Save All (Both sides)</button><hr><div class="flex-gap"><button class="btn btn-outline" onclick="showAttendanceForm()">📋 Attendance</button><button class="btn btn-outline" onclick="showComplaintEntry()">📢 Complaint Entry</button></div></div>`;
    }
    
    // ======================= 4. ডাটা অপারেটর (পূর্বের মতো) =======================
    async function renderOperatorDashboard() {
        let stb = (await callApi('getSTBIncomes')).data||[];
        const totalSTB = stb.reduce((s,i)=>s+i.amount,0);
        let links = JSON.parse(localStorage.getItem('linksPasswords')||'[]');
        window.addLink=()=>{ let t=document.getElementById('linkTitle').value,u=document.getElementById('linkUrl').value,p=document.getElementById('linkPass').value; if(!t) return; links.push({title:t,url:u,password:p,date:getToday()}); localStorage.setItem('linksPasswords',JSON.stringify(links)); renderOperatorDashboard(); };
        window.delLink=(idx)=>{ links.splice(idx,1); localStorage.setItem('linksPasswords',JSON.stringify(links)); renderOperatorDashboard(); };
        let linksHtml = links.map((l,idx)=>`<div class="transaction-item"><span><strong>${l.title}</strong><br>${l.url} (${l.password})</span><button class="edit-btn" onclick="delLink(${idx})">🗑️</button></div>`).join('');
        return `<div class="glass-card" style="padding:1.8rem;"><div class="flex-between"><h2><i class="fas fa-microchip"></i> Data Operator</h2><div><button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Password</button><button class="btn-outline btn-sm" onclick="logout()">Logout</button></div></div><div class="grid-cards"><div class="stat-card card-stb"><h3>📺 STB Income</h3><div style="font-size:2rem;">৳ ${totalSTB.toLocaleString()}</div><button class="btn btn-sm" onclick="showSTBForm()">+ Add STB</button></div><div class="stat-card card-link"><h3>🛠️ Accessories</h3><button class="btn btn-sm" onclick="showAccessoriesList()">Manage</button></div></div><div class="stat-card"><h3>🔐 Important Links & Passwords</h3><input id="linkTitle" placeholder="Title"><input id="linkUrl" placeholder="URL"><input id="linkPass" placeholder="Password"><button class="btn btn-sm" onclick="addLink()">Add</button><div class="transaction-list">${linksHtml||'No links'}</div></div></div>`;
    }
    
    // ======================= 5. এমপ্লয়ি ড্যাশবোর্ড =======================
    async function renderEmployeeDashboard(user){
        let salaries = (await callApi('getExpenses')).data?.filter(e=>e.subCategory==='বেতন বাবদ' && e.employeeName===user.username)||[];
        let acc = (await callApi('getAccessories')).data||[];
        let myAcc = acc.filter(a=>a.assignedTo===user.username);
        return `<div class="glass-card" style="padding:1.8rem;"><div class="flex-between"><h2>👋 Welcome ${user.name}</h2><div><button class="btn-outline btn-sm" onclick="showChangePasswordModal()">🔐 Change Password</button><button class="btn-outline btn-sm" onclick="logout()">Logout</button></div></div><div class="grid-cards"><div class="stat-card card-income"><h3>💰 Salary</h3>${salaries.map(s=>`${s.date}: ৳${s.amount}`).join('<br>')||'No record'}</div><div class="stat-card card-link"><h3>🛠️ My Accessories</h3>${myAcc.map(a=>a.itemName).join(', ')||'None'}</div></div></div>`;
    }
    
    // ======================= শেয়ার্ড ফাংশন (অ্যাটেন্ডেন্স, কমপ্লেইন্ট, STB, এক্সেসরিজ, রিপোর্ট) =======================
    window.showAttendanceForm = function() {
        const opts = usersList.filter(u=>u.role==='employee').map(u=>`<option value="${u.username}">${u.name}</option>`).join('');
        showModal(`<h3>📋 Mark Attendance</h3><select id="attEmp">${opts}</select><select id="attStatus"><option value="present">Present</option><option value="absent">Absent</option><option value="late">Late</option></select><textarea id="attNote"></textarea><button class="btn" onclick="saveAttendance()">Save</button>`);
    };
    window.saveAttendance = async function() {
        await callApi('addAttendance','POST',{ username:document.getElementById('attEmp').value, status:document.getElementById('attStatus').value, date:getToday(), note:document.getElementById('attNote').value, lateTime:'' }, true);
        alert("Attendance saved"); closeModal(); renderDashboard();
    };
    window.showComplaintEntry = function() {
        showModal(`<h3>📢 New Complaint</h3><textarea id="complaintText" rows="3"></textarea><select id="complaintStatus"><option value="pending">pending</option><option value="processing">processing</option></select><button class="btn" onclick="saveComplaintLocal()">Submit</button>`);
    };
    window.saveComplaintLocal = function() {
        let txt = document.getElementById('complaintText').value;
        if(!txt) return alert("Write complaint");
        let local = JSON.parse(localStorage.getItem('userComplaints')||'[]');
        local.push({ date: getToday(), complaint: txt, status: document.getElementById('complaintStatus').value });
        localStorage.setItem('userComplaints',JSON.stringify(local));
        alert("Complaint stored locally"); closeModal();
    };
    window.showSTBForm = function() {
        showModal(`<h3>📺 STB Income</h3><input type="date" id="stbDate" value="${getToday()}"><input type="number" id="stbAmount" placeholder="Amount"><textarea id="stbNote"></textarea><button class="btn" onclick="saveSTB()">Save</button>`);
    };
    window.saveSTB = async function() {
        const amt = +document.getElementById('stbAmount').value;
        if(!amt) return alert("Amount");
        await callApi('addSTBIncome','POST',{ amount:amt, date:document.getElementById('stbDate').value, note:document.getElementById('stbNote').value, operatorName:currentUser.username, editableUntil:new Date(Date.now()+16*3600000).toISOString() }, true);
        alert("STB added"); closeModal(); renderDashboard();
    };
    window.showAccessoriesList = async function() {
        const acc = (await callApi('getAccessories')).data || [];
        let html = `<h3>🛠️ Accessories</h3><input id="newItem" placeholder="Item name"><select id="assignTo"><option value="">Unassigned</option>${usersList.map(u=>`<option value="${u.username}">${u.name}</option>`).join('')}</select><textarea id="accNote"></textarea><button class="btn" onclick="addAccessory()">Assign</button><hr>`;
        acc.forEach(a=>{ html += `<div style="border-bottom:1px solid #ddd; margin:8px 0;">🔧 ${a.itemName} → ${usersList.find(u=>u.username===a.assignedTo)?.name||'Unassigned'} (${a.note||''})</div>`; });
        showModal(html);
    };
    window.addAccessory = async function() {
        const item = document.getElementById('newItem').value;
        if(!item) return alert("Item name");
        await callApi('addAccessory','POST',{ itemName:item, assignedTo:document.getElementById('assignTo').value, note:document.getElementById('accNote').value }, true);
        alert("Added"); closeModal(); renderDashboard();
    };
    window.showDailyReport = async function() {
        const today = getToday();
        const inc = (await callApi('getIncomes')).data?.filter(i=>i.date===today).reduce((s,i)=>s+i.amount,0)||0;
        const exp = (await callApi('getExpenses')).data?.filter(e=>e.date===today).reduce((s,e)=>s+e.amount,0)||0;
        alert(`📅 ${today}\nIncome: ${inc} tk\nExpense: ${exp} tk\nBalance: ${inc-exp} tk`);
    };
    window.showMonthlyReport = async function() {
        const m = new Date().getMonth();
        const inc = (await callApi('getIncomes')).data?.filter(i=>new Date(i.date).getMonth()===m).reduce((s,i)=>s+i.amount,0)||0;
        const exp = (await callApi('getExpenses')).data?.filter(e=>new Date(e.date).getMonth()===m).reduce((s,e)=>s+e.amount,0)||0;
        alert(`This month - Income: ${inc} tk | Expense: ${exp} tk | Savings: ${inc-exp} tk`);
    };
    
    // ======================= লগইন পেজ =======================
    async function renderLoginPage() {
        const complaints = await fetchComplaints();
        const attRes = await callApi('getAttendance&date='+getToday());
        const attendance = attRes.success?attRes.data:[];
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="glass-card" style="max-width: 480px; margin: 3rem auto;">
                <div style="text-align:center">
                    <img src="https://drive.google.com/uc?export=view&id=1aymrx1b0ZCSAw0jORyvf3iCdueU4ltwZ" class="logo-img">
                    <h1 style="font-size:2rem; background: linear-gradient(95deg,#f97316,#ef4444); -webkit-background-clip:text; background-clip:text; color:transparent;">Ainet & CCN</h1>
                    <p>Finance & Management</p>
                </div>
                <form id="loginForm">
                    <input type="text" id="username" placeholder="Username">
                    <input type="password" id="password" placeholder="Password">
                    <label><input type="checkbox" id="remember"> Remember me (7 days)</label>
                    <button type="submit" class="btn" style="width:100%">Login</button>
                </form>
                <hr>
                <div><strong>✅ Present today:</strong> ${attendance.map(a=>`<span class="badge">${usersList.find(u=>u.username===a.username)?.name||a.username}</span>`).join(' ') || 'None'}</div>
                <div><strong>📢 Complaints:</strong> ${complaints.map(c=>`<div>⚠️ ${c.complaint} (${c.status})</div>`).join('')||'✨ No complaints'}</div>
                <div style="text-align:center; font-size:12px; margin-top:20px;">Developed by Mehrab Jahid</div>
            </div>
        `;
        document.getElementById('loginForm').addEventListener('submit', async(e)=>{
            e.preventDefault();
            const uname = document.getElementById('username').value;
            const pwd = document.getElementById('password').value;
            const rem = document.getElementById('remember').checked;
            if(await login(uname,pwd,rem)) renderDashboard();
            else alert("Invalid username or password");
        });
    }
    
    async function renderDashboard() {
        const user = getStoredUser();
        if(!user) { renderLoginPage(); return; }
        currentUser = user;
        const app = document.getElementById('app');
        if(user.role === 'admin') app.innerHTML = await renderAdminDashboard();
        else if(user.role === 'accounts') app.innerHTML = await renderAccountsDashboard();
        else if(user.role === 'dataincharge') app.innerHTML = await renderInchargeDashboard();
        else if(user.role === 'dataoperator') app.innerHTML = await renderOperatorDashboard();
        else app.innerHTML = await renderEmployeeDashboard(user);
    }
    
    (async () => {
        await loadUsers();
        const u = getStoredUser();
        if(u) renderDashboard();
        else renderLoginPage();
    })();
</script>
</body>
</html>

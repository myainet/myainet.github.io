<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ainet & CCN Official</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            font-style: italic;
            color: #667eea;
            margin-bottom: 10px;
        }
        .sub {
            color: #666;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #5a67d8;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1><i>Ainet & CCN Official</i></h1>
    <div class="sub">Finance & Management</div>
    <input type="text" id="username" placeholder="ইউজারনেম">
    <input type="password" id="password" placeholder="পাসওয়ার্ড">
    <button onclick="doLogin()">লগইন করুন</button>
    <div id="errorMsg" class="error"></div>
    <div class="footer">Developed by Mehrab Jahid</div>
</div>

<script>
    // লোকাল ইউজার লিস্ট
    const users = [
        { username: "admin", password: "admin123", role: "admin", name: "এডমিন" },
        { username: "accounts", password: "acc123", role: "accounts", name: "একাউন্টস" },
        { username: "incharge", password: "inch123", role: "dataincharge", name: "ডাটা ইনচার্জ" },
        { username: "operator", password: "op123", role: "dataoperator", name: "ডাটা অপারেটর" },
        { username: "noyon", password: "123456", role: "employee", name: "নয়ন" }
    ];

    function doLogin() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const user = users.find(u => u.username === username && u.password === password);
        
        if (user) {
            localStorage.setItem('currentUser', JSON.stringify(user));
            showDashboard(user);
        } else {
            document.getElementById('errorMsg').innerText = 'ভুল ইউজারনেম বা পাসওয়ার্ড!';
        }
    }

    function showDashboard(user) {
        document.body.innerHTML = `
            <div style="background:white; padding:40px; text-align:center; max-width:500px; margin:50px auto; border-radius:20px;">
                <h2 style="color:#667eea;">ড্যাশবোর্ড</h2>
                <p>স্বাগতম, ${user.name} (${user.role})</p>
                <button onclick="logout()" style="background:#dc3545; margin-top:20px;">লগআউট</button>
            </div>
        `;
    }

    function logout() {
        localStorage.removeItem('currentUser');
        location.reload();
    }

    // ইতিমধ্যে লগইন থাকলে সরাসরি ড্যাশবোর্ড দেখান
    const savedUser = localStorage.getItem('currentUser');
    if (savedUser) {
        const user = JSON.parse(savedUser);
        showDashboard(user);
    }
</script>
</body>
</html>

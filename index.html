<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Ainet & CCN | সম্পূর্ণ ম্যানেজমেন্ট সিস্টেম</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    :root { --primary: #0d6efd; --success: #198754; --danger: #dc3545; --warning: #ffc107; --info: #0dcaf0; --dark: #212529; --light: #f8f9fa; --bg: #f0f2f5; }
    body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; }
    #pageLoader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .logo-text { font-size: 2rem; font-weight: bold; font-style: italic; color: var(--primary); }
    .logo-sub { font-size: 0.9rem; color: #6c757d; }
    .card-custom { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); background: #fff; }
    .mini-dash { cursor: pointer; transition: all 0.2s; padding: 10px; border-radius: 12px; background: #fff; border: 1px solid #e9ecef; text-align: center; }
    .mini-dash:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); background: #f8f9fa; }
    .developer { font-size: 0.75rem; color: #6c757d; text-align: center; margin-top: 1.5rem; }
    .hidden { display: none; }
    .summary-card { background: #fff; border-radius: 10px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid #e9ecef; }
    .summary-card:hover { box-shadow: 0 6px 16px rgba(0,0,0,0.1); transform: translateY(-2px); }
    .recharge-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; background: #fff; padding: 6px; border-radius: 8px; border: 1px solid #e9ecef; }
    .attendance-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; flex-wrap: wrap; }
    .present-badge { background: #d4edda; color: #155724; padding: 4px 12px; border-radius: 20px; font-weight: 500; font-size: 0.8rem; }
    .absent-badge { background: #f8d7da; color: #721c24; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
    .late-badge { background: #fff3cd; color: #856404; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
    .filter-box { background: #fff; padding: 12px; border-radius: 12px; margin-bottom: 18px; border: 1px solid #e9ecef; }
    .nav-pills .nav-link.active { background: var(--primary); }
    .btn-sm-custom { padding: 2px 6px; font-size: 0.7rem; margin: 0 2px; }
    .recharge-panel { background: #fff; border-radius: 12px; padding: 12px; max-height: 550px; overflow-y: auto; border: 1px solid #e9ecef; }
    .edit-disabled { opacity: 0.5; pointer-events: none; cursor: not-allowed; }
    @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { position: absolute; top: 0; left: 0; width: 100%; } }
  </style>
</head>
<body>

<div id="pageLoader"><div class="spinner-border text-primary"></div></div>

<div id="loginPage" class="container py-4">
  <div class="text-center mb-3">
    <div class="logo-text">𝑨𝒊𝒏𝒆𝒕 & 𝑪𝑪𝑵</div>
    <div class="logo-sub">Finance & Management</div>
  </div>
  <div class="card card-custom mx-auto" style="max-width: 400px;">
    <div class="card-body">
      <h5 class="card-title text-center mb-3">লগ ইন</h5>
      <div class="mb-2"><input type="text" id="loginUsername" class="form-control" placeholder="ইউজারনেম"></div>
      <div class="mb-2"><input type="password" id="loginPassword" class="form-control" placeholder="পাসওয়ার্ড"></div>
      <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="rememberMe"><label class="form-check-label" for="rememberMe">সাতদিন মনে রাখুন</label></div>
      <button class="btn btn-primary w-100" onclick="handleLogin()">প্রবেশ করুন</button>
      <div id="loginError" class="text-danger mt-2 text-center"></div>
    </div>
  </div>
  <div class="developer">Developed by Mehrab Jahid</div>
</div>

<div id="mainApp" class="hidden">
  <nav class="navbar navbar-dark bg-dark">
    <span class="navbar-brand ms-2" id="roleTitle">ড্যাশবোর্ড</span>
    <div>
      <button class="btn btn-outline-warning btn-sm me-1" onclick="changePassword()"><i class="bi bi-key"></i> পাসওয়ার্ড</button>
      <button class="btn btn-outline-light btn-sm me-1" onclick="window.print()"><i class="bi bi-printer"></i></button>
      <button class="btn btn-outline-light btn-sm me-2" onclick="logout()">লগআউট</button>
    </div>
  </nav>
  <div class="container-fluid mt-2" id="dynamicContent"></div>
  <div class="developer">Developed by Mehrab Jahid</div>
</div>

<script>
const todayDate = new Date().toISOString().split('T')[0];
// সর্বোচ্চ ২ দিন আগের তারিখ
const maxBackDate = new Date();
maxBackDate.setDate(maxBackDate.getDate() - 2);
const maxBackDateStr = maxBackDate.toISOString().split('T')[0];

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzBUPjUdLcHkVwSqDLHyKqzuu_3UkRWZi37xp_JlcY5E1UBrNfJlgVeJt4mMDGh31KeHw/exec';
let token = localStorage.getItem('token') || sessionStorage.getItem('token');
let role = localStorage.getItem('role') || sessionStorage.getItem('role');
let currentLoggedInUser = localStorage.getItem('loggedInUser') || sessionStorage.getItem('loggedInUser') || '';

// এডিট/ডিলিট চেক করার ফাংশন (১৬ ঘন্টা)
function canEdit(timestamp) {
  if(role === 'Admin') return true;
  if(!timestamp) return false;
  const entryTime = new Date(timestamp);
  const now = new Date();
  const diffHours = (now - entryTime) / (1000 * 60 * 60);
  return diffHours <= 16;
}

$(function(){ 
  if(token && role) { $('#loginPage').addClass('hidden'); $('#mainApp').removeClass('hidden'); $('#roleTitle').text(role + ' প্যানেল'); loadDashboard(role); }
  else { showLogin(); }
  setTimeout(() => { $('#pageLoader').fadeOut(300); }, 400);
});

function showLogin(){ $('#mainApp').addClass('hidden'); $('#loginPage').removeClass('hidden'); }

async function apiCall(action, params = {}){
  params.action = action; 
  if(!params.token && token) params.token = token;
  const formData = new URLSearchParams();
  for (let key in params) { 
    if(params[key] !== undefined && params[key] !== null) {
      formData.append(key, params[key]); 
    }
  }
  console.log(`Calling ${action} with:`, Object.fromEntries(formData));
  const resp = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
  const result = await resp.json();
  console.log(`Response from ${action}:`, result);
  return result;
}

function showAccountsTable(data, containerId = '#accountsList') {
  let html = `<div id="printArea"><div class="table-responsive"><table class="table table-bordered table-sm">`
  html += `<thead class="table-light"><tr><th>#</th><th>তারিখ</th><th>টাইপ</th><th>কোম্পানি</th><th>ক্যাট</th><th>সাব</th><th>টাকা</th><th>নোট</th><th>এডিট/ডিলিট</th></tr></thead><tbody>`;
  let total = 0;
  if (data && Array.isArray(data) && data.length > 0) {
    data.forEach((r, i) => {
      const sign = r.type === 'Income' ? '+' : '-';
      const cls = r.type === 'Income' ? 'text-success' : 'text-danger';
      const canEditFlag = canEdit(r.timestamp);
      const editBtn = (r.timestamp && r.timestamp !== 'undefined' && canEditFlag) ? `<button class="btn btn-sm btn-warning btn-sm-custom" onclick="editAcc('${r.timestamp}','${r.amount}','${r.note||''}')">✏️</button>` : (r.timestamp ? '<span class="text-muted small">🔒 ১৬ ঘন্টা পেরিয়েছে</span>' : '');
      const delBtn = (r.timestamp && r.timestamp !== 'undefined' && canEditFlag) ? `<button class="btn btn-sm btn-danger btn-sm-custom" onclick="deleteAcc('${r.timestamp}')">🗑️</button>` : '';
      html += `<tr>
        <td class="align-middle">${i+1}</td>
        <td class="align-middle">${r.date||''}</td>
        <td class="align-middle">${r.type||''}</td>
        <td class="align-middle">${r.company||''}</td>
        <td class="align-middle">${r.category||''}</td>
        <td class="align-middle">${r.subcategory||''}</td>
        <td class="${cls} fw-bold align-middle">${sign}${r.amount}</td>
        <td class="align-middle">${r.note||''}</td>
        <td class="align-middle">${editBtn} ${delBtn}</td>
      </tr>`;
      total += Number(r.amount) || 0;
    });
    html += `<tr class="table-secondary fw-bold"><td colspan="6">মোট</td><td>${total} টাকা</td><td colspan="3"></td></tr>`;
  } else { html += '<tr><td colspan="10" class="text-center">কোনো এন্ট্রি নেই</td></tr>'; }
  html += '</tbody>}</div></div><button class="btn btn-sm btn-secondary mt-2" onclick="printDiv()"><i class="bi bi-printer"></i> প্রিন্ট</button>';
  $(containerId).html(html);
}

function printDiv() { const pc = document.getElementById('printArea').innerHTML; const oc = document.body.innerHTML; document.body.innerHTML = pc; window.print(); document.body.innerHTML = oc; location.reload(); }

function editAcc(ts, oa, on) {
  if(!canEdit(ts)){ alert('⚠️ এই এন্ট্রি ১৬ ঘন্টা পার হয়ে গেছে, এডিট করা যাবে না!'); return; }
  const a = prompt('টাকা পরিবর্তন করুন', oa); if (a === null) return;
  const n = prompt('নোট পরিবর্তন করুন', on);
  apiCall('updateAccountsEntry', { timestamp: ts, amount: a, note: n }).then(r => {
    if (r && r.success) { loadAccountsHistory(); alert('✅ এডিট সফল'); } else alert(r ? (r.message||r.error) : 'ব্যর্থ');
  });
}

function deleteAcc(ts) {
  if(!canEdit(ts)){ alert('⚠️ এই এন্ট্রি ১৬ ঘন্টা পার হয়ে গেছে, ডিলিট করা যাবে না!'); return; }
  if (!confirm('ডিলিট করতে চান?')) return;
  apiCall('deleteAccountsEntry', { timestamp: ts }).then(r => {
    if (r && r.success) { loadAccountsHistory(); alert('✅ ডিলিট সফল'); } else alert(r ? (r.message||r.error) : 'ব্যর্থ');
  });
}

async function handleLogin(){
  const u = $('#loginUsername').val().trim(), p = $('#loginPassword').val().trim();
  if(!u || !p){ $('#loginError').text('ইউজারনেম ও পাসওয়ার্ড দিন'); return; }
  const res = await apiCall('login', { username:u, password:p });
  if(res && res.success){
    if($('#rememberMe').is(':checked')){ localStorage.setItem('token',res.token); localStorage.setItem('role',res.role); localStorage.setItem('loggedInUser',u); }
    else { sessionStorage.setItem('token',res.token); sessionStorage.setItem('role',res.role); sessionStorage.setItem('loggedInUser',u); }
    token=res.token; role=res.role; currentLoggedInUser = u;
    $('#loginPage').addClass('hidden'); $('#mainApp').removeClass('hidden'); $('#roleTitle').text(role + ' প্যানেল'); loadDashboard(role);
  } else { $('#loginError').text(res? (res.message||'লগইন ব্যর্থ') : 'লগইন ব্যর্থ'); }
}

async function logout(){ await apiCall('logout'); localStorage.clear(); sessionStorage.clear(); token=null; role=null; showLogin(); }
async function changePassword(){
  const oldPass = prompt('বর্তমান পাসওয়ার্ড:'); if(!oldPass) return;
  const newPass = prompt('নতুন পাসওয়ার্ড (৪+ ক্যারেক্টার):'); if(!newPass || newPass.length<4) return;
  const confirm = prompt('নতুন পাসওয়ার্ড আবার:'); if(newPass !== confirm) { alert('মিলছে না'); return; }
  const res = await apiCall('changePassword', { oldPassword:oldPass, newPassword:newPass });
  if(res && res.success) alert('পাসওয়ার্ড পরিবর্তন সফল!'); else alert(res? (res.message||res.error) : 'ব্যর্থ');
}

async function loadDashboard(r){
  const cont = $('#dynamicContent').empty();
  cont.html('<div class="text-center mt-5"><div class="spinner-border"></div><p>লোড হচ্ছে...</p></div>');
  switch(r.trim().toLowerCase()){
    case 'admin': await renderAdmin(cont); break;
    case 'accounts': await renderAccounts(cont); break;
    case 'data incharge': await renderIncharge(cont); break;
    case 'data operator': await renderOperator(cont); break;
    case 'employee': await renderEmployee(cont); break;
  }
}

// ==================== ACCOUNTS (বেতন বাবদ ক্যাটাগরি ঠিক করা হয়েছে) ====================
async function renderAccounts(cont){
  const mini = await apiCall('getAccountsMiniDash');
  let html = `<div class="filter-box mb-3"><h6><i class="bi bi-funnel"></i> ফিল্টার</h6><div class="row g-2">
    <div class="col-6 col-md-2"><input type="date" id="aDate" class="form-control form-control-sm"></div>
    <div class="col-6 col-md-2"><input type="date" id="aDateEnd" class="form-control form-control-sm" placeholder="শেষ তারিখ"></div>
    <div class="col-6 col-md-2"><select id="aType" class="form-select form-select-sm"><option value="">সব</option><option>Income</option><option>Expense</option></select></div>
    <div class="col-6 col-md-2"><select id="aCompany" class="form-select form-select-sm"><option value="">সব</option><option>Ainet</option><option>CCN</option><option>Ainet Reseller</option><option>CCN Reseller</option><option>Ainet পলাশবাড়ী</option><option>CCN পলাশবাড়ী</option></select></div>
    <div class="col-6 col-md-2"><select id="aSub" class="form-select form-select-sm"><option value="">সব</option></select></div>
    <div class="col-6 col-md-2"><button class="btn btn-info btn-sm w-100" onclick="filterAccounts()"><i class="bi bi-search"></i> ফিল্টার</button></div>
  </div></div>
  <button class="btn btn-primary btn-sm mb-3" onclick="openAccModal()"><i class="bi bi-plus-circle"></i> নতুন এন্ট্রি</button>
  <div class="row g-2 mb-3" id="miniCards"></div>
  <div id="accountsList"></div>`;
  cont.html(html);
  ['ডিপিএস','বিদ্যুৎ বিল','অফিস খরচ','বেতন বাবদ','টিজি/প্যাচকট','ফাইবার ক্রয়','যন্ত্রাংশ ক্রয়','স্প্লিটার','বিবিধ','মেইন্টেন্স বাবদ','ভ্যাট','ট্যাক্স ফি','সফটওয়্যার বিল','দানবাবদ','যাতায়াত','মোবাইল বিল','আপ্যায়ন','কুরিয়ার খরচ','ব্যাংক জমা','স্যার নিজ খরচ','ম্যাডাম খরচ'].forEach(c => $('#aSub').append(`<option value="${c}">${c}</option>`));
  if(mini){ 
    const labels={'Ainet_Income':'আয় Ainet','Ainet_Expense':'ব্যয় Ainet','Ainet Reseller_Income':'আয় Reseller','Ainet Reseller_Expense':'ব্যয় Reseller','CCN_Income':'আয় CCN','CCN_Expense':'ব্যয় CCN','CCN Reseller_Income':'আয় CCN Reseller','CCN Reseller_Expense':'ব্যয় CCN Reseller','CCN পলাশবাড়ী_Income':'আয় CCN পলাশ','CCN পলাশবাড়ী_Expense':'ব্যয় CCN পলাশ','Ainet পলাশবাড়ী_Income':'আয় Ainet পলাশ','Ainet পলাশবাড়ী_Expense':'ব্যয় Ainet পলাশ'}; 
    const cards=$('#miniCards'); const colors=['#e3f2fd','#fce4ec','#e8f5e9','#fff3e0','#f3e5f5','#ffebee','#e0f7fa','#fff8e1','#e8eaf6','#fbe9e7','#efebe9','#eceff1']; let i=0; 
    for(let k in labels){ 
      cards.append(`<div class="col-6 col-md-2"><div class="mini-dash" style="background:${colors[i%12]}" onclick="openAccModal('${k}')"><small>${labels[k]}</small><br><b>${mini[k]||0} টাকা</b></div></div>`); 
      i++; 
    } 
  }
  loadAccountsHistory(); buildAccountsModal();
}

function buildAccountsModal(){
  if($('#accModal').length)return;
  $('body').append(`<div class="modal fade" id="accModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h6>নতুন এন্ট্রি</h6><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="date" id="acDate" class="form-control form-control-sm mb-2" max="${todayDate}" min="${maxBackDateStr}" value="${todayDate}"><select id="acType" class="form-select form-select-sm mb-2"><option>Income</option><option>Expense</option></select><select id="acCompany" class="form-select form-select-sm mb-2"><option>Ainet</option><option>CCN</option><option>Ainet Reseller</option><option>CCN Reseller</option><option>Ainet পলাশবাড়ী</option><option>CCN পলাশবাড়ী</option></select><div id="incomeCats" class="mb-2"><select id="acIncomeCat" class="form-select form-select-sm"><option>নগদ জমা</option><option>অফিস কালেকশন</option><option>অনলাইন কালেকশন</option><option>চেক কালেকশন</option></select></div><div id="expenseCats" class="mb-2 hidden"><div class="d-flex flex-wrap" id="expenseBtns"></div></div><input id="acSub" class="form-control form-control-sm mb-2" placeholder="সাব-ক্যাটাগরি"><input type="number" id="acAmount" class="form-control form-control-sm mb-2" placeholder="টাকা"><input id="acNote" class="form-control form-control-sm mb-2" placeholder="নোট"><button class="btn btn-success btn-sm w-100" onclick="saveAccEntry()">সেভ</button></div></div></div>`);
  
  ['ডিপিএস','বিদ্যুৎ বিল','অফিস খরচ','টিজি/প্যাচকট','ফাইবার ক্রয়','যন্ত্রাংশ ক্রয়','স্প্লিটার','বিবিধ','মেইন্টেন্স বাবদ','ভ্যাট','ট্যাক্স ফি','সফটওয়্যার বিল','দানবাবদ','যাতায়াত','মোবাইল বিল','আপ্যায়ন','কুরিয়ার খরচ','ব্যাংক জমা','স্যার নিজ খরচ','ম্যাডাম খরচ'].forEach(c => $('#expenseBtns').append(`<button type="button" class="btn btn-sm btn-outline-secondary m-1" onclick="setExpenseSub('${c}')">${c}</button>`));
  
  $('#expenseBtns').append(`<button type="button" class="btn btn-sm btn-outline-danger m-1" onclick="showEmployeeListForSalary()">💰 বেতন বাবদ (এমপ্লয়ী সিলেক্ট)</button>`);
  
  $('#acType').on('change',function(){ 
    if($(this).val()==='Expense'){
      $('#incomeCats').addClass('hidden');
      $('#expenseCats').removeClass('hidden');
    } else {
      $('#incomeCats').removeClass('hidden');
      $('#expenseCats').addClass('hidden');
      $('#empSelectionDiv').remove();
    } 
  });
}

function setExpenseSub(cat){
  $('#acSub').val(cat);
  $('#empSelectionDiv').remove();
  $('#salaryFlag').remove();
}

async function showEmployeeListForSalary(){
  const em = await apiCall('getEmployeesList');
  if(em && em.length){
    let h = '<div id="empSelectionDiv" class="mt-2 p-2 border rounded"><label class="fw-bold text-danger">👨‍💼 এমপ্লয়ী সিলেক্ট করুন:</label><div class="d-flex flex-wrap mt-1">';
    em.forEach(e => h += `<button type="button" class="btn btn-sm btn-outline-primary m-1" onclick="selectEmployeeForSalary('${e}')">${e}</button>`);
    h += '</div></div>';
    if($('#empSelectionDiv').length) $('#empSelectionDiv').remove();
    $('#expenseCats').after(h);
  } else {

async function saveAccEntry(){
  const dateVal = $('#acDate').val();

  if (dateVal > todayDate) { alert('⚠️ ভবিষ্যতের তারিখে এন্ট্রি করা যাবে না!'); return; }
  if (dateVal < maxBackDateStr && role !== 'Admin') { alert(`⚠️ আপনি সর্বোচ্চ ২ দিন আগের তারিখে এন্ট্রি করতে পারবেন। (সর্বনিম্ন: ${maxBackDateStr})`); return; }
  
  const type = $('#acType').val();
  const company = $('#acCompany').val();
  const amount = $('#acAmount').val();
  const note = $('#acNote').val();
  
  if(!amount || Number(amount) <= 0){ alert('⚠️ টাকার পরিমাণ দিন!'); return; }
  
  let category = '';
  let subCategory = $('#acSub').val().trim();
  const isSalary = ($('#salaryFlag').length > 0 && $('#salaryFlag').val() === 'true');
  
  if(type === 'Income'){
    category = $('#acIncomeCat').val();
    subCategory = category;
  } else {
    if(isSalary && subCategory){
      category = "বেতন বাবদ";
    } else {
      if(!subCategory){ alert('ক্যাটাগরি নির্বাচন করুন!'); return; }
      category = subCategory;
    }
  }
  
  if(!category){ alert('ক্যাটাগরি দিন'); return; }
  
  console.log('Saving Entry:', {date: dateVal, type, company, category, subCategory, amount, note});
  
  const res = await apiCall('saveAccountsEntry', {
    date: dateVal, 
    type: type, 
    company: company, 
    category: category, 
    subCategory: subCategory, 
    amount: amount, 
    note: note

async function saveAllRecharge(type){
  const d = todayDate;
  if(role !== 'Admin' && d < maxBackDateStr){ alert('আপনি ২ দিন আগের ডেটে রিচার্জ করতে পারবেন না'); return; }
  const co = 'Ainet';
  const prefix = type === 'Cash' ? 'cash' : 'bkash';
  let promises = [];
  $(`.${prefix}-id`).each(function(idx){
    const id = $(this).val().trim();
    const name = $(`.${prefix}-name`).eq(idx).val().trim();
    const amount = $(`.${prefix}-amount`).eq(idx).val();
    const note = $(`.${prefix}-note`).eq(idx).val().trim();
    if(amount && Number(amount) > 0){
      promises.push(apiCall('saveRecharge', { date: d, company: co, type: type, customerId: id || '-', customerName: name || '-', amount: Number(amount), note: note }));
    }
  });
  if(promises.length === 0){ alert('কোনো রিচার্জ ডাটা নেই! টাকার পরিমাণ দিন।'); return; }
  const results = await Promise.all(promises);
  const successCount = results.filter(r => r && r.success).length;
  if(successCount > 0){
    alert(`✅ ${successCount} টি ${type} রিচার্জ সংরক্ষিত!`);
    loadRechargeTotals();
    loadMonthlyRecharge();
    $(`.${prefix}-id, .${prefix}-name, .${prefix}-amount, .${prefix}-note`).val('');
  } else { alert('❌ রিচার্জ সেভ ব্যর্থ!'); }
}

        if(!empMap.has(r.username)) empMap.set(r.username, {Present:0, Absent:0, Late:0, Holiday:0, Leave:0});
        let stat = r.status;
        if(empMap.get(r.username)[stat] !== undefined) empMap.get(r.username)[stat]++;
      });
      for(let [name, counts] of empMap){
        summaryHtml += `<tr><td>${name}</td><td class="text-success fw-bold">${counts.Present || 0}</td><td class="text-danger">${counts.Absent || 0}</td><td class="text-warning">${counts.Late || 0}</td><td class="text-info">${counts.Holiday || 0}</td><td class="text-secondary">${counts.Leave || 0}</td></tr>`;
      }

    summaryHtml += '</tbody>}</div></div>';

  } else if(dateVal){
    const res = await apiCall('getAttendanceByDate', {date: dateVal});

    if(res && res.length){ 
      res.forEach((r, i) => { 
        let badge = '';
        if(r.status === 'Present') badge = '<span class="badge bg-success">Present</span>';
        else if(r.status === 'Absent') badge = '<span class="badge bg-danger">Absent</span>';
        else if(r.status === 'Late') badge = '<span class="badge bg-warning text-dark">Late</span>';
        else if(r.status === 'Holiday') badge = '<span class="badge bg-info">Holiday</span>';
        else if(r.status === 'Leave') badge = '<span class="badge bg-secondary">Leave</span>';
        else badge = r.status;
        h += `<tr><td class="align-middle">${i+1}</td><td class="align-middle">${r.username}</td><td class="align-middle">${badge}</td><td class="align-middle">${r.note || ''}</td></tr>`;
      }); 
    } else { h += '<tr><td colspan="4" class="text-center">কোনো হাজিরার তথ্য নেই</td></tr>'; }
    h += '</tbody>}</div></div>';
    $('#attendanceReport').html(h);
  } else {
    alert('দয়া করে একটি তারিখ অথবা মাস নির্বাচন করুন');
  }
}

async function saveAllAttendance(){
  const d = $('#attDate').val();
  if(d > todayDate){ alert('⚠️ ভবিষ্যতের তারিখে হাজিরা সংরক্ষণ করা যাবে না!'); return; }
  if(role !== 'Admin' && d < maxBackDateStr){ alert(`⚠️ আপনি সর্বোচ্চ ২ দিন আগের তারিখে হাজিরা সংরক্ষণ করতে পারবেন।`); return; }
  let promises = [];
  $('.att-status').each(function(){ 
    const emp = $(this).data('emp');
    const status = $(this).val(); 
    if(status && status !== ''){ 
      const note = $(this).closest('tr').find('.att-note').val() || ''; 
      promises.push(apiCall('saveAttendance', {date: d, username: emp, status: status, note: note}));
    } 
  });
  if(promises.length === 0){ alert('কোনো হাজিরা স্ট্যাটাস সিলেক্ট করেননি!'); return; }
  const results = await Promise.all(promises);
  const successCount = results.filter(r => r && r.success).length;
  if(successCount > 0){
    alert(`✅ ${successCount} জনের হাজিরা সংরক্ষিত!`);
    await loadAttendanceByFilter();
  } else { alert('❌ হাজিরা সংরক্ষণ ব্যর্থ!'); }
}

async function filterSTBHistory(){
  const dateVal = $('#stbFilterDate').val();
  const monthVal = $('#stbFilterMonth').val();
  let allData = await apiCall('getSTBHistory');
  if(!allData || !allData.length){ $('#stbHistory').html('<p>কোনো ডাটা নেই</p>'); return; }
  let filtered = allData;
  if(dateVal) filtered = allData.filter(x => x.date === dateVal);
  else if(monthVal) filtered = allData.filter(x => x.date.startsWith(monthVal));
  let h = `<div class="table-responsive"><table class="table table-sm table-bordered"><thead class="table-light"><tr><th>তারিখ</th><th>টাকা</th><th>বিস্তারিত</th><th>এডিট/ডিলিট</th></tr></thead><tbody>`;
  let t = 0;
  if(filtered.length){ 
    filtered.forEach(x => { 
      const canEditFlag = canEdit(x.timestamp);
      const editBtn = canEditFlag ? `<button class="btn btn-sm btn-warning btn-sm-custom" onclick="editSTB('${x.timestamp}','${x.total}')">✏️</button>` : '';
      const delBtn = canEditFlag ? `<button class="btn btn-sm btn-danger btn-sm-custom" onclick="deleteSTB('${x.timestamp}')">🗑️</button>` : '';
      h += `<tr><td class="align-middle">${x.date}</td><td class="align-middle fw-bold text-success">${x.total} টাকা</td><td class="align-middle">${x.details || ''}</td><td class="align-middle">${editBtn} ${delBtn}</td></tr>`; 
      t += Number(x.total); 
    }); 
    h += `<tr class="table-secondary fw-bold"><td>মোট</td><td colspan="3">${t} টাকা</td></tr>`;
  } else { h += '<tr><td colspan="4" class="text-center">কোনো এসটিবি এন্ট্রি নেই</td></tr>'; }
  h += '</tbody>}</div>';
  $('#stbHistory').html(h);
}

  }

    else alert('❌ ব্যর্থ'); 
  } 
}
async function loadSTBSummary(){
  const res = await apiCall('getSTBHistory'); 
  let td = 0, mt = 0; 
  const now = new Date();
  const currentMonth = now.getMonth();
  const currentYear = now.getFullYear();
  if(res && res.length){ 
    res.forEach(x => { 
      if(x.date === todayDate) td += Number(x.total); 
      const d = new Date(x.date); 
      if(d.getMonth() === currentMonth && d.getFullYear() === currentYear) mt += Number(x.total); 
    }); 
  }
  $('#stbToday').text(td + ' টাকা'); $('#stbMonth').text(mt + ' টাকা');
}

    <div class="tab-pane fade" id="tabUsers"><h6>নতুন ইউজার তৈরি</h6><div class="row g-2 mb-3"><div class="col-6 col-md-3"><input id="newUser" class="form-control form-control-sm" placeholder="ইউজারনেম"></div><div class="col-6 col-md-3"><input id="newPass" class="form-control form-control-sm" placeholder="পাসওয়ার্ড"></div><div class="col-6 col-md-3"><select id="newRole" class="form-select form-select-sm"><option>Employee</option><option>Accounts</option><option>Data Incharge</option><option>Data Operator</option><option>Admin</option></select></div><div class="col-6 col-md-3"><button class="btn btn-success btn-sm w-100" onclick="createUser()">তৈরি করুন</button></div></div><h6>সকল ইউজার</h6><div id="allUsersList"></div></div>
  </div>`;
  cont.html(html);
  $('#adminAccountsResult').html('<div id="adminAccTable"></div>');
  loadAccountsHistoryForAdmin();
  loadAdminAccountDetail(); loadAdminAttendance(); loadAdminAccessories(); loadAdminRecharge(); loadAllUsers();
  ['ডিপিএস','বিদ্যুৎ বিল','অফিস খরচ','বেতন বাবদ','টিজি/প্যাচকট','ফাইবার ক্রয়','যন্ত্রাংশ ক্রয়','স্প্লিটার','বিবিধ','মেইন্টেন্স বাবদ','ভ্যাট','ট্যাক্স ফি','সফটওয়্যার বিল','দানবাবদ','যাতায়াত','মোবাইল বিল','আপ্যায়ন','কুরিয়ার খরচ','ব্যাংক জমা','স্যার নিজ খরচ','ম্যাডাম খরচ'].forEach(c => $('#afSub').append(`<option value="${c}">${c}</option>`));
}
async function loadAccountsHistoryForAdmin(){ const res = await apiCall('getAccountsHistory', {date:'', type:'', company:'', subcategory:''}); showAccountsTable(res, '#adminAccTable'); }
async function adminFilterAccounts(){
  const sd = $('#afDate').val(), ed = $('#afDateEnd').val();
  let res;
  if(sd && ed) res = await apiCall('getDateRangeAccounts', {startDate: sd, endDate: ed, type: $('#afType').val(), company: $('#afCompany').val(), subcategory: $('#afSub').val()});
  else res = await apiCall('filterDataAdmin', {date: sd, type: $('#afType').val(), company: $('#afCompany').val(), subcategory: $('#afSub').val()});
  showAccountsTable(res, '#adminAccTable');
}
async function loadAdminAccountDetail(){
  const res = await apiCall('getDailyTransactions', {date: todayDate});
  let iH='', eH='', ti=0, te=0;
  if(res && res.length){ 
    res.forEach(r => { 
      const canEditFlag = canEdit(r.timestamp);
      const eB = (r.timestamp && r.timestamp !== 'undefined' && canEditFlag) ? `<button class="btn btn-sm btn-warning btn-sm-custom" onclick="editAcc('${r.timestamp}','${r.amount}','${r.note||''}')">✏️</button>` : ''; 
      const dB = (r.timestamp && r.timestamp !== 'undefined' && canEditFlag) ? `<button class="btn btn-sm btn-danger btn-sm-custom" onclick="deleteAcc('${r.timestamp}')">🗑️</button>` : ''; 
      if(r.type === 'Income'){
        iH += `<tr><td class="align-middle">${r.company}</td><td class="align-middle">${r.category}</td><td class="text-success fw-bold align-middle">+${r.amount}</td><td class="align-middle">${eB} ${dB}</td></tr>`;
        ti += Number(r.amount);
      } else {
        eH += `<tr><td class="align-middle">${r.company}</td><td class="align-middle">${r.category}</td><td class="text-danger fw-bold align-middle">-${r.amount}</td><td class="align-middle">${eB} ${dB}</td></tr>`;
        te += Number(r.amount);
      } 
    });
  }
  $('#adminAccountDetail').html(`<div class="col-md-6"><div class="card card-custom p-3"><h6 class="text-success">💰 আয়</h6><div class="table-responsive"><table class="table table-sm">${iH || '<tr><td colspan="4" class="text-center">কোনো আয় নেই<\/td><\/tr>'}</div><b>মোট: ${ti} টাকা</b></div></div><div class="col-md-6"><div class="card card-custom p-3"><h6 class="text-danger">💸 ব্যয়</h6><div class="table-responsive"><table class="table table-sm">${eH || '<tr><td colspan="4" class="text-center">কোনো ব্যয় নেই<\/td><\/tr>'}</div><b>মোট: ${te} টাকা</b></div></div>`);
}
async function loadAdminAttendance(){ 
  const res = await apiCall('getAttendanceByDate', {date: todayDate}); 
  let h = '<div class="table-responsive"><table class="table table-sm table-bordered"><thead class="table-light"><tr><th>নাম</th><th>স্ট্যাটাস</th><th>নোট</th></tr></thead><tbody>';
  if(res && res.length){ 
    res.forEach(r => { 
      let badge = '';
      if(r.status === 'Present') badge = '<span class="badge bg-success">Present</span>';
      else if(r.status === 'Absent') badge = '<span class="badge bg-danger">Absent</span>';
      else if(r.status === 'Late') badge = '<span class="badge bg-warning text-dark">Late</span>';
      else badge = r.status;
      h += `<tr><td class="align-middle">${r.username}</td><td class="align-middle">${badge}</td><td class="align-middle">${r.note || ''}</td></td>`; 
    });
  } else { h += '<td><td colspan="3" class="text-center">কোনো হাজিরার তথ্য নেই<\/td><\/tr>'; }
  h += '</tbody>}</div>';
  $('#adminAttendanceList').html(h);
}
async function loadAdminRecharge(){
  const res = await apiCall('getRechargeHistory', {company: 'Ainet', date: todayDate});
  let h = '<div class="table-responsive"><table class="table table-sm table-bordered"><thead class="table-light"><tr><th>টাইপ</th><th>আইডি</th><th>নাম</th><th>টাকা</th><th>নোট</th></tr></thead><tbody>';
  let total = 0;
  if(res && res.length){ 
    res.forEach(r => { total += Number(r.amount); h += `<tr><td class="align-middle">${r.type}</td><td class="align-middle">${r.customerId}</td><td class="align-middle">${r.customerName}</td><td class="align-middle fw-bold">${r.amount} টাকা</td><td class="align-middle">${r.note || ''}</td></tr>`; });
    h += `<tr class="table-secondary fw-bold"><td colspan="3">মোট<\/td><td colspan="2">${total} টাকা<\/td><\/tr>`;
  } else { h += '<tr><td colspan="5" class="text-center">কোনো রিচার্জ নেই<\/td><\/tr>'; }
  h += '</tbody>}</div>';
  $('#adminRechargeList').html(h);
}
async function loadAdminAccessories(){ 
  const res = await apiCall('getAccessoriesList'); 
  let h = '<div class="table-responsive"><table class="table table-sm table-bordered"><thead class="table-light"><tr><th>নাম</th><th>এসাইন</th></tr></thead><tbody>';
  if(res && res.length){ res.forEach(r => h += `<tr><td class="align-middle">${r.itemName}</td><td class="align-middle">${r.assignedTo || '-'}</td></tr>`); } 
  else { h += '<tr><td colspan="2" class="text-center">কোনো এক্সেসরিজ নেই<\/td><\/tr>'; }
  h += '</tbody>}</div>';
  $('#adminAccessoriesList').html(h); 
}
async function loadAllUsers(){ 
  const res = await apiCall('getAllUsers'); 
  let h = '<div class="table-responsive"><table class="table table-sm table-bordered"><thead class="table-light"><tr><th>ইউজারনেম</th><th>রোল</th><th>ফুলনেম</th></tr></thead><tbody>';
  if(res && res.length){ res.forEach(u => h += `<tr><td class="align-middle">${u.username}</td><td class="align-middle">${u.role}</td><td class="align-middle">${u.fullName || '-'}</td></tr>`); } 
  else { h += '<tr><td colspan="3" class="text-center">কোনো ইউজার নেই<\/td><\/tr>'; }
  h += '</tbody>}</div>';
  $('#allUsersList').html(h); 
}
async function createUser(){ 
  const res = await apiCall('createUser', {newUsername: $('#newUser').val(), newPassword: $('#newPass').val(), newRole: $('#newRole').val(), newFullName: ''}); 
  if(res && res.success){ alert('✅ ইউজার তৈরি হয়েছে'); $('#newUser, #newPass').val(''); loadAllUsers(); } 
  else { alert(res ? (res.message || res.error) : 'ব্যর্থ'); }
}
async function renderEmployee(cont){
  const s = await apiCall('getEmployeeSalaryHistory', {username: currentLoggedInUser});
  const a = await apiCall('getMyAccessories', {username: currentLoggedInUser});
  const at = await apiCall('getMyAttendanceReport', {username: currentLoggedInUser});
  let h = '<div class="row g-3"><div class="col-md-4"><div class="card card-custom p-3"><h6>💰 আমার বেতনের ইতিহাস</h6><div class="table-responsive"><table class="table table-sm"><thead class="table-light"><tr><th>তারিখ</th><th>টাকা</th></tr></thead><tbody>';
  if(s && s.length){ s.forEach(x => h += `<tr><td class="align-middle">${x.date}</td><td class="align-middle">${x.amount} টাকা</td></tr>`); } 
  else { h += '<tr><td colspan="2" class="text-center">কোনো বেতনের রেকর্ড নেই<\/td><\/tr>'; }
  h += '</tbody>}</div></div></div><div class="col-md-4"><div class="card card-custom p-3"><h6>🖥 আমার এক্সেসরিজ</h6><div class="table-responsive"><table class="table table-sm"><thead class="table-light"><tr><th>নাম</th></td></thead><tbody>';
  if(a && a.length){ a.forEach(x => h += `<tr><td class="align-middle">${x.itemName}</td></tr>`); } 
  else { h += '<tr><td class="text-center">কোনো এক্সেসরিজ নেই<\/td><\/tr>'; }
  h += '</tbody>}</div></div></div><div class="col-md-4"><div class="card card-custom p-3"><h6>📋 আমার হাজিরার সারাংশ</h6><div class="table-responsive"><table class="table table-sm"><thead class="table-light"><tr><th>স্ট্যাটাস</th><th>দিনের সংখ্যা</th></tr></thead><tbody>';
  if(at){ for(let k in at) h += `<tr><td class="align-middle">${k}</td><td class="align-middle">${at[k]}</td></tr>`; } 
  else { h += '<tr><td colspan="2" class="text-center">কোনো তথ্য নেই<\/td><\/tr>'; }
  h += '</tbody>}</div></div></div></div>';
  cont.html(h);
}
</script>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ainet & CCN Official | Finance & Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .login-container, .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-img {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 28px;
            font-style: italic;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .user-info {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .logout-btn {
            background: #dc3545;
            width: auto;
            padding: 5px 15px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        /* ক্যাটাগরি ভিত্তিক কালার */
        .card-ainet { background: linear-gradient(135deg, #3b82f6, #1e3a8a); }
        .card-ccn { background: linear-gradient(135deg, #10b981, #064e3b); }
        .card-polash { background: linear-gradient(135deg, #f59e0b, #b45309); }
        .card-reseller-ainet { background: linear-gradient(135deg, #8b5cf6, #5b21b6); }
        .card-reseller-ccn { background: linear-gradient(135deg, #ec4899, #be185d); }
        
        .card {
            color: white;
            padding: 20px;
            border-radius: 15px;
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .card .amount {
            font-size: 28px;
            font-weight: bold;
        }
        .transaction-list {
            margin-top: 15px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .transaction-item {
            background: rgba(255,255,255,0.25);
            padding: 8px;
            margin: 5px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .edit-btn {
            background: #ffc107;
            color: #333;
            border: none;
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            width: auto;
        }
        .edit-btn:hover {
            background: #e0a800;
        }
        .disabled-edit {
            background: #6c757d;
            cursor: not-allowed;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal-content {
            background: white;
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
            position: relative;
        }
        .close {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 30px;
            cursor: pointer;
        }
        .form-row {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        @media (max-width: 768px) {
            .login-container, .dashboard-container { padding: 20px; }
            h1 { font-size: 22px; }
            .cards-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ---------- ইউজার ডাটা ----------
    const users = [
        { username: "admin", password: "admin123", role: "admin", name: "এডমিন" },
        { username: "accounts", password: "acc123", role: "accounts", name: "একাউন্টস" },
        { username: "incharge", password: "inch123", role: "dataincharge", name: "ডাটা ইনচার্জ" },
        { username: "operator", password: "op123", role: "dataoperator", name: "ডাটা অপারেটর" },
        { username: "noyon", password: "123456", role: "employee", name: "নয়ন" },
        { username: "alam", password: "123456", role: "employee", name: "আল আমিন" }
    ];

    // ---------- লোকাল স্টোরেজ ডাটা ----------
    let incomeData = JSON.parse(localStorage.getItem('incomeData') || '[]');
    let expenseData = JSON.parse(localStorage.getItem('expenseData') || '[]');
    let rechargeData = JSON.parse(localStorage.getItem('rechargeData') || '[]');
    let attendanceData = JSON.parse(localStorage.getItem('attendanceData') || '[]');
    let stbIncomeData = JSON.parse(localStorage.getItem('stbIncomeData') || '[]');
    let accessoriesData = JSON.parse(localStorage.getItem('accessoriesData') || '[]');
    let salaryData = JSON.parse(localStorage.getItem('salaryData') || '[]');

    function saveAllData() {
        localStorage.setItem('incomeData', JSON.stringify(incomeData));
        localStorage.setItem('expenseData', JSON.stringify(expenseData));
        localStorage.setItem('rechargeData', JSON.stringify(rechargeData));
        localStorage.setItem('attendanceData', JSON.stringify(attendanceData));
        localStorage.setItem('stbIncomeData', JSON.stringify(stbIncomeData));
        localStorage.setItem('accessoriesData', JSON.stringify(accessoriesData));
        localStorage.setItem('salaryData', JSON.stringify(salaryData));
    }

    function getToday() { return new Date().toISOString().slice(0,10); }

    // ---------- লগইন ----------
    let currentUser = null;

    function login(username, password, remember) {
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
            currentUser = user;
            if (remember) localStorage.setItem('savedUser', JSON.stringify(user));
            sessionStorage.setItem('currentUser', JSON.stringify(user));
            return true;
        }
        return false;
    }

    function getCurrentUser() {
        if (currentUser) return currentUser;
        const sess = sessionStorage.getItem('currentUser');
        if (sess) { currentUser = JSON.parse(sess); return currentUser; }
        const saved = localStorage.getItem('savedUser');
        if (saved) { currentUser = JSON.parse(saved); return currentUser; }
        return null;
    }

    function logout() {
        currentUser = null;
        sessionStorage.clear();
        localStorage.removeItem('savedUser');
        renderLoginPage();
    }

    function isEditable(editableUntil) {
        if (!editableUntil) return false;
        const now = new Date();
        const expiry = new Date(editableUntil);
        return now < expiry;
    }

    // ---------- রেন্ডার ----------
    function renderDashboard() {
        const user = getCurrentUser();
        if (!user) { renderLoginPage(); return; }
        const app = document.getElementById('app');
        if (user.role === 'admin') app.innerHTML = renderAdminDashboard();
        else if (user.role === 'accounts') app.innerHTML = renderAccountsDashboard();
        else if (user.role === 'dataincharge') app.innerHTML = renderInchargeDashboard();
        else if (user.role === 'dataoperator') app.innerHTML = renderOperatorDashboard();
        else app.innerHTML = renderEmployeeDashboard(user);
    }

    function renderAdminDashboard() {
        const totalIncome = incomeData.reduce((s,i)=>s+i.amount,0);
        const totalExpense = expenseData.reduce((s,e)=>s+e.amount,0);
        const month = new Date().getMonth();
        const monthlyIncome = incomeData.filter(i=>new Date(i.date).getMonth()===month).reduce((s,i)=>s+i.amount,0);
        const monthlyExpense = expenseData.filter(e=>new Date(e.date).getMonth()===month).reduce((s,e)=>s+e.amount,0);
        const totalRecharge = rechargeData.reduce((s,r)=>s+r.amount,0);
        const todayAtt = attendanceData.filter(a=>a.date===getToday() && a.status==='present').length;
        return `
            <div class="dashboard-container">
                <div class="header">
                    <h1><i>Ainet & CCN Official</i></h1>
                    <div class="user-info">👋 ${currentUser.name} <button class="logout-btn" onclick="logout()">লগআউট</button></div>
                </div>
                <div class="cards-grid">
                    <div class="card" style="background: linear-gradient(135deg,#3b82f6,#1e3a8a);"><h3>📊 মোট আয়</h3><div class="amount">৳ ${totalIncome.toLocaleString()}</div></div>
                    <div class="card" style="background: linear-gradient(135deg,#ef4444,#7f1d1d);"><h3>💰 মোট ব্যয়</h3><div class="amount">৳ ${totalExpense.toLocaleString()}</div></div>
                    <div class="card" style="background: linear-gradient(135deg,#10b981,#064e3b);"><h3>💵 এ মাসের আয়</h3><div class="amount">৳ ${monthlyIncome.toLocaleString()}</div></div>
                    <div class="card" style="background: linear-gradient(135deg,#f59e0b,#b45309);"><h3>💸 এ মাসের ব্যয়</h3><div class="amount">৳ ${monthlyExpense.toLocaleString()}</div></div>
                </div>
                <div class="cards-grid">
                    <div class="card" style="background: linear-gradient(135deg,#8b5cf6,#5b21b6);" onclick="showExpenseDetails()"><h3>📋 ব্যয়ের বিস্তারিত</h3><div class="amount">ক্লিক করুন →</div></div>
                    <div class="card" style="background: linear-gradient(135deg,#ec4899,#be185d);" onclick="showInchargeSummary()"><h3>📡 ইনচার্জ সামারি</h3><div class="amount">রিচার্জ: ৳ ${totalRecharge.toLocaleString()}</div><small>আজ উপস্থিত: ${todayAtt} জন</small></div>
                </div>
                <button onclick="window.print()">🖨️ প্রিন্ট রিপোর্ট</button>
            </div>
        `;
    }

    // ----- একাউন্টস ড্যাশবোর্ড (কালার কোডিং সহ) -----
    function renderAccountsDashboard() {
        const incomeBy = (cat) => incomeData.filter(i=>i.category===cat).reduce((s,i)=>s+i.amount,0);
        const expenseBy = (mainCat) => expenseData.filter(e=>e.mainCategory===mainCat).reduce((s,e)=>s+e.amount,0);

        const categories = [
            { name: 'Ainet', incKey: 'Ainet', expKey: 'Ainet', title: 'Ainet', colorClass: 'card-ainet' },
            { name: 'CCN', incKey: 'CCN', expKey: 'CCN', title: 'CCN (ডিশ)', colorClass: 'card-ccn' },
            { name: 'পলাশবাড়ী CCN', incKey: 'পলাশবাড়ী CCN', expKey: 'পলাশবাড়ী CCN', title: 'পলাশবাড়ী CCN', colorClass: 'card-polash' },
            { name: 'রিসেলার Ainet', incKey: 'রিসেলার Ainet', expKey: 'রিসেলার Ainet', title: 'রিসেলার Ainet', colorClass: 'card-reseller-ainet' },
            { name: 'রিসেলার CCN', incKey: 'রিসেলার CCN', expKey: 'রিসেলার CCN', title: 'রিসেলার CCN', colorClass: 'card-reseller-ccn' }
        ];

        // ছয়টি ড্যাশবোর্ড কার্ডের মান
        const internetCash = incomeBy('Ainet') - expenseBy('Ainet');
        const dishCash = incomeBy('CCN') - expenseBy('CCN');
        const polashTotal = incomeBy('পলাশবাড়ী CCN') - expenseBy('পলাশবাড়ী CCN');
        const ainetPolash = incomeBy('পলাশবাড়ী CCN');
        const resellerAinetTotal = incomeBy('রিসেলার Ainet') - expenseBy('রিসেলার Ainet');
        const resellerCcnTotal = incomeBy('রিসেলার CCN') - expenseBy('রিসেলার CCN');

        function renderIncomeTransactions(cat, colorLight) {
            const transactions = incomeData.filter(t => t.category === cat);
            if (transactions.length === 0) return '<div class="transaction-item">কোন লেনদেন নেই</div>';
            return transactions.map((t, idx) => {
                const editable = isEditable(t.editableUntil);
                return `
                    <div class="transaction-item" style="background: ${colorLight};">
                        <span>${t.date} - ৳${t.amount.toLocaleString()} (${t.note || ''})</span>
                        ${editable ? `<button class="edit-btn" onclick="editIncome(${idx}, '${cat}')">এডিট</button>` : '<span class="edit-btn disabled-edit">এডিট অযোগ্য</span>'}
                    </div>
                `;
            }).join('');
        }

        function renderExpenseTransactions(mainCat, colorLight) {
            const transactions = expenseData.filter(t => t.mainCategory === mainCat);
            if (transactions.length === 0) return '<div class="transaction-item">কোন লেনদেন নেই</div>';
            return transactions.map((t, idx) => {
                const editable = isEditable(t.editableUntil);
                return `
                    <div class="transaction-item" style="background: ${colorLight};">
                        <span>${t.date} - ${t.subCategory} - ৳${t.amount.toLocaleString()} (${t.note || ''})</span>
                        ${editable ? `<button class="edit-btn" onclick="editExpense(${idx}, '${mainCat}')">এডিট</button>` : '<span class="edit-btn disabled-edit">এডিট অযোগ্য</span>'}
                    </div>
                `;
            }).join('');
        }

        // ক্যাটাগরি অনুযায়ী হালকা রং
        const lightColors = {
            'Ainet': 'rgba(59,130,246,0.3)',
            'CCN': 'rgba(16,185,129,0.3)',
            'পলাশবাড়ী CCN': 'rgba(245,158,11,0.3)',
            'রিসেলার Ainet': 'rgba(139,92,246,0.3)',
            'রিসেলার CCN': 'rgba(236,72,153,0.3)'
        };

        let catsHtml = '';
        for (let cat of categories) {
            const incTotal = incomeBy(cat.incKey);
            const expTotal = expenseBy(cat.expKey);
            const incColor = lightColors[cat.incKey] || 'rgba(255,255,255,0.2)';
            const expColor = lightColors[cat.expKey] || 'rgba(255,255,255,0.2)';
            catsHtml += `
                <div class="card ${cat.colorClass}">
                    <div onclick="showIncomeForm('${cat.incKey}')" style="cursor:pointer;">
                        <h3>💵 আয় - ${cat.title}</h3>
                        <div class="amount">৳ ${incTotal.toLocaleString()}</div>
                    </div>
                    <div class="transaction-list">
                        ${renderIncomeTransactions(cat.incKey, incColor)}
                    </div>
                </div>
                <div class="card ${cat.colorClass}">
                    <div onclick="showExpenseForm('${cat.expKey}')" style="cursor:pointer;">
                        <h3>💸 ব্যয় - ${cat.title}</h3>
                        <div class="amount">৳ ${expTotal.toLocaleString()}</div>
                    </div>
                    <div class="transaction-list">
                        ${renderExpenseTransactions(cat.expKey, expColor)}
                    </div>
                </div>
            `;
        }

        return `
            <div class="dashboard-container">
                <div class="header">
                    <h1><i>Ainet & CCN Official</i></h1>
                    <div class="user-info">👋 ${currentUser.name}<button class="logout-btn" onclick="logout()">লগআউট</button></div>
                </div>
                
                <!-- ছয়টি ড্যাশবোর্ড কার্ড (কালার করা) -->
                <div class="cards-grid">
                    <div class="card card-ainet"><h3>🌐 ইন্টারনেট ক্যাশ</h3><div class="amount">৳ ${internetCash.toLocaleString()}</div></div>
                    <div class="card card-ccn"><h3>📡 ডিশ ক্যাশ</h3><div class="amount">৳ ${dishCash.toLocaleString()}</div></div>
                    <div class="card card-polash"><h3>📍 পলাশবাড়ী সামারি</h3><div class="amount">৳ ${polashTotal.toLocaleString()}</div></div>
                    <div class="card card-ainet"><h3>📶 Ainet পলাশবাড়ী</h3><div class="amount">৳ ${ainetPolash.toLocaleString()}</div></div>
                    <div class="card card-reseller-ainet"><h3>🤝 আয় রিসেলার Ainet</h3><div class="amount">৳ ${resellerAinetTotal.toLocaleString()}</div></div>
                    <div class="card card-reseller-ccn"><h3>🤝 আয় রিসেলার CCN</h3><div class="amount">৳ ${resellerCcnTotal.toLocaleString()}</div></div>
                </div>

                <!-- আয় ও ব্যয়ের কার্ড (লিস্টসহ) -->
                <div class="cards-grid">
                    ${catsHtml}
                </div>

                <div class="cards-grid">
                    <div class="card" style="background: linear-gradient(135deg,#3b82f6,#1e3a8a);" onclick="showDailyReport()"><h3>📊 দৈনিক রিপোর্ট</h3><div class="amount">ক্লিক করুন →</div></div>
                    <div class="card" style="background: linear-gradient(135deg,#10b981,#064e3b);" onclick="showMonthlyReport()"><h3>📅 মাসিক রিপোর্ট</h3><div class="amount">ক্লিক করুন →</div></div>
                </div>
            </div>
        `;
    }

    // এডিট ফাংশন আগের মতই থাকবে (পুনরায় লেখার দরকার নেই, আগের কোডেই ছিল)
    window.editIncome = function(index, category) {
        const transaction = incomeData[index];
        if (!transaction) return;
        if (!isEditable(transaction.editableUntil)) {
            alert('এডিট করার সময় ১৬ ঘন্টা অতিক্রম করেছে। আপনি এডিট করতে পারবেন না।');
            return;
        }
        showModal(`
            <h2>আয় এডিট করুন - ${category}</h2>
            <div class="form-row"><label>তারিখ</label><input type="date" id="editDate" value="${transaction.date}"></div>
            <div class="form-row"><label>টাকার পরিমাণ</label><input type="number" id="editAmount" value="${transaction.amount}"></div>
            <div class="form-row"><label>নোট</label><textarea id="editNote">${transaction.note || ''}</textarea></div>
            <button onclick="saveIncomeEdit(${index}, '${category}')">আপডেট করুন</button>
        `);
    };
    window.saveIncomeEdit = function(index, category) {
        const newDate = document.getElementById('editDate').value;
        const newAmount = parseFloat(document.getElementById('editAmount').value);
        const newNote = document.getElementById('editNote').value;
        if (isNaN(newAmount) || newAmount <= 0) { alert('সঠিক টাকার পরিমাণ দিন'); return; }
        incomeData[index].date = newDate;
        incomeData[index].amount = newAmount;
        incomeData[index].note = newNote;
        saveAllData();
        alert('আয় আপডেট হয়েছে');
        document.querySelector('.modal')?.remove();
        renderDashboard();
    };
    window.editExpense = function(index, mainCategory) {
        const transaction = expenseData[index];
        if (!transaction) return;
        if (!isEditable(transaction.editableUntil)) {
            alert('এডিট করার সময় ১৬ ঘন্টা অতিক্রম করেছে। আপনি এডিট করতে পারবেন না।');
            return;
        }
        showModal(`
            <h2>ব্যয় এডিট করুন - ${mainCategory}</h2>
            <div class="form-row"><label>তারিখ</label><input type="date" id="editDate" value="${transaction.date}"></div>
            <div class="form-row"><label>সাব ক্যাটাগরি</label><input type="text" id="editSubCat" value="${transaction.subCategory}"></div>
            <div class="form-row"><label>টাকার পরিমাণ</label><input type="number" id="editAmount" value="${transaction.amount}"></div>
            <div class="form-row"><label>নোট</label><textarea id="editNote">${transaction.note || ''}</textarea></div>
            <button onclick="saveExpenseEdit(${index}, '${mainCategory}')">আপডেট করুন</button>
        `);
    };
    window.saveExpenseEdit = function(index, mainCategory) {
        const newDate = document.getElementById('editDate').value;
        const newSubCat = document.getElementById('editSubCat').value;
        const newAmount = parseFloat(document.getElementById('editAmount').value);
        const newNote = document.getElementById('editNote').value;
        if (isNaN(newAmount) || newAmount <= 0) { alert('সঠিক টাকার পরিমাণ দিন'); return; }
        expenseData[index].date = newDate;
        expenseData[index].subCategory = newSubCat;
        expenseData[index].amount = newAmount;
        expenseData[index].note = newNote;
        saveAllData();
        alert('ব্যয় আপডেট হয়েছে');
        document.querySelector('.modal')?.remove();
        renderDashboard();
    };

    // বাকি ফাংশনগুলো (showIncomeForm, saveIncome, showExpenseForm, saveExpense, ইত্যাদি) আগের কোডের মতোই থাকবে।
    // সংক্ষেপে এখানে পুনরায় দিচ্ছি (যাতে সম্পূর্ণ কাজ করে)।
    function showModal(content) {
        let modal = document.querySelector('.modal');
        if(modal) modal.remove();
        modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'block';
        modal.innerHTML = `<div class="modal-content"><span class="close" onclick="this.parentElement.parentElement.remove()">&times;</span>${content}</div>`;
        document.body.appendChild(modal);
    }

    window.showIncomeForm = function(category) {
        showModal(`
            <h2>💰 ${category} - আয় যোগ</h2>
            <div class="form-row"><label>নগদ</label><input type="number" id="cash"></div>
            <div class="form-row"><label>অফিস কালেকশন</label><input type="number" id="office"></div>
            <div class="form-row"><label>অনলাইন/বিকাশ</label><input type="number" id="online"></div>
            <div class="form-row"><label>নগদ জমা</label><input type="number" id="deposit"></div>
            <div class="form-row"><label>নোট</label><textarea id="note"></textarea></div>
            <button onclick="saveIncome('${category}')">সেভ</button>
        `);
    };
    window.saveIncome = function(category) {
        const cash=+document.getElementById('cash').value||0;
        const office=+document.getElementById('office').value||0;
        const online=+document.getElementById('online').value||0;
        const deposit=+document.getElementById('deposit').value||0;
        const total = cash+office+online+deposit;
        if(total===0) { alert('কমপক্ষে একটি ঘরে টাকা দিন'); return; }
        const editableUntil = new Date(Date.now() + 16*60*60*1000).toISOString();
        incomeData.push({ category, amount:total, date:getToday(), note:document.getElementById('note').value, editableUntil });
        saveAllData();
        alert('আয় সেভ হয়েছে');
        document.querySelector('.modal')?.remove();
        renderDashboard();
    };

    const expenseCategories = ['ডিপিএস','বিদ্যুৎ বিল','অফিস খরচ','বেতন বাবদ','টিজি/প্যাচকট','ফাইবার ক্রয়','যন্ত্রাংশ ক্রয়','স্প্লিটার','বিবিধ','মেইন্টেন্স বাবদ','ভ্যাট','ট্যাক্স ফি','সফটওয়্যার বিল','দানবাবদ','যাতায়াত','মোবাইল বিল','আপ্যায়ন','কুরিয়ার খরচ','ব্যাংক জমা','স্যার নিজ খরচ','ম্যাডাম খরচ'];
    
    window.showExpenseForm = function(mainCategory) {
        showModal(`
            <h2>💸 ${mainCategory} - ব্যয় যোগ</h2>
            <div class="form-row"><label>ক্যাটাগরি</label>
                <select id="subCat">
                    ${expenseCategories.map(c=>`<option value="${c}">${c}</option>`).join('')}
                </select>
            </div>
            <div id="employeeDiv" style="display:none;">
                <div class="form-row"><label>এমপ্লয়ি সিলেক্ট করুন</label>
                    <select id="empSelect">
                        ${users.filter(u=>u.role==='employee').map(u=>`<option value="${u.username}">${u.name}</option>`).join('')}
                    </select>
                </div>
            </div>
            <div class="form-row"><label>টাকা</label><input type="number" id="amount"></div>
            <div class="form-row"><label>নোট</label><textarea id="note"></textarea></div>
            <button onclick="saveExpense('${mainCategory}')">সেভ</button>
        `);
        setTimeout(() => {
            const subCatSelect = document.getElementById('subCat');
            const empDiv = document.getElementById('employeeDiv');
            const toggle = () => { empDiv.style.display = subCatSelect.value === 'বেতন বাবদ' ? 'block' : 'none'; };
            subCatSelect.addEventListener('change', toggle);
            toggle();
        }, 100);
    };
    window.saveExpense = function(mainCategory) {
        const subCat = document.getElementById('subCat').value;
        const amount = +document.getElementById('amount').value;
        if(!amount) { alert('টাকার পরিমাণ দিন'); return; }
        let employeeName = null;
        if(subCat === 'বেতন বাবদ') {
            const empDiv = document.getElementById('employeeDiv');
            if(empDiv && empDiv.style.display !== 'none') employeeName = document.getElementById('empSelect').value;
        }
        const editableUntil = new Date(Date.now() + 16*60*60*1000).toISOString();
        expenseData.push({ mainCategory, subCategory: subCat, amount, date:getToday(), note:document.getElementById('note').value, employeeName, editableUntil });
        if(subCat === 'বেতন বাবদ' && employeeName) {
            salaryData.push({ username: employeeName, amount, date:getToday() });
        }
        saveAllData();
        alert('ব্যয় সেভ হয়েছে');
        document.querySelector('.modal')?.remove();
        renderDashboard();
    };

    // অন্যান্য ফাংশন (রিচার্জ, হাজিরা, STB, এক্সেসরিজ, রিপোর্ট) আগের মতোই সংক্ষেপে
    window.showRechargeForm = function(type) {
        showModal(`
            <h2>${type==='internet'?'🌐 ইন্টারনেট':'📡 ডিশ'} রিচার্জ</h2>
            <div class="form-row"><label>পদ্ধতি</label><select id="method"><option value="cash">নগদ</option><option value="bikash">বিকাশ</option></select></div>
            <div class="form-row"><label>আইডি</label><input type="text" id="userId"></div>
            <div class="form-row"><label>নাম</label><input type="text" id="userName"></div>
            <div class="form-row"><label>টাকা</label><input type="number" id="amount"></div>
            <div class="form-row"><label>নোট</label><textarea id="note"></textarea></div>
            <button onclick="saveRecharge('${type}')">সেভ</button>
        `);
    };
    window.saveRecharge = function(type) {
        const amount = +document.getElementById('amount').value;
        if(!amount) { alert('টাকা দিন'); return; }
        const editableUntil = new Date(Date.now() + 16*60*60*1000).toISOString();
        rechargeData.push({ type, method:document.getElementById('method').value, userId:document.getElementById('userId').value, userName:document.getElementById('userName').value, amount, date:getToday(), note:document.getElementById('note').value, editableUntil });
        saveAllData();
        alert('রিচার্জ সেভ হয়েছে');
        document.querySelector('.modal')?.remove();
        renderDashboard();
    };
    window.showAttendanceForm = function() {
        showModal(`
            <h2>📋 হাজিরা দিন</h2>
            <div class="form-row"><label>এমপ্লয়ি</label><select id="empSelect">${users.filter(u=>u.role==='employee').map(u=>`<option value="${u.username}">${u.name}</option>`).join('')}</select></div>
            <div class="form-row"><label>স্ট্যাটাস</label><select id="status"><option value="present">উপস্থিত</option><option value="absent">অনুপস্থিত</option><option value="late">লেট</option><option value="leave">ছুটি</option></select></div>
            <div class="form-row"><label>নোট</label><textarea id="note"></textarea></div>
            <button onclick="saveAttendance()">সেভ</button>
        `);
    };
    window.saveAttendance = function() {
        const username = document.getElementById('empSelect').value;
        const status = document.getElementById('status').value;
        attendanceData.push({ username, status, date:getToday(), note:document.getElementById('note').value });
        saveAllData();
        alert('হাজিরা সেভ হয়েছে');
        document.querySelector('.modal')?.remove();
        renderDashboard();
    };
    window.showSTBForm = function() {
        showModal(`
            <h2>📺 STB আয় যোগ</h2>
            <div class="form-row"><label>তারিখ</label><input type="date" id="date" value="${getToday()}"></div>
            <div class="form-row"><label>টাকা</label><input type="number" id="amount"></div>
            <div class="form-row"><label>নোট</label><textarea id="note"></textarea></div>
            <button onclick="saveSTB()">সেভ</button>
        `);
    };
    window.saveSTB = function() {
        const amount = +document.getElementById('amount').value;
        if(!amount) { alert('টাকা দিন'); return; }
        const editableUntil = new Date(Date.now() + 16*60*60*1000).toISOString();
        stbIncomeData.push({ amount, date:document.getElementById('date').value, note:document.getElementById('note').value, operatorName:currentUser.username, editableUntil });
        saveAllData();
        alert('STB আয় সেভ হয়েছে');
        document.querySelector('.modal')?.remove();
        renderDashboard();
    };
    window.showAccessoriesList = function() {
        let listHtml = accessoriesData.map(a=>`<div style="border:1px solid #ddd; margin:5px; padding:8px;"><strong>${a.itemName}</strong> → ${users.find(u=>u.username===a.assignedTo)?.name || 'ফাঁকা'}<br>নোট: ${a.note||''}</div>`).join('');
        showModal(`
            <h2>🛠️ এক্সেসরিজ</h2>
            <div class="form-row"><label>নতুন যন্ত্রপাতি</label><input type="text" id="itemName"></div>
            <div class="form-row"><label>এসাইন</label><select id="assignedTo"><option value="">ফাঁকা</option>${users.map(u=>`<option value="${u.username}">${u.name}</option>`).join('')}</select></div>
            <div class="form-row"><label>নোট</label><textarea id="note"></textarea></div>
            <button onclick="saveAccessory()">এসাইন করুন</button>
            <hr><h3>বর্তমান তালিকা</h3>
            <div id="accList">${listHtml||'কোনো আইটেম নেই'}</div>
        `);
    };
    window.saveAccessory = function() {
        const item = document.getElementById('itemName').value;
        if(!item) { alert('যন্ত্রপাতির নাম দিন'); return; }
        accessoriesData.push({ itemName:item, assignedTo:document.getElementById('assignedTo').value, note:document.getElementById('note').value, lastUpdated:new Date() });
        saveAllData();
        alert('যোগ করা হয়েছে');
        document.querySelector('.modal')?.remove();
        renderDashboard();
    };
    window.showExpenseDetails = function() {
        const byCat = {};
        expenseData.forEach(e=>{ byCat[e.subCategory] = (byCat[e.subCategory]||0)+e.amount; });
        let html = '<h2>ব্যয়ের বিস্তারিত</h2><div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px;">';
        for(let [cat,amt] of Object.entries(byCat)) {
            html += `<div style="background:#f0f0f0; padding:10px; border-radius:8px; text-align:center; cursor:pointer;" onclick="alert('${cat}: ৳${amt}')">${cat}: ৳${amt.toLocaleString()}</div>`;
        }
        html += '</div>';
        showModal(html);
    };
    window.showInchargeSummary = function() {
        const today = getToday();
        const todayRecharge = rechargeData.filter(r=>r.date===today);
        const cash = todayRecharge.filter(r=>r.method==='cash').reduce((s,r)=>s+r.amount,0);
        const bikash = todayRecharge.filter(r=>r.method==='bikash').reduce((s,r)=>s+r.amount,0);
        const todayAtt = attendanceData.filter(a=>a.date===today && a.status==='present');
        showModal(`
            <h2>ইনচার্জ সামারি</h2>
            <p>নগদ রিচার্জ: ৳${cash}</p><p>বিকাশ: ৳${bikash}</p>
            <h3>আজকে উপস্থিত</h3>${todayAtt.map(a=>`<p>${users.find(u=>u.username===a.username)?.name}</p>`).join('')||'<p>কেউ নেই</p>'}
        `);
    };
    window.showDailyReport = function() {
        const today = getToday();
        const inc = incomeData.filter(i=>i.date===today).reduce((s,i)=>s+i.amount,0);
        const exp = expenseData.filter(e=>e.date===today).reduce((s,e)=>s+e.amount,0);
        showModal(`<h2>${today} রিপোর্ট</h2><p>আয়: ৳${inc}</p><p>ব্যয়: ৳${exp}</p><button onclick="window.print()">প্রিন্ট</button>`);
    };
    window.showMonthlyReport = function() {
        const month = new Date().getMonth();
        const inc = incomeData.filter(i=>new Date(i.date).getMonth()===month).reduce((s,i)=>s+i.amount,0);
        const exp = expenseData.filter(e=>new Date(e.date).getMonth()===month).reduce((s,e)=>s+e.amount,0);
        showModal(`<h2>এই মাসের রিপোর্ট</h2><p>আয়: ৳${inc}</p><p>ব্যয়: ৳${exp}</p><button onclick="window.print()">প্রিন্ট</button>`);
    };
    window.searchRecharge = function() {
        showModal(`
            <h2>রিচার্জ সার্চ</h2>
            <input type="text" id="searchTerm" placeholder="আইডি বা নাম">
            <button onclick="doSearch()">সার্চ</button>
            <div id="searchRes"></div>
        `);
    };
    window.doSearch = function() {
        const term = document.getElementById('searchTerm').value.toLowerCase();
        const res = rechargeData.filter(r=> r.userId.toLowerCase().includes(term) || (r.userName && r.userName.toLowerCase().includes(term)));
        const container = document.getElementById('searchRes');
        if(!container) return;
        if(res.length===0) container.innerHTML = '<p>কোন ফলাফল নেই</p>';
        else container.innerHTML = res.map(r=>`<div>${r.date} - ${r.type} - ৳${r.amount} - আইডি:${r.userId}</div>`).join('');
    };

    // ইনচার্জ, অপারেটর, এমপ্লয়ি ড্যাশবোর্ড (সংক্ষেপে, কালার ছাড়াই)
    function renderInchargeDashboard() {
        const internetRecharge = rechargeData.filter(r=>r.type==='internet').reduce((s,r)=>s+r.amount,0);
        const dishRecharge = rechargeData.filter(r=>r.type==='dish').reduce((s,r)=>s+r.amount,0);
        const todayAtt = attendanceData.filter(a=>a.date===getToday() && a.status==='present').length;
        return `
            <div class="dashboard-container">
                <div class="header"><h1><i>Ainet & CCN Official</i></h1><div class="user-info">👋 ${currentUser.name}<button class="logout-btn" onclick="logout()">লগআউট</button></div></div>
                <div class="cards-grid">
                    <div class="card" style="background: linear-gradient(135deg,#3b82f6,#1e3a8a);" onclick="showRechargeForm('internet')"><h3>🌐 রিচার্জ - ইন্টারনেট</h3><div class="amount">৳ ${internetRecharge.toLocaleString()}</div></div>
                    <div class="card" style="background: linear-gradient(135deg,#10b981,#064e3b);" onclick="showRechargeForm('dish')"><h3>📡 রিচার্জ - ডিশ</h3><div class="amount">৳ ${dishRecharge.toLocaleString()}</div></div>
                    <div class="card" style="background: linear-gradient(135deg,#f59e0b,#b45309);" onclick="showAttendanceForm()"><h3>📋 হাজিরা খাতা</h3><div class="amount">আজ: ${todayAtt} জন</div></div>
                </div>
                <div class="card" style="background: linear-gradient(135deg,#8b5cf6,#5b21b6);" onclick="searchRecharge()"><h3>🔍 রিচার্জ সার্চ</h3><div class="amount">আইডি/নাম দিয়ে খুঁজুন</div></div>
            </div>
        `;
    }
    function renderOperatorDashboard() {
        const totalSTB = stbIncomeData.reduce((s,i)=>s+i.amount,0);
        return `
            <div class="dashboard-container">
                <div class="header"><h1><i>Ainet & CCN Official</i></h1><div class="user-info">👋 ${currentUser.name}<button class="logout-btn" onclick="logout()">লগআউট</button></div></div>
                <div class="cards-grid">
                    <div class="card" style="background: linear-gradient(135deg,#ec4899,#be185d);" onclick="showSTBForm()"><h3>📺 STB আয়</h3><div class="amount">৳ ${totalSTB.toLocaleString()}</div></div>
                    <div class="card" style="background: linear-gradient(135deg,#8b5cf6,#5b21b6);" onclick="showAccessoriesList()"><h3>🛠️ এক্সেসরিজ লিস্ট</h3><div class="amount">${accessoriesData.length} টি আইটেম</div></div>
                </div>
            </div>
        `;
    }
    function renderEmployeeDashboard(user) {
        const mySalary = salaryData.filter(s=>s.username===user.username);
        const myAccessories = accessoriesData.filter(a=>a.assignedTo===user.username);
        return `
            <div class="dashboard-container">
                <div class="header"><h1><i>Ainet & CCN Official</i></h1><div class="user-info">👋 ${user.name}<button class="logout-btn" onclick="logout()">লগআউট</button></div></div>
                <div class="cards-grid">
                    <div class="card" style="background: linear-gradient(135deg,#3b82f6,#1e3a8a);"><h3>💰 বেতনের তথ্য</h3><div class="amount">${mySalary.length} বার</div><small>${mySalary.map(s=>`${s.date}: ৳${s.amount}`).join('<br>')||'কোন তথ্য নেই'}</small></div>
                    <div class="card" style="background: linear-gradient(135deg,#10b981,#064e3b);"><h3>🛠️ আমার এক্সেসরিজ</h3><div class="amount">${myAccessories.length} টি</div><small>${myAccessories.map(a=>a.itemName).join(', ')||'কোনটি নেই'}</small></div>
                </div>
            </div>
        `;
    }

    // লগইন পৃষ্ঠা
    function renderLoginPage() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="login-container">
                <div class="logo-area"><div class="logo-img">📊</div><h1><i>Ainet & CCN Official</i></h1><div class="subtitle">Finance & Management</div></div>
                <form id="loginForm">
                    <div class="form-group"><input type="text" id="username" placeholder="ইউজারনেম" required></div>
                    <div class="form-group"><input type="password" id="password" placeholder="পাসওয়ার্ড" required></div>
                    <div class="form-group"><label><input type="checkbox" id="remember"> ৭ দিন মনে রাখুন</label></div>
                    <button type="submit">লগইন করুন</button>
                </form>
                <div style="text-align:center; margin-top:20px;">Developed by Mehrab Jahid</div>
            </div>
        `;
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            if(login(username,password,remember)) renderDashboard();
            else alert('ভুল ইউজারনেম বা পাসওয়ার্ড!');
        });
    }

    const user = getCurrentUser();
    if(user) renderDashboard();
    else renderLoginPage();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Ainet & CCN | সম্পূর্ণ ম্যানেজমেন্ট সিস্টেম</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    :root { --primary: #0d6efd; --success: #198754; --danger: #dc3545; --warning: #ffc107; --info: #0dcaf0; --dark: #212529; --light: #f8f9fa; --bg: #f0f2f5; }
    body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; }
    #pageLoader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .logo-text { font-size: 2rem; font-weight: bold; font-style: italic; color: var(--primary); }
    .logo-sub { font-size: 0.9rem; color: #6c757d; }
    .card-custom { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); background: #fff; }
    .mini-dash { cursor: pointer; transition: all 0.2s; padding: 10px; border-radius: 12px; background: #fff; border: 1px solid #e9ecef; text-align: center; }
    .mini-dash:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); background: #f8f9fa; }
    .developer { font-size: 0.75rem; color: #6c757d; text-align: center; margin-top: 1.5rem; }
    .hidden { display: none; }
    .summary-card { background: #fff; border-radius: 10px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid #e9ecef; }
    .summary-card:hover { box-shadow: 0 6px 16px rgba(0,0,0,0.1); transform: translateY(-2px); }
    .recharge-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; background: #fff; padding: 6px; border-radius: 8px; border: 1px solid #e9ecef; }
    .attendance-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; flex-wrap: wrap; }
    .present-badge { background: #d4edda; color: #155724; padding: 4px 12px; border-radius: 20px; font-weight: 500; font-size: 0.8rem; }
    .absent-badge { background: #f8d7da; color: #721c24; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
    .late-badge { background: #fff3cd; color: #856404; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
    .filter-box { background: #fff; padding: 12px; border-radius: 12px; margin-bottom: 18px; border: 1px solid #e9ecef; }
    .nav-pills .nav-link.active { background: var(--primary); }
    .btn-sm-custom { padding: 2px 6px; font-size: 0.7rem; margin: 0 2px; }
    .recharge-panel { background: #fff; border-radius: 12px; padding: 12px; max-height: 550px; overflow-y: auto; border: 1px solid #e9ecef; }
    @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { position: absolute; top: 0; left: 0; width: 100%; } }
  </style>
</head>
<body>

<div id="pageLoader"><div class="spinner-border text-primary"></div></div>

<div id="loginPage" class="container py-4">
  <div class="text-center mb-3">
    <div class="logo-text">𝑨𝒊𝒏𝒆𝒕 & 𝑪𝑪𝑵</div>
    <div class="logo-sub">Finance & Management</div>
  </div>
  <div class="card card-custom mx-auto" style="max-width: 400px;">
    <div class="card-body">
      <h5 class="card-title text-center mb-3">লগ ইন</h5>
      <div class="mb-2"><input type="text" id="loginUsername" class="form-control" placeholder="ইউজারনেম"></div>
      <div class="mb-2"><input type="password" id="loginPassword" class="form-control" placeholder="পাসওয়ার্ড"></div>
      <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="rememberMe"><label class="form-check-label" for="rememberMe">সাতদিন মনে রাখুন</label></div>
      <button class="btn btn-primary w-100" onclick="handleLogin()">প্রবেশ করুন</button>
      <div id="loginError" class="text-danger mt-2 text-center"></div>
    </div>
  </div>
  <div class="developer">Developed by Mehrab Jahid</div>
</div>

<div id="mainApp" class="hidden">
  <nav class="navbar navbar-dark bg-dark">
    <span class="navbar-brand ms-2" id="roleTitle">ড্যাশবোর্ড</span>
    <div>
      <button class="btn btn-outline-warning btn-sm me-1" onclick="changePassword()"><i class="bi bi-key"></i> পাসওয়ার্ড</button>
      <button class="btn btn-outline-light btn-sm me-1" onclick="window.print()"><i class="bi bi-printer"></i></button>
      <button class="btn btn-outline-light btn-sm me-2" onclick="logout()">লগআউট</button>
    </div>
  </nav>
  <div class="container-fluid mt-2" id="dynamicContent"></div>
  <div class="developer">Developed by Mehrab Jahid</div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzBUPjUdLcHkVwSqDLHyKqzuu_3UkRWZi37xp_JlcY5E1UBrNfJlgVeJt4mMDGh31KeHw/exec';
let token = localStorage.getItem('token') || sessionStorage.getItem('token');
let role = localStorage.getItem('role') || sessionStorage.getItem('role');

$(function(){ 
  if(token && role) { $('#loginPage').addClass('hidden'); $('#mainApp').removeClass('hidden'); $('#roleTitle').text(role + ' প্যানেল'); loadDashboard(role); }
  else { showLogin(); }
  setTimeout(() => { $('#pageLoader').fadeOut(300); }, 400);
});

function showLogin(){ $('#mainApp').addClass('hidden'); $('#loginPage').removeClass('hidden'); }

async function apiCall(action, params = {}){
  params.action = action; if(!params.token && token) params.token = token;
  const formData = new URLSearchParams();
  for (let key in params) { formData.append(key, params[key] !== undefined ? params[key] : ''); }
  const resp = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
  return await resp.json();
}

function showAccountsTable(data, containerId = '#accountsList') {
  let html = `<div id="printArea"><table class="table table-bordered table-sm">`
  html += `<thead><tr><th>#</th><th>তারিখ</th><th>টাইপ</th><th>কোম্পানি</th><th>ক্যাট</th><th>সাব</th><th>টাকা</th><th>নোট</th><th>এডিট/ডিলিট</th></tr></thead><tbody>`;
  let total = 0;
  if (data && Array.isArray(data) && data.length > 0) {
    data.forEach((r, i) => {
      const sign = r.type === 'Income' ? '+' : '-';
      const cls = r.type === 'Income' ? 'text-success' : 'text-danger';
      const editBtn = (r.timestamp && r.timestamp !== 'undefined') ? `<button class="btn btn-sm btn-warning btn-sm-custom" onclick="editAcc('${r.timestamp}','${r.amount}','${r.note||''}')">✏️</button>` : '';
      const delBtn = (r.timestamp && r.timestamp !== 'undefined') ? `<button class="btn btn-sm btn-danger btn-sm-custom" onclick="deleteAcc('${r.timestamp}')">🗑️</button>` : '';
      html += `<tr><td>${i+1}</td><td>${r.date||''}</td><td>${r.type||''}</td><td>${r.company||''}</td><td>${r.category||''}</td><td>${r.subcategory||''}</td><td class="${cls} fw-bold">${sign}${r.amount}</td><td>${r.note||''}</td><td>${editBtn} ${delBtn}</td></tr>`;
      total += Number(r.amount) || 0;
    });
    html += `<tr class="total-row"><td colspan="6">মোট</td><td>${total} টাকা</td><td colspan="3"></td></tr>`;
  } else { html += '<tr><td colspan="10" class="text-center">কোনো এন্ট্রি নেই</td></tr>'; }
  html += '</tbody></table></div><button class="btn btn-sm btn-secondary mt-2" onclick="printDiv()"><i class="bi bi-printer"></i> প্রিন্ট</button>';
  $(containerId).html(html);
}

function printDiv() { const pc = document.getElementById('printArea').innerHTML; const oc = document.body.innerHTML; document.body.innerHTML = pc; window.print(); document.body.innerHTML = oc; location.reload(); }

function editAcc(ts, oa, on) {
  const a = prompt('টাকা', oa); if (a === null) return;
  const n = prompt('নোট', on);
  apiCall('updateAccountsEntry', { timestamp: ts, amount: a, note: n }).then(r => {
    if (r && r.success) { loadAccountsHistory(); alert('✅ এডিট সফল'); } else alert(r ? (r.message||r.error) : 'ব্যর্থ');
  });
}

function deleteAcc(ts) {
  if (!confirm('ডিলিট করতে চান?')) return;
  apiCall('deleteAccountsEntry', { timestamp: ts }).then(r => {
    if (r && r.success) { loadAccountsHistory(); alert('✅ ডিলিট সফল'); } else alert(r ? (r.message||r.error) : 'ব্যর্থ');
  });
}

async function handleLogin(){
  const u = $('#loginUsername').val().trim(), p = $('#loginPassword').val().trim();
  if(!u || !p){ $('#loginError').text('ইউজারনেম ও পাসওয়ার্ড দিন'); return; }
  const res = await apiCall('login', { username:u, password:p });
  if(res && res.success){
    if($('#rememberMe').is(':checked')){ localStorage.setItem('token',res.token); localStorage.setItem('role',res.role); }
    else { sessionStorage.setItem('token',res.token); sessionStorage.setItem('role',res.role); }
    token=res.token; role=res.role;
    $('#loginPage').addClass('hidden'); $('#mainApp').removeClass('hidden'); $('#roleTitle').text(role + ' প্যানেল'); loadDashboard(role);
  } else { $('#loginError').text(res? (res.message||'লগইন ব্যর্থ') : 'লগইন ব্যর্থ'); }
}

async function logout(){ await apiCall('logout'); localStorage.clear(); sessionStorage.clear(); token=null; role=null; showLogin(); }
async function changePassword(){
  const oldPass = prompt('বর্তমান পাসওয়ার্ড:'); if(!oldPass) return;
  const newPass = prompt('নতুন পাসওয়ার্ড (৪+ ক্যারেক্টার):'); if(!newPass || newPass.length<4) return;
  const confirm = prompt('নতুন পাসওয়ার্ড আবার:'); if(newPass !== confirm) { alert('মিলছে না'); return; }
  const res = await apiCall('changePassword', { oldPassword:oldPass, newPassword:newPass });
  if(res && res.success) alert('পাসওয়ার্ড পরিবর্তন সফল!'); else alert(res? (res.message||res.error) : 'ব্যর্থ');
}

async function loadDashboard(r){
  const cont = $('#dynamicContent').empty();
  cont.html('<div class="text-center mt-5"><div class="spinner-border"></div><p>লোড হচ্ছে...</p></div>');
  switch(r.trim().toLowerCase()){
    case 'admin': await renderAdmin(cont); break;
    case 'accounts': await renderAccounts(cont); break;
    case 'data incharge': await renderIncharge(cont); break;
    case 'data operator': await renderOperator(cont); break;
    case 'employee': await renderEmployee(cont); break;
  }
}

// ==================== ADMIN (8 cards) ====================
async function renderAdmin(cont){
  const s = await apiCall('getAdminFullSummary');
  if(!s || s.error){ cont.html('<div class="alert alert-danger">ডাটা লোড ব্যর্থ</div>'); return; }
  let html = `
  <ul class="nav nav-pills mb-3" id="adminTabs">
    <li class="nav-item"><a class="nav-link active" data-bs-toggle="pill" href="#tabOverview">সারসংক্ষেপ</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#tabAccounts">একাউন্টস</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#tabIncharge">ইনচার্জ</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#tabOperator">অপারেটর</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#tabUsers">ইউজার</a></li>
  </ul>
  <div class="tab-content">
    <div class="tab-pane fade show active" id="tabOverview">
      <div class="row g-2 mb-3">
        <div class="col-6 col-md-3"><div class="summary-card"><small>মোট আয়</small><h3>${s.accounts.totalIncome}</h3><small class="text-success">আজ: ${s.accounts.todayIncome}</small></div></div>
        <div class="col-6 col-md-3"><div class="summary-card"><small>মোট ব্যয়</small><h3>${s.accounts.totalExpense}</h3><small class="text-danger">আজ: ${s.accounts.todayExpense}</small></div></div>
        <div class="col-6 col-md-3"><div class="summary-card"><small>আজ রিচার্জ</small><h3>${s.recharge.todayTotal} টাকা</h3><small>ক্যাশ: ${s.recharge.todayCash} | বিকাশ: ${s.recharge.todayBkash}</small></div></div>
        <div class="col-6 col-md-3"><div class="summary-card"><small>উপস্থিতি</small><h3>${s.attendance.present} জন</h3><small>অনুপস্থিত: ${s.attendance.absent} | লেট: ${s.attendance.late}</small></div></div>
      </div>
      <div class="row g-2 mb-3">
        <div class="col-6 col-md-3"><div class="summary-card"><small>এসটিবি (আজ)</small><h3>${s.stb.todayTotal} টাকা</h3></div></div>
        <div class="col-6 col-md-3"><div class="summary-card"><small>এসটিবি (মাস)</small><h3>${s.stb.monthTotal} টাকা</h3></div></div>
        <div class="col-6 col-md-3"><div class="summary-card"><small>রিচার্জ (মাস)</small><h3>${s.rechargeTotal.monthTotal} টাকা</h3></div></div>
        <div class="col-6 col-md-3"><div class="summary-card"><small>চলমান অভিযোগ</small><h3>${s.complaints.length} টি</h3></div></div>
      </div>
      <div class="filter-box mt-3">
        <h6><i class="bi bi-funnel"></i> ফিল্টার</h6>
        <div class="row g-2">
          <div class="col-6 col-md-2"><input type="date" id="afDate" class="form-control form-control-sm"></div>
          <div class="col-6 col-md-2"><input type="date" id="afDateEnd" class="form-control form-control-sm" placeholder="শেষ তারিখ"></div>
          <div class="col-6 col-md-2"><select id="afType" class="form-select form-select-sm"><option value="">সব</option><option>Income</option><option>Expense</option></select></div>
          <div class="col-6 col-md-2"><select id="afCompany" class="form-select form-select-sm"><option value="">সব</option><option>Ainet</option><option>CCN</option><option>Ainet Reseller</option><option>CCN Reseller</option><option>Ainet পলাশবাড়ী</option><option>CCN পলাশবাড়ী</option></select></div>
          <div class="col-6 col-md-2"><select id="afSub" class="form-select form-select-sm"><option value="">সব</option></select></div>
          <div class="col-6 col-md-2"><button class="btn btn-info btn-sm w-100" onclick="adminFilterAccounts()">প্রয়োগ</button></div>
        </div>
      </div>
      <div id="adminAccountsResult" class="mt-2"></div>
    </div>
    <div class="tab-pane fade" id="tabAccounts"><h6>আজকের আয়-ব্যয়</h6><div id="adminAccountDetail" class="row g-3"></div></div>
    <div class="tab-pane fade" id="tabIncharge"><h6>আজকের হাজিরা</h6><div id="adminAttendanceList"></div></div>
    <div class="tab-pane fade" id="tabOperator"><h6>এক্সেসরিজ</h6><div id="adminAccessoriesList"></div></div>
    <div class="tab-pane fade" id="tabUsers"><h6>ইউজার তৈরি</h6><div class="row g-2 mb-3"><div class="col-6 col-md-2"><input id="newUser" class="form-control form-control-sm" placeholder="ইউজারনেম"></div><div class="col-6 col-md-2"><input id="newPass" class="form-control form-control-sm" placeholder="পাসওয়ার্ড"></div><div class="col-6 col-md-2"><select id="newRole" class="form-select form-select-sm"><option>Employee</option><option>Accounts</option><option>Data Incharge</option><option>Data Operator</option></select></div><div class="col-6 col-md-2"><button class="btn btn-success btn-sm w-100" onclick="createUser()">তৈরি</button></div></div><div id="allUsersList"></div></div>
  </div>`;
  cont.html(html);
  $('#adminAccountsResult').html('<button class="btn btn-primary btn-sm mb-2" onclick="openAccModal()">+ নতুন এন্ট্রি</button><div id="adminAccTable"></div>');
  loadAccountsHistoryForAdmin();
  loadAdminAccountDetail(); loadAdminAttendance(); loadAdminAccessories(); loadAllUsers();
  ['ডিপিএস','বিদ্যুৎ বিল','অফিস খরচ','বেতন বাবদ','টিজি/প্যাচকট','ফাইবার ক্রয়','যন্ত্রাংশ ক্রয়','স্প্লিটার','বিবিধ','মেইন্টেন্স বাবদ','ভ্যাট','ট্যাক্স ফি','সফটওয়্যার বিল','দানবাবদ','যাতায়াত','মোবাইল বিল','আপ্যায়ন','কুরিয়ার খরচ','ব্যাংক জমা','স্যার নিজ খরচ','ম্যাডাম খরচ'].forEach(c => $('#afSub').append(`<option value="${c}">${c}</option>`));
}
async function loadAccountsHistoryForAdmin(){ const res=await apiCall('getAccountsHistory',{date:'',type:'',company:'',subcategory:''}); showAccountsTable(res, '#adminAccTable'); }
async function adminFilterAccounts(){
  const sd=$('#afDate').val(),ed=$('#afDateEnd').val();
  let res;
  if(sd&&ed) res=await apiCall('getDateRangeAccounts',{startDate:sd,endDate:ed,type:$('#afType').val(),company:$('#afCompany').val(),subcategory:$('#afSub').val()});
  else res=await apiCall('filterDataAdmin',{date:sd,type:$('#afType').val(),company:$('#afCompany').val(),subcategory:$('#afSub').val()});
  showAccountsTable(res, '#adminAccTable');
}
async function loadAdminAccountDetail(){
  const res=await apiCall('getDailyTransactions',{date:new Date().toISOString().split('T')[0]});
  let iH='',eH='',ti=0,te=0;
  if(res&&res.length) res.forEach(r=>{ const eB=(r.timestamp&&r.timestamp!=='undefined')?`<button class="btn btn-sm btn-warning" onclick="editAcc('${r.timestamp}','${r.amount}','${r.note||''}')">✏️</button>`:''; const dB=(r.timestamp&&r.timestamp!=='undefined')?`<button class="btn btn-sm btn-danger" onclick="deleteAcc('${r.timestamp}')">🗑️</button>`:''; if(r.type==='Income'){iH+=`<tr><td>${r.company}</td><td>${r.category}</td><td class="text-success">+${r.amount}</td><td>${eB} ${dB}</td></tr>`;ti+=Number(r.amount);}else{eH+=`<tr><td>${r.company}</td><td>${r.category}</td><td class="text-danger">-${r.amount}</td><td>${eB} ${dB}</td></tr>`;te+=Number(r.amount);} });
  $('#adminAccountDetail').html(`<div class="col-md-6"><div class="card card-custom p-3"><h6 class="text-success">আয়</h6><table class="table table-sm">${iH||'<tr><td colspan="4">কোনো আয় নেই</td></tr>'}</table><b>মোট: ${ti} টাকা</b></div></div><div class="col-md-6"><div class="card card-custom p-3"><h6 class="text-danger">ব্যয়</h6><table class="table table-sm">${eH||'<tr><td colspan="4">কোনো ব্যয় নেই</td></tr>'}</table><b>মোট: ${te} টাকা</b></div></div>`);
}
async function loadAdminAttendance(){ const res=await apiCall('getTodayAttendance'); let h='<table class="table table-sm"><tr><th>নাম</th><th>স্ট্যাটাস</th></tr>'; if(res&&res.length)res.forEach(r=>h+=`<tr><td>${r.username}</td><td>${r.status}</td></tr>`);else h+='<tr><td colspan="2">কোনো ডাটা নেই</td></tr>'; $('#adminAttendanceList').html(h+'</table>'); }
async function loadAdminAccessories(){ const res=await apiCall('getAccessoriesList'); let h='<table class="table table-sm"><tr><th>নাম</th><th>এসাইন</th></tr>'; if(res&&res.length)res.forEach(r=>h+=`<tr><td>${r.itemName}</td><td>${r.assignedTo||'-'}</td></tr>`); $('#adminAccessoriesList').html(h+'</table>'); }
async function loadAllUsers(){ const res=await apiCall('getAllUsers'); let h='<table class="table table-sm"><tr><th>ইউজার</th><th>রোল</th></tr>'; if(res&&res.length)res.forEach(u=>h+=`<tr><td>${u.username}</td><td>${u.role}</td></tr>`); $('#allUsersList').html(h+'</table>'); }
async function createUser(){ const res=await apiCall('createUser',{newUsername:$('#newUser').val(),newPassword:$('#newPass').val(),newRole:$('#newRole').val(),newFullName:''}); if(res&&res.success){alert('তৈরি হয়েছে');loadAllUsers();}else alert(res? (res.message||res.error) : 'ব্যর্থ'); }

// ==================== ACCOUNTS (12 cards) ====================
async function renderAccounts(cont){
  const mini = await apiCall('getAccountsMiniDash');

async function loadEmpSuggestions(){ const em=await apiCall('getEmployeesList'); if(em&&em.length){ let h='<div class="mt-2"><label class="text-danger">⚠️ এমপ্লয়ী সিলেক্ট:</label><div class="d-flex flex-wrap">'; em.forEach(e=>h+=`<button class="btn btn-sm btn-outline-primary m-1" onclick="$('#acSub').val('${e}');$('#empSuggestions').remove();">${e}</button>`); h+='</div></div>'; $('#empSuggestions').remove(); $('#expenseCats').after(`<div id="empSuggestions">${h}</div>`); } }
function openAccModal(key){ if(key){ const p=key.split('_'); $('#acCompany').val(p[0]); $('#acType').val(p[1]).trigger('change'); } $('#accModal').modal('show'); }
async function saveAccEntry(){
  const dateVal = $('#acDate').val();
  if (!dateVal) { alert('⚠️ দয়া করে একটি তারিখ নির্বাচন করুন!'); return; }
  const type=$('#acType').val(), cat=type==='Income'?$('#acIncomeCat').val():$('#acSub').val().trim();
  if(!cat){alert('ক্যাটাগরি দিন');return;}
  if(cat==='বেতন বাবদ'&&(!$('#acSub').val().trim()||$('#acSub').val().trim()==='বেতন বাবদ')){alert('এমপ্লয়ীর নাম দিন!');return;}
  const res=await apiCall('saveAccountsEntry',{date:dateVal,type,company:$('#acCompany').val(),category:cat,subCategory:$('#acSub').val(),amount:$('#acAmount').val(),note:$('#acNote').val()});
  if(res&&res.success){alert('✅ সফল');$('#accModal').modal('hide');loadAccountsHistory();}else alert(res? (res.message||res.error) : 'ব্যর্থ');
}
async function filterAccounts(){
  const sd=$('#aDate').val(),ed=$('#aDateEnd').val(),type=$('#aType').val(),company=$('#aCompany').val(),sub=$('#aSub').val();
  let res;
  if(sd&&ed) res=await apiCall('getDateRangeAccounts',{startDate:sd,endDate:ed,type:type||'',company:company||'',subcategory:sub||''});
  else res=await apiCall('getAccountsHistory',{date:sd||'',type:type||'',company:company||'',subcategory:sub||''});
  showAccountsTable(res);
}
async function loadAccountsHistory(){ const res=await apiCall('getAccountsHistory',{date:'',type:'',company:'',subcategory:''}); showAccountsTable(res); }

function buildRechargeInputs20(){
  let c='', b='';
  for(let i=0;i<20;i++){

    b += `<div class="recharge-row"><input class="form-control form-control-sm bkash-id" placeholder="আইডি" style="width:100px"><input class="form-control form-control-sm bkash-name" placeholder="নাম" style="width:100px"><input type="number" class="form-control form-control-sm bkash-amount" placeholder="টাকা" style="width:100px"><input class="form-control form-control-sm bkash-note" placeholder="নোট" style="width:120px"><button class="btn btn-sm btn-danger btn-sm-custom" onclick="deleteRechargeRow(this)">🗑️</button><button class="btn btn-sm btn-warning btn-sm-custom" onclick="editRechargeRow(this)">✏️</button></div>`;

function deleteRechargeRow(btn){ $(btn).closest('.recharge-row').find('input').val(''); }
function editRechargeRow(btn){
  const row = $(btn).closest('.recharge-row');
  const amt = row.find('input:eq(2)').val();
  const nt = row.find('input:eq(3)').val();
  const newAmt = prompt('টাকা পরিবর্তন করুন', amt);
  if(newAmt !== null) row.find('input:eq(2)').val(newAmt);
  const newNote = prompt('নোট পরিবর্তন করুন', nt);
  if(newNote !== null) row.find('input:eq(3)').val(newNote);
}
async function saveAllRecharge(type){
  const d = new Date().toISOString().split('T')[0];
  const co = 'Ainet';
  const prefix = type === 'Cash' ? 'cash' : 'bkash';
  let promises = [];
  $(`.${prefix}-id`).each(function(idx){
    const id = $(this).val().trim();
    const name = $(`.${prefix}-name`).eq(idx).val().trim();
    const amount = $(`.${prefix}-amount`).eq(idx).val();
    const note = $(`.${prefix}-note`).eq(idx).val().trim();
    if((id || name) && amount && Number(amount)>0){
      promises.push(apiCall('saveRecharge', {date:d, company:co, type:type, customerId:id||'-', customerName:name||'-', amount:Number(amount), note:note}));
    }
  });
  if(promises.length===0){ alert('কোনো ডাটা নেই'); return; }
  await Promise.all(promises);
  alert(`${promises.length} টি ${type} সংরক্ষিত`);
  loadRechargeTotals();
  loadMonthlyRecharge();
  $(`.${prefix}-id, .${prefix}-name, .${prefix}-amount, .${prefix}-note`).val('');
}
async function searchRecharge(){
  const q=$('#rSearch').val(); if(!q) return;
  const res=await apiCall('searchRecharge',{query:q});
  let h=`<table class="table table-sm"><thead><tr><th>তারিখ</th><th>টাইপ</th><th>আইডি</th><th>নাম</th><th>টাকা</th><th>এডিট/ডিলিট</th></tr></thead><tbody>`;
  if(res && res.length){
    res.forEach(r=>{
      h+=`<tr><td>${r.date}</td><td>${r.type}</td><td>${r.customerId}</td><td>${r.customerName}</td><td>${r.amount}</td>
      <td><button class="btn btn-sm btn-warning btn-sm-custom" onclick="editRechargeEntry('${r.timestamp}','${r.amount}')">✏️</button>
      <button class="btn btn-sm btn-danger btn-sm-custom" onclick="deleteRechargeEntry('${r.timestamp}')">🗑️</button></td></tr>`;
    });
  } else h+='<tr><td colspan="6">কোনো তথ্য নেই</td></tr>';
  h+='</tbody></table>';
  $('#rechargeSearchResult').html(h);
}
async function editRechargeEntry(ts, oldAmt){
  const newAmt = prompt('নতুন টাকার পরিমাণ', oldAmt);
  if(newAmt && !isNaN(newAmt)){
    const res = await apiCall('updateRecharge', {timestamp: ts, amount: newAmt});
    if(res && res.success) { alert('আপডেট সফল'); searchRecharge(); loadRechargeTotals(); }
    else alert('ব্যর্থ');
  }
}
async function deleteRechargeEntry(ts){
  if(confirm('ডিলিট করবেন?')){
    const res = await apiCall('deleteRecharge', {timestamp: ts});
    if(res && res.success) { alert('ডিলিট সফল'); searchRecharge(); loadRechargeTotals(); }
    else alert('ব্যর্থ');
  }
}
async function filterRecharge(){
  const sd=$('#rFilterStart').val(), ed=$('#rFilterEnd').val(), type=$('#rFilterType').val();
  let res;
  if(sd&&ed) res=await apiCall('getRechargeDateRange',{company:'Ainet',startDate:sd,endDate:ed});
  else res=await apiCall('getRechargeHistory',{company:'Ainet',date:''});
  let h=`<table class="table table-sm"><thead><tr><th>তারিখ</th><th>টাইপ</th><th>আইডি</th><th>নাম</th><th>টাকা</th><th>এডিট/ডিলিট</th></tr></thead><tbody>`;
  if(res && res.length){
    res.forEach(r=>{
      if(type && r.type!==type) return;
      h+=`<tr><td>${r.date}</td><td>${r.type}</td><td>${r.customerId}</td><td>${r.customerName}</td><td>${r.amount}</td>
      <td><button class="btn btn-sm btn-warning btn-sm-custom" onclick="editRechargeEntry('${r.timestamp}','${r.amount}')">✏️</button>
      <button class="btn btn-sm btn-danger btn-sm-custom" onclick="deleteRechargeEntry('${r.timestamp}')">🗑️</button></td></tr>`;
    });
  } else h+='<tr><td colspan="6">কোনো তথ্য নেই</td></tr>';
  h+='</tbody></table>';
  $('#rechargeSearchResult').html(h);
}
async function loadRechargeTotals(){
  const res=await apiCall('getRechargeHistory',{company:'Ainet',date:new Date().toISOString().split('T')[0]});
  let c=0,b=0,cc=0,bc=0;
  if(res) res.forEach(r=>{ if(r.type==='Cash'){ c+=Number(r.amount); cc++; } else { b+=Number(r.amount); bc++; } });
  $('#totalCash').text(c+' টাকা'); $('#totalBkash').text(b+' টাকা'); $('#countCash').text(cc); $('#countBkash').text(bc);
}
async function loadMonthlyRecharge(){
  const now=new Date(); const start=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  const res=await apiCall('getRechargeDateRange',{company:'Ainet',startDate:start,endDate:new Date().toISOString().split('T')[0]});
  let total=0; if(res) res.forEach(r=>total+=Number(r.amount));
  $('#monthlyRecharge').text(total+' টাকা');
}
function buildAttendanceSheet(em){
  if(!em||!em.length){$('#attendanceSheet').html('<p>কোনো এমপ্লয়ী নেই</p>');return;}
  let h=''; em.forEach((e,i)=>{ h+=`<div class="attendance-row"><span style="width:120px">${i+1}. ${e}</span><select class="form-select form-select-sm att-status" data-emp="${e}" style="width:130px"><option value="">--</option><option>Present</option><option>Absent</option><option>Late</option><option>Holiday</option><option>Leave</option></select><input class="form-control form-control-sm att-note" placeholder="নোট" style="flex:1"><span class="att-badge"></span></div>`; });
  $('#attendanceSheet').html(h);
  $('.att-status').on('change',function(){ const r=$(this).closest('.attendance-row'),b=r.find('.att-badge'),v=$(this).val(); b.removeClass('present-badge absent-badge late-badge').text(''); if(v==='Present'){b.addClass('present-badge').text('✓ উপস্থিত');}else if(v==='Absent'){b.addClass('absent-badge').text('✗ অনুপস্থিত');}else if(v==='Late'){b.addClass('late-badge').text('⏰ লেট');} });
}
async function saveAllAttendance(){
  const d=$('#attDate').val(); let promises=[];

  await Promise.all(promises); alert('হাজিরা সংরক্ষিত'); loadTodayAttendanceReport(d);
}
async function loadTodayAttendanceReport(d){
  const res=await apiCall('getTodayAttendance'); let h='<div class="card card-custom p-3 mt-3"><h6>📋 আজকের হাজিরা</h6><table class="table table-sm"><thead><tr><th>#</th><th>নাম</th><th>স্ট্যাটাস</th></tr></thead><tbody>';
  if(res&&res.length){ res.forEach((r,i)=>{ let b=r.status==='Present'?'<span class="badge bg-success">Present</span>':r.status==='Absent'?'<span class="badge bg-danger">Absent</span>':r.status==='Late'?'<span class="badge bg-warning text-dark">Late</span>':`<span class="badge bg-secondary">${r.status}</span>`; h+=`<tr><td>${i+1}</td><td>${r.username}</td><td>${b}</td></tr>`; }); }else h+='<tr><td colspan="3">কোনো হাজিরা নেই</td></tr>';
  h+='</tbody></table></div>'; $('#attendanceReport').html(h);
}

// ==================== OPERATOR (2 cards + Edit/Delete) ====================
async function renderOperator(cont){
  let html=`<ul class="nav nav-tabs mb-2"><li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tabSTB">এসটিবি আয়</a></li><li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tabAccessories">এক্সেসরিজ</a></li></ul>
  <div class="tab-content">
    <div class="tab-pane fade show active" id="tabSTB">
      <div class="row mb-2"><div class="col-6 col-md-3"><div class="summary-card"><small>আজ</small><h3 id="stbToday">0</h3></div></div><div class="col-6 col-md-3"><div class="summary-card"><small>মাসিক</small><h3 id="stbMonth">0</h3></div></div></div>
      <input type="date" id="stbDate" class="form-control form-control-sm mb-2" value="${new Date().toISOString().split('T')[0]}">
      <input type="number" id="stbAmount" class="form-control form-control-sm mb-2" placeholder="মোট টাকা">
      <textarea id="stbDetails" class="form-control form-control-sm mb-2" rows="2" placeholder="বিস্তারিত"></textarea>
      <button class="btn btn-primary btn-sm" onclick="saveSTB()">সেভ</button>
      <hr><div id="stbHistory"></div>
    </div>
    <div class="tab-pane fade" id="tabAccessories"><div id="accList"></div><div class="mt-2"><input id="accItemName" class="form-control form-control-sm mb-2" placeholder="আইটেম নাম"><select id="accAssignTo" class="form-select form-select-sm mb-2"><option value="">এসাইন করুন</option></select><button class="btn btn-primary btn-sm" onclick="updateAccessory()">আপডেট</button></div></div>
  </div>`;
  cont.html(html);
  loadSTBHistory(); loadSTBSummary(); loadAccessories(); loadEmployeesToSelect('#accAssignTo');
}
async function saveSTB(){ const res=await apiCall('saveSTBIncome',{date:$('#stbDate').val(),totalAmount:$('#stbAmount').val(),details:$('#stbDetails').val(),note:''}); if(res&&res.success){alert('✅ সফল');loadSTBHistory();loadSTBSummary();}else alert(res? (res.message||res.error) : 'ব্যর্থ'); }
async function loadSTBHistory(){
  const res=await apiCall('getSTBHistory');
  let h=`<table class="table table-sm"><thead><tr><th>তারিখ</th><th>টাকা</th><th>এডিট/ডিলিট</th></tr></thead><tbody>`;
  let t=0;
  if(res && res.length){ res.forEach(x=>{ h+=`<tr><td>${x.date}</td><td>${x.total}</td><td><button class="btn btn-sm btn-warning btn-sm-custom" onclick="editSTB('${x.timestamp}','${x.total}')">✏️</button> <button class="btn btn-sm btn-danger btn-sm-custom" onclick="deleteSTB('${x.timestamp}')">🗑️</button></td></tr>`; t+=Number(x.total); }); h+=`<tr class="total-row"><td>মোট</td><td>${t} টাকা</td><td></td></tr>`; }else h+='<tr><td colspan="3">কোনো এন্ট্রি নেই</td></tr>';
  h+='</tbody></table>'; $('#stbHistory').html(h);
}
async function editSTB(ts, oldAmt){ const newAmt = prompt('নতুন টাকার পরিমাণ', oldAmt); if(newAmt && !isNaN(newAmt)){ const res = await apiCall('updateSTBIncome', {timestamp: ts, amount: newAmt}); if(res && res.success){ alert('আপডেট সফল'); loadSTBHistory(); loadSTBSummary(); } else alert('ব্যর্থ'); } }
async function deleteSTB(ts){ if(confirm('ডিলিট করবেন?')){ const res = await apiCall('deleteSTBIncome', {timestamp: ts}); if(res && res.success){ alert('ডিলিট সফল'); loadSTBHistory(); loadSTBSummary(); } else alert('ব্যর্থ'); } }
async function loadSTBSummary(){
  const res=await apiCall('getSTBHistory'); let td=0,mt=0; const today=new Date().toISOString().split('T')[0], now=new Date();
  if(res) res.forEach(x=>{ if(x.date===today) td+=Number(x.total); const d=new Date(x.date); if(d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear()) mt+=Number(x.total); });
  $('#stbToday').text(td+' টাকা'); $('#stbMonth').text(mt+' টাকা');
}
async function loadAccessories(){
  const r=await apiCall('getAccessoriesList');
  let h='<table class="table table-sm"><thead><tr><th>নাম</th><th>এসাইন</th><th>এডিট/ডিলিট</th></tr></thead><tbody>';
  if(r) r.forEach(x=>{ h+=`<tr><td>${x.itemName}</td><td>${x.assignedTo||'-'}</td><td><button class="btn btn-sm btn-warning btn-sm-custom" onclick="editAccessory('${x.itemName}','${x.assignedTo||''}')">✏️</button> <button class="btn btn-sm btn-danger btn-sm-custom" onclick="deleteAccessory('${x.itemName}')">🗑️</button></td></tr>`; });
  h+='</tbody></table>'; $('#accList').html(h);
}
async function editAccessory(item, oldAssign){ const newAssign = prompt('নতুন এসাইন (এমপ্লয়ী নাম)', oldAssign); if(newAssign !== null){ const res = await apiCall('updateAccessoryAssign', {itemId: item, assignedTo: newAssign, note:''}); if(res && res.success){ alert('আপডেট সফল'); loadAccessories(); } } }
async function deleteAccessory(item){ if(confirm('এক্সেসরিজ ডিলিট করবেন?')){ const res = await apiCall('deleteAccessory', {itemId: item}); if(res && res.success){ alert('ডিলিট সফল'); loadAccessories(); } } }
async function updateAccessory(){ const name=$('#accItemName').val().trim(); if(!name){ alert('আইটেম নাম দিন'); return; } const res=await apiCall('updateAccessoryAssign',{itemId:name, assignedTo:$('#accAssignTo').val(), note:''}); if(res && res.success){ alert('✅ আপডেট সফল'); loadAccessories(); }else alert('ব্যর্থ'); }
async function loadEmployeesToSelect(sel){ const r=await apiCall('getEmployeesList'); if(r) r.forEach(u=>$(sel).append(`<option value="${u}">${u}</option>`)); }
async function renderEmployee(cont){ const s=await apiCall('getEmployeeSalaryHistory'),a=await apiCall('getMyAccessories'),at=await apiCall('getMyAttendanceReport'); let h='<div class="row"><div class="col-md-4"><h6>আমার বেতন</h6><table class="table table-sm"><thead><tr><th>তারিখ</th><th>টাকা</th></tr></thead><tbody>'; if(s&&s.length)s.forEach(x=>h+=`<tr><td>${x.date}</td><td>${x.amount} টাকা</td></tr>`);else h+='<tr><td colspan="2">কোনো রেকর্ড নেই</td></tr>'; h+='</tbody></table></div><div class="col-md-4"><h6>আমার এক্সেসরিজ</h6><table class="table table-sm"><thead><tr><th>নাম</th></tr></thead><tbody>'; if(a&&a.length)a.forEach(x=>h+=`<tr><td>${x.itemName}</td></tr>`);else h+='<tr><td>কোনো এক্সেসরিজ নেই</td></tr>'; h+='</tbody></table></div><div class="col-md-4"><h6>আমার হাজিরা</h6><table class="table table-sm"><thead><tr><th>স্ট্যাটাস</th><th>দিন</th></tr></thead><tbody>'; if(at)for(let k in at)h+=`<tr><td>${k}</td><td>${at[k]}</td></tr>`; h+='</tbody></table></div></div>'; cont.html(h); }
</script>
</body>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ainet & CCN Official</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .login-container, .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-img {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 15px;
        }
        h1 { font-size: 28px; font-style: italic; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #666; font-size: 14px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .user-info {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .logout-btn {
            background: #dc3545;
            width: auto;
            padding: 5px 15px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .card .amount { font-size: 28px; font-weight: bold; }
        .attendance-list { margin-top: 20px; padding-top: 20px; border-top: 2px solid #eee; }
        .attendance-item {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 5px 12px;
            margin: 5px;
            border-radius: 20px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
            position: relative;
        }
        .close {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 30px;
            cursor: pointer;
        }
        .form-row { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        @media (max-width: 768px) {
            .login-container, .dashboard { padding: 20px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div id="app">?? ??? ?????...</div>

    <script>
        // ?? ????? Google Apps Script URL ????? ???? ??
        const API_URL = 'YOUR_GOOGLE_SCRIPT_URL_HERE';
        
        let currentUser = null;
        
        async function callAPI(action, method = 'GET', data = null) {
            try {
                if (method === 'GET') {
                    const res = await fetch(`${API_URL}?action=${action}`);
                    return await res.json();
                } else {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action, ...data })
                    });
                    return await res.json();
                }
            } catch(e) {
                console.error(e);
                return [];
            }
        }
        
        async function getTodayAttendance() {
            return await callAPI('getAttendance');
        }
        
        async function login(username, password, remember) {
            const users = await callAPI('getUsers');
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                currentUser = user;
                if (remember) localStorage.setItem('user', JSON.stringify(user));
                sessionStorage.setItem('user', JSON.stringify(user));
                return true;
            }
            return false;
        }
        
        function getCurrentUser() {
            if (currentUser) return currentUser;
            const user = sessionStorage.getItem('user') || localStorage.getItem('user');
            if (user) {
                currentUser = JSON.parse(user);
                return currentUser;
            }
            return null;
        }
        
        function logout() {
            currentUser = null;
            sessionStorage.clear();
            localStorage.removeItem('user');
            renderLoginPage();
        }
        
        async function renderLoginPage() {
            const attendance = await getTodayAttendance();
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="login-container">
                    <div class="logo-area">
                        <div class="logo-img">??</div>
                        <h1><i>Ainet & CCN Official</i></h1>
                        <div class="subtitle">Finance & Management</div>
                    </div>
                    <form id="loginForm">
                        <div class="form-group"><input type="text" id="username" placeholder="????????" required></div>
                        <div class="form-group"><input type="password" id="password" placeholder="?????????" required></div>
                        <div class="form-group"><label><input type="checkbox" id="remember"> ? ??? ??? ?????</label></div>
                        <button type="submit">?? ???? ????</button>
                    </form>
                    <div class="attendance-list">
                        <h3>? ???? ??????? ????</h3>
                        <div>${attendance.length === 0 ? '<p>?? ??? ???</p>' : attendance.map(a => `<span class="attendance-item">?? ${a.username}</span>`).join('')}</div>
                    </div>
                    <div style="text-align: center; margin-top: 30px; color: #666;">Developed by Mehrab Jahid</div>
                </div>
            `;
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (await login(username.value, password.value, remember.checked)) {
                    renderDashboard();
                } else alert('??? ???????? ?? ?????????!');
            });
        }
        
        function showModal(content) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'block';
            modal.innerHTML = `<div class="modal-content"><span class="close" onclick="this.parentElement.parentElement.remove()">&times;</span>${content}</div>`;
            document.body.appendChild(modal);
        }
        
        window.showAttendanceForm = function() {
            showModal(`
                <h2>?? ?????? ???</h2>
                <div class="form-row"><label>?? ????????</label><input type="text" id="attUsername"></div>
                <div class="form-row"><label>? ?????????</label><select id="status"><option value="present">???????</option><option value="absent">?????????</option></select></div>
                <button onclick="saveAttendance()">??? ????</button>
            `);
        };
        
        window.saveAttendance = async function() {
            await callAPI('addAttendance', 'POST', {
                username: document.getElementById('attUsername').value,
                status: document.getElementById('status').value,
                date: new Date().toISOString().split('T')[0],
                note: ''
            });
            closeModal();
            renderDashboard();
        };
        
        async function renderDashboard() {
            const user = getCurrentUser();
            if (!user) { renderLoginPage(); return; }
            
            const attendance = await getTodayAttendance();
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <div class="dashboard">
                    <div class="header">
                        <h1><i>Ainet & CCN Official</i></h1>
                        <div class="user-info">?? ${user.name}<button class="logout-btn" onclick="logout()">?????</button></div>
                    </div>
                    <div class="cards-grid">
                        <div class="card"><h3>?? ??????????</h3><div class="amount">???????</div></div>
                        <div class="card" onclick="showAttendanceForm()"><h3>?? ?????? ???</h3><div class="amount">????? ????</div></div>
                    </div>
                    <div class="attendance-list"><h3>? ???? ???????</h3>${attendance.length === 0 ? '<p>??? ???</p>' : attendance.map(a => `<span class="attendance-item">${a.username}</span>`).join('')}</div>
                </div>
            `;
        }
        
        const user = getCurrentUser();
        user ? renderDashboard() : renderLoginPage();
    </script>
</body>
</html>
